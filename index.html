        <div class="sum-badges">
          ${allBadges.map(b => `
            <div class="sum-badge">
              <span class="sum-badge-icon">${b.icon}</span>
              <span class="sum-badge-label">${b.label}</span>
              <span class="sum-badge-player">${b.player.emoji} ${UI.esc(b.player.name)}</span>
              <span class="sum-badge-sub">${b.sub}</span>
            </div>`).join('')}
        </div>
      </div>` : '';

    /* Question log */
    const ctxIcons = { ladder:'🪜', snake:'🐍', bonus:'⭐', powerup:'⭐', finish:'🏆' };
    const logRows = (r.questionLog || []).map(entry => {
      const icon   = ctxIcons[entry.context] || '❓';
      const result = entry.correct
        ? `<span class="sum-qlog-correct">✓ Correct</span>`
        : `<span class="sum-qlog-wrong">✗ Wrong</span>`;
      return `
        <div class="sum-qlog-row">
          <div class="sum-qlog-icon">${icon}</div>
          <div class="sum-qlog-body">
            <div class="sum-qlog-q">${UI.esc(entry.qText)}</div>
            <div class="sum-qlog-meta">
              <span>${UI.esc(entry.playerName)}</span>
              <span class="sum-qlog-badge ${entry.difficulty}">${entry.difficulty}</span>
              ${result}
            </div>
          </div>
        </div>`;
    }).join('');

    const totalQ  = r.questionLog?.length ?? 0;
    const totalOK = r.questionLog?.filter(e => e.correct).length ?? 0;

    return `
      <div class="sum-wrap">
        <div class="sum-confetti" id="sum-confetti"></div>
        <div class="sum-inner">

          <!-- Winner hero -->
          <div class="sum-hero">
            <span class="sum-hero-trophy">🏆</span>
            <div class="sum-hero-badge">Winner!</div>
            <div class="sum-hero-avatar">${w.emoji}</div>
            <div class="sum-hero-name">${UI.esc(w.name)}</div>
            <div class="sum-hero-stats">
              <div class="sum-hero-stat correct"><span class="sv">${w.correct}</span> correct</div>
              <div class="sum-hero-stat wrong"><span class="sv">${w.wrong}</span> wrong</div>
              <div class="sum-hero-stat acc"><span class="sv">${wAcc}</span> accuracy</div>
              <div class="sum-hero-stat turns"><span class="sv">${wTurns}</span> turns</div>
            </div>
          </div>

          <!-- Achievement badges (auto-awarded) -->
          ${badgeSection}

          <!-- Final rankings -->
          <div class="sum-panel">
            <div class="sum-panel-hd">
              🏅 Final Rankings
              <span class="cnt">${ranked.length} players</span>
            </div>
            ${rankRows}
          </div>

          <!-- Question log -->
          ${totalQ > 0 ? `
          <div class="sum-panel">
            <div class="sum-panel-hd">
              📋 Question History
              <span class="cnt">${totalOK}/${totalQ} correct</span>
            </div>
            ${logRows}
          </div>` : ''}

          <!-- Learning insights: per-player topic breakdown -->
          ${(() => {
            const log = r.questionLog || [];
            if (!log.length) return '';
            const tmap = {};
            log.forEach(e => {
              if (!e.topicId) return;
              const k = `${e.playerIdx}|${e.topicId}`;
              if (!tmap[k]) tmap[k] = { pi: e.playerIdx, topicId: e.topicId, ok: 0, tot: 0 };
              tmap[k].tot++;
              if (e.correct) tmap[k].ok++;
            });
            const byPlayer = {};
            Object.values(tmap).forEach(x => {
              (byPlayer[x.pi] = byPlayer[x.pi] || []).push(x);
            });
            const rows = r.players.map((p, i) => {
              const items = byPlayer[i];
              if (!items || !items.length) return '';
              const bars = items.map(x => {
                const topic = Bank.topic(x.topicId);
                const pct   = Math.round(x.ok / x.tot * 100);
                const col   = pct >= 70 ? 'var(--easy)' : pct >= 40 ? 'var(--medium)' : 'var(--coral)';
                return `<div class="sum-topic-row">
                  <div class="sum-topic-name">${UI.esc(topic?.name || 'Unknown topic')}</div>
                  <div class="sum-topic-bar-wrap">
                    <div class="sum-topic-bar" style="width:${pct}%;background:${col}"></div>
                  </div>
                  <div class="sum-topic-pct" style="color:${col}">${x.ok}/${x.tot}</div>
                </div>`;
              }).join('');
              return `<div class="sum-insight-player">
                <div class="sum-insight-hd">${p.emoji} ${UI.esc(p.name)}</div>
                ${bars}
              </div>`;
            }).filter(Boolean).join('');
            if (!rows) return '';
            return `<div class="sum-panel"><div class="sum-panel-hd">📊 Learning Insights</div>${rows}</div>`;
          })()}

          <!-- Actions -->
          <div class="sum-actions">
            <button class="btn btn-ghost btn-lg" onclick="App.go('main')">← Main Menu</button>
            <button class="btn btn-ghost btn-lg" onclick="Summary.playAgainSame()">🔁 Same Board</button>
            <button class="btn btn-primary btn-lg" onclick="Summary.playAgain()">🎲 New Board</button>
          </div>

        </div>
      </div>`;
  },

  /* Auto-award achievement badges based on end-of-game stats */
  _badges(players) {
    const out = {};  // playerId → [{icon, label, sub}]
    const add = (p, b) => { (out[p.id] = out[p.id] || []).push(b); };

    // 🎓 Scholar: most correct answers (min 1)
    const maxC = Math.max(...players.map(p => p.correct));
    if (maxC >= 1)
      players.filter(p => p.correct === maxC)
        .forEach(p => add(p, { icon:'🎓', label:'Scholar', sub:'most correct' }));

    // 🎯 Sharpshooter: best accuracy among players with ≥ 3 questions answered
    const withQ = players.filter(p => (p.correct + p.wrong) >= 3);
    if (withQ.length) {
      const maxAcc = Math.max(...withQ.map(p => p.correct / (p.correct + p.wrong)));
      withQ.filter(p => p.correct / (p.correct + p.wrong) === maxAcc)
        .forEach(p => add(p, { icon:'🎯', label:'Sharpshooter',
                               sub:`${Math.round(maxAcc * 100)}% accuracy` }));
    }

    // 🔥 On Fire: longest consecutive correct streak (min 2)
    const maxS = Math.max(...players.map(p => p.bestStreak));
    if (maxS >= 2)
      players.filter(p => p.bestStreak === maxS)
        .forEach(p => add(p, { icon:'🔥', label:'On Fire', sub:`${maxS} in a row` }));

    // 💪 Determined: most turns taken (min 5) — rewards persistence
    const maxT = Math.max(...players.map(p => p.turns || 0));
    if (maxT >= 5)
      players.filter(p => (p.turns || 0) === maxT)
        .forEach(p => add(p, { icon:'💪', label:'Determined', sub:`${maxT} turns played` }));

    // 🎰 Lucky: triggered a beneficial wildcard (Roll Again or Shortcut)
    players.filter(p => (p.luckyWildcards || 0) > 0)
      .forEach(p => add(p, { icon:'🎰', label:'Lucky!',
                              sub:`${p.luckyWildcards} lucky wildcard${p.luckyWildcards > 1 ? 's' : ''}` }));

    return out;
  },

  /* Re-launch the same game config */
  playAgain() {
    if (!App.gameConfig) { App.go('main'); return; }
    App.savedBoard = null;
    App.go('game-board');
  },

  playAgainSame() {
    if (!App.gameConfig || !App.gameResult?.board) { App.go('main'); return; }
    App.savedBoard = App.gameResult.board;
    App.go('game-board');
  },

  /* Spawn confetti particles */
  _confetti() {
    const container = document.getElementById('sum-confetti');
    if (!container) return;
    const COLORS = ['#A8E63D','#FF6B6B','#4ECDC4','#FFB347','#B794F4','#F5F0E8'];
    for (let i = 0; i < 72; i++) {
      const p = document.createElement('div');
      p.className = 'cfp';
      const size  = 6 + Math.random() * 8;
      const delay = Math.random() * 2.5;
      const dur   = 2.2 + Math.random() * 2;
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const round = Math.random() > 0.5;
      p.style.cssText = [
        `left:${Math.random() * 100}%`,
        `width:${size}px`,
        `height:${size}px`,
        `background:${color}`,
        `border-radius:${round ? '50%' : '2px'}`,
        `animation-delay:${delay}s`,
        `animation-duration:${dur}s`,
        `transform:rotate(${Math.random() * 360}deg)`,
        `opacity:${0.7 + Math.random() * 0.3}`,
      ].join(';');
      container.appendChild(p);
    }
  },
};


/* ═══════════════════════════════════════════════════════════════
   REMOTE — WebRTC peer-to-peer controller link (PeerJS)
   Role: 'host' = laptop projecting the board
         'controller' = tablet passed to each player
   ═══════════════════════════════════════════════════════════════ */
const Remote = {
  role:      null,   // 'host' | 'controller' | null
  peer:      null,   // PeerJS Peer instance
  conn:      null,   // PeerJS DataConnection
  roomCode:  null,   // 4-digit string (e.g. '7432')
  _handlers: {},     // { msgType: fn }

  /* ── Is controller mode active? ── */
  active()  { return this.role !== null && this.conn !== null && this.conn.open; },
  isHost()  { return this.role === 'host'; },
  isCtrler(){ return this.role === 'controller'; },

  /* ── Generate a 4-digit room code ── */
  _mkCode() {
    const arr = new Uint16Array(1);
    crypto.getRandomValues(arr);
    return String(1000 + (arr[0] % 9000));
  },

  /* ── PeerJS peer ID format ── */
  _peerId(code) { return `edusnakes-${code}`; },

  /* ────────────────────────────────────────────────────────────
     HOST: Start listening for a controller to connect
  ──────────────────────────────────────────────────────────── */
  startHost(onReady, onConnect, onDisconnect) {
    this.role     = 'host';
    this.roomCode = this._mkCode();
    this.peer     = new Peer(this._peerId(this.roomCode));

    this.peer.on('open', () => onReady(this.roomCode));

    this.peer.on('connection', conn => {
      if (this.conn) { try { this.conn.close(); } catch(_){} }
      this.conn = conn;
      conn.on('open', () => {
        onConnect();
        this._listenConn(conn, onDisconnect);
      });
      conn.on('error', err => {
        UI.toast('Controller connection error: ' + err.type, 'error');
        this.stop();
      });
    });

    this.peer.on('error', err => {
      UI.toast('Controller link error: ' + err.type, 'error');
      this.stop();
    });
  },

  /* ────────────────────────────────────────────────────────────
     CONTROLLER: Join a host by room code
  ──────────────────────────────────────────────────────────── */
  joinHost(code, onConnect, onDisconnect) {
    this.role     = 'controller';
    this.roomCode = code;
    this.peer     = new Peer();   // random peer id for controller

    this.peer.on('open', () => {
      const conn = this.peer.connect(this._peerId(code));
      this.conn  = conn;
      conn.on('open', () => {
        onConnect();
        this._listenConn(conn, onDisconnect);
      });
      conn.on('error', err => {
        UI.toast('Could not connect to host. Check the code.', 'error');
        this.stop();
      });
    });

    this.peer.on('error', err => {
      UI.toast('Controller error: ' + err.type, 'error');
      this.stop();
    });
  },

  /* ── Attach data + close handlers to a connection ── */
  _listenConn(conn, onDisconnect) {
    conn.on('data', msg => {
      const h = this._handlers[msg.type];
      if (h) h(msg);
    });
    conn.on('close', () => {
      this.conn = null;
      onDisconnect();
    });
  },

  /* ── Register a message handler ── */
  on(type, fn) { this._handlers[type] = fn; },

  /* ── Send a message to the peer ── */
  send(msg) {
    if (this.conn && this.conn.open) this.conn.send(msg);
  },

  /* ── Tear down everything ── */
  stop() {
    if (this.conn)  { try { this.conn.close();  } catch(_){} }
    if (this.peer)  { try { this.peer.destroy(); } catch(_){} }
    this.role = null; this.peer = null; this.conn = null; this.roomCode = null;
    this._handlers = {};
  },

  /* ────────────────────────────────────────────────────────────
     STATE SNAPSHOT — called by host after every game change
     Packages just enough for the controller to render
  ──────────────────────────────────────────────────────────── */
  buildState() {
    const p = Game.players?.[Game.curIdx];
    if (!p) return null;
    return {
      type:          'state',
      gameState:     Game.state,   // 'roll' | 'moving' | 'finished'
      currentPlayer: {
        name:      p.name,
        emoji:     p.emoji,
        color:     p.color,
        position:  p.position,
        streak:    p.streak,
        freeRoll:  p.freeRoll,
        inventory: p.inventory || [],
      },
      boardSize: Game.cfg?.boardSize ?? 100,
      paused:    Game.paused ?? false,
    };
  },

  /* Push current state to controller (host only) */
  pushState() {
    if (!this.isHost() || !this.active()) return;
    const state = this.buildState();
    if (state) this.send(state);
  },

  /* Push a question to the controller (host only) */
  pushQuestion(q, timerSecs) {
    if (!this.isHost() || !this.active()) return;
    this.send({
      type:      'question',
      question:  {
        text:       q.text,
        type:       q.type,
        options:    q.options || [],
        difficulty: q.difficulty,
        context:    q._context || 'bonus',
        topicName:  Bank.topic(q.topicId)?.name || '',
      },
      timerSecs,
    });
  },

  /* Push question result to controller */
  pushResult(correct, explanation) {
    if (!this.isHost() || !this.active()) return;
    this.send({ type: 'result', correct, explanation: explanation || '' });
  },
};

/* ═══════════════════════════════════════════════════════════════
   APP CONTROLLER
═══════════════════════════════════════════════════════════════ */
const App = {
  toggleTheme() {
    const html  = document.documentElement;
    const isLight = html.getAttribute('data-theme') === 'light';
    const next  = isLight ? 'dark' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('edusnakes-theme', next);
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.textContent = next === 'light' ? '🌙' : '☀';
  },

  go(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(`screen-${screen}`);
    if (!el) { console.warn('Unknown screen:', screen); return; }
    el.classList.add('active');

    // Screen setup hooks
    if (screen === 'question-manager') QM.go('subjects');
    if (screen === 'game-setup')       GameSetup.init();
    if (screen === 'settings')         Settings.render();
    if (screen === 'game-board')     { Game.init(App.gameConfig); BGMusic.start(); }
    if (screen === 'summary')          Summary.render();
    if (screen === 'main' || screen === 'summary') BGMusic.stop();
    if (screen === 'main') App.renderLeaderboard();
  },

  showTutorial() {
    UI.showModal(`
      <div class="modal-title">📖 How to Play EduSnakes</div>
      <div style="display:flex;flex-direction:column;gap:14px;font-family:var(--font-body);font-size:13px;line-height:1.6;color:var(--ink2)">
        <div><strong style="color:var(--text)">🎯 Goal</strong><br>Be the first player to reach the final square and answer the question correctly to win.</div>
        <div><strong style="color:var(--text)">🪜 Ladders</strong><br>Land on a ladder base — answer the question correctly to climb up. Wrong = stay put.</div>
        <div><strong style="color:var(--text)">🐍 Snakes</strong><br>Land on a snake head — answer correctly to escape. Wrong = slide all the way down.</div>
        <div><strong style="color:var(--text)">⭐ Power-up Squares</strong><br>Answer correctly to earn a power-up stored in your bag (max 2). USE it before rolling on your turn.</div>
        <div><strong style="color:var(--text)">🎲 Wildcard Squares</strong><br>Triggers a random event automatically — could help or hurt any player!</div>
        <div><strong style="color:var(--text)">🔥 Streak Bonus</strong><br>Answer 3 in a row correctly → earn a free extra roll next turn.</div>
        <div><strong style="color:var(--text)">🏆 Winning</strong><br>Land exactly on or past the final square, then answer the question correctly. Wrong = bounce back one square.</div>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="UI.closeModal()">Got it! Let's Play 🎮</button></div>
    `);
  },

  renderLeaderboard() {
    const el = document.getElementById('menu-lb');
    if (!el) return;
    const list = Leaderboard.load();
    if (!list.length) { el.innerHTML = ''; return; }
    const medals = ['🥇','🥈','🥉'];
    const rows = list.slice(0, 5).map((e, i) => `
      <div class="menu-lb-row">
        <span class="menu-lb-rank">${medals[i] || (i+1)}</span>
        <span class="menu-lb-emoji">${e.emoji}</span>
        <span class="menu-lb-name">${UI.esc(e.name)}</span>
        <span class="menu-lb-wins">${e.wins}W</span>
      </div>`).join('');
    el.innerHTML = `<div class="menu-lb-title">🏆 Champions</div><div class="menu-lb-list">${rows}</div>`;
  },

  init() {
    Sound.load();
    BGMusic.load();
    History.load();

    // Restore saved theme
    const savedTheme = localStorage.getItem('edusnakes-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const tbtn = document.getElementById('theme-toggle-btn');
    if (tbtn) tbtn.textContent = savedTheme === 'light' ? '🌙' : '☀';

    document.addEventListener('keydown', e => {
      // Escape: close modals / popups, or toggle pause on game board
      if (e.key === 'Escape') {
        const modalOpen = document.getElementById('modal-overlay')?.classList.contains('open');
        const popupOpen = document.getElementById('qpop-overlay')?.classList.contains('open');
        if (modalOpen || popupOpen) { UI.closeModal(); return; }
        const gameActive = document.getElementById('screen-game-board')?.classList.contains('active');
        if (gameActive) Game.togglePause();
      }

      // Space or Enter: roll dice (only when game board active + roll state, not in inputs)
      if ((e.key === ' ' || e.key === 'Enter') &&
          e.target.tagName !== 'INPUT' &&
          e.target.tagName !== 'TEXTAREA' &&
          e.target.tagName !== 'BUTTON') {
        const gameScreen = document.getElementById('screen-game-board');
        if (gameScreen?.classList.contains('active') && Game.state === 'roll') {
          e.preventDefault();
          Game.roll();
        }
      }
    });

    this.go('main');
    console.log('%c EduSnakes v2.0 ✓ ', 'background:#A8E63D;color:#0F1923;font-weight:bold;border-radius:4px;padding:2px 6px');
  },
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
