/* ═══════════════════════════════════════════════════════════════
   STORE — raw localStorage read/write
═══════════════════════════════════════════════════════════════ */
const Store = {
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        // Ensure all required arrays exist (migration safety)
        parsed.subjects  = parsed.subjects  || [];
        parsed.topics    = parsed.topics    || [];
        parsed.questions = parsed.questions || [];
        return parsed;
      }
    } catch (_) {}
    return { version: '1.0', subjects: [], topics: [], questions: [] };
  },

  save(bank) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(bank));
  },

  uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  },
};


/* ═══════════════════════════════════════════════════════════════
   BANK — high-level question bank operations
═══════════════════════════════════════════════════════════════ */
const Bank = {
  data: Store.load(),

  _flush() { Store.save(this.data); },

  /* ─── Subjects ─── */
  subjects()            { return this.data.subjects; },
  subject(id)           { return this.data.subjects.find(s => s.id === id); },

  addSubject(name, color, icon) {
    const s = { id: Store.uid(), name, color, icon, createdAt: Date.now() };
    this.data.subjects.push(s);
    this._flush();
    return s;
  },

  updateSubject(id, patch) {
    const i = this.data.subjects.findIndex(s => s.id === id);
    if (i >= 0) { Object.assign(this.data.subjects[i], patch); this._flush(); }
  },

  deleteSubject(id) {
    const tidSet = new Set(this.data.topics.filter(t => t.subjectId === id).map(t => t.id));
    this.data.questions = this.data.questions.filter(q => !tidSet.has(q.topicId));
    this.data.topics    = this.data.topics.filter(t => t.subjectId !== id);
    this.data.subjects  = this.data.subjects.filter(s => s.id !== id);
    this._flush();
  },

  /* ─── Topics ─── */
  topicsOf(subjectId)   { return this.data.topics.filter(t => t.subjectId === subjectId); },
  topic(id)             { return this.data.topics.find(t => t.id === id); },

  addTopic(subjectId, name) {
    const t = { id: Store.uid(), subjectId, name, createdAt: Date.now() };
    this.data.topics.push(t);
    this._flush();
    return t;
  },

  updateTopic(id, patch) {
    const i = this.data.topics.findIndex(t => t.id === id);
    if (i >= 0) { Object.assign(this.data.topics[i], patch); this._flush(); }
  },

  deleteTopic(id) {
    this.data.questions = this.data.questions.filter(q => q.topicId !== id);
    this.data.topics    = this.data.topics.filter(t => t.id !== id);
    this._flush();
  },

  /* ─── Questions ─── */
  questionsOf(topicId)  { return this.data.questions.filter(q => q.topicId === topicId); },

  questionsOfSubject(subjectId) {
    const tidSet = new Set(this.data.topics.filter(t => t.subjectId === subjectId).map(t => t.id));
    return this.data.questions.filter(q => tidSet.has(q.topicId));
  },

  question(id)          { return this.data.questions.find(q => q.id === id); },

  addQuestion(topicId, fields) {
    const q = { id: Store.uid(), topicId, createdAt: Date.now(), ...fields };
    this.data.questions.push(q);
    this._flush();
    return q;
  },

  updateQuestion(id, patch) {
    const i = this.data.questions.findIndex(q => q.id === id);
    if (i >= 0) { Object.assign(this.data.questions[i], patch); this._flush(); }
  },

  deleteQuestion(id) {
    this.data.questions = this.data.questions.filter(q => q.id !== id);
    this._flush();
  },

  /* ─── Counts ─── */
  topicQCount(topicId)     { return this.data.questions.filter(q => q.topicId === topicId).length; },
  subjectTCount(subjectId) { return this.data.topics.filter(t => t.subjectId === subjectId).length; },
  subjectQCount(subjectId) { return this.questionsOfSubject(subjectId).length; },

  /* ─── Export ─── */
  exportAll() {
    return JSON.stringify({ ...this.data, exportedAt: new Date().toISOString() }, null, 2);
  },

  exportSubject(subjectId) {
    const topics  = this.topicsOf(subjectId);
    const tidSet  = new Set(topics.map(t => t.id));
    return JSON.stringify({
      version: this.data.version,
      exportedAt: new Date().toISOString(),
      subjects:  [this.subject(subjectId)],
      topics,
      questions: this.data.questions.filter(q => tidSet.has(q.topicId)),
    }, null, 2);
  },

  exportTopic(topicId) {
    const t = this.topic(topicId);
    return JSON.stringify({
      version: this.data.version,
      exportedAt: new Date().toISOString(),
      subjects:  [this.subject(t.subjectId)],
      topics:    [t],
      questions: this.questionsOf(topicId),
    }, null, 2);
  },

  /* ─── Import ─── */
  import(jsonStr, mode) {
    let imp;
    try { imp = JSON.parse(jsonStr); } catch { throw new Error('Invalid JSON'); }
    if (!Array.isArray(imp.subjects) || !Array.isArray(imp.topics) || !Array.isArray(imp.questions)) {
      throw new Error('Not a valid EduSnakes export file');
    }

    if (mode === 'replace') {
      for (const s of imp.subjects) {
        this.data.subjects  = this.data.subjects.filter(x => x.id !== s.id);
        this.data.topics    = this.data.topics.filter(t => t.subjectId !== s.id);
        const tidSet = new Set(this.data.topics.map(t => t.id));
        this.data.questions = this.data.questions.filter(q => tidSet.has(q.topicId));
        this.data.subjects.push(s);
      }
      for (const t of imp.topics) {
        this.data.topics = this.data.topics.filter(x => x.id !== t.id);
        this.data.topics.push(t);
      }
      for (const q of imp.questions) {
        this.data.questions = this.data.questions.filter(x => x.id !== q.id);
        this.data.questions.push(q);
      }
    } else { // merge — add only items that don't already exist
      const existingSubIds = new Set(this.data.subjects.map(s => s.id));
      const existingTopIds = new Set(this.data.topics.map(t => t.id));
      const existingQIds   = new Set(this.data.questions.map(q => q.id));

      for (const s of imp.subjects)  if (!existingSubIds.has(s.id)) this.data.subjects.push(s);
      for (const t of imp.topics)    if (!existingTopIds.has(t.id)) this.data.topics.push(t);
      for (const q of imp.questions) if (!existingQIds.has(q.id))   this.data.questions.push(q);
    }

    this._flush();
    return imp;
  },
};


/* ═══════════════════════════════════════════════════════════════
   VALIDATE QUESTION
   ─────────────────────────────────────────────────────────────
   TODO (your contribution!): This function is called before
   saving any question. Return null if valid, or a string
   describing what's wrong. The fields object has:
     { text, type, difficulty, options, correctIndex,
       correctAnswer, explanation }
   Consider: minimum text length? Must all 4 options be unique?
   Should written answers be at least 2 chars long?
═══════════════════════════════════════════════════════════════ */
function validateQuestion(fields) {
  if (!fields.text || fields.text.trim().length < 5) {
    return 'Question text must be at least 5 characters.';
  }

  if (fields.type === 'objective') {
    if (!fields.options || fields.options.some(o => !o || !o.trim())) {
      return 'All 4 options must be filled in.';
    }
    // TODO: add your own rules below, e.g. check for duplicate options:
    // const unique = new Set(fields.options.map(o => o.trim().toLowerCase()));
    // if (unique.size < 4) return 'All options must be different.';
  }

  if (fields.type === 'written') {
    if (!fields.correctAnswer || fields.correctAnswer.trim().length < 1) {
      return 'A correct answer is required for written questions.';
    }
  }

  return null; // valid
}


/* ═══════════════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════════════ */
const UI = {
  /* ── Toast ── */
  toast(msg, type = 'info') {
    const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${msg}</span>`;
    document.getElementById('toast-root').appendChild(el);
    setTimeout(() => el.remove(), 3200);
  },

  /* ── Modal ── */
  showModal(html, { wide = false, closeOnBackdrop = true } = {}) {
    const overlay = document.getElementById('modal-overlay');
    const box     = document.getElementById('modal-box');
    box.innerHTML  = html;
    box.className  = wide ? 'modal-box wide' : 'modal-box';
    overlay.classList.add('open');
    overlay._closeOnBackdrop = closeOnBackdrop;
  },

  closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  },

  confirm(title, bodyHtml, onYes, dangerous = true) {
    this.showModal(`
      <div class="modal-title">⚠️ ${title}</div>
      <p style="color:var(--ink2);font-size:14px;line-height:1.6">${bodyHtml}</p>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn ${dangerous ? 'btn-danger' : 'btn-primary'}" id="_conf_yes">Confirm</button>
      </div>
    `);
    document.getElementById('_conf_yes').onclick = () => { this.closeModal(); onYes(); };
  },

  /* ── Download file ── */
  download(filename, text) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([text], { type: 'application/json' }));
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  },

  /* ── HTML escape ── */
  esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  },

  /* ── Slug for filenames ── */
  slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); },
};

/* Close modal on backdrop click */
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget && e.currentTarget._closeOnBackdrop !== false) {
    UI.closeModal();
  }
});

const QM = {
  // Navigation state
  view:      'subjects',   // 'subjects' | 'topics' | 'questions'
  subjectId: null,
  topicId:   null,

  // Pending import text (avoids encoding issues in onclick attrs)
  _importText: null,

  /* ── Navigation ── */
  go(view, sid = null, tid = null) {
    this.view      = view;
    this.subjectId = sid;
    this.topicId   = tid;
    this._render();
  },

  back() {
    if (this.view === 'questions') return this.go('topics', this.subjectId);
    if (this.view === 'topics')    return this.go('subjects');
    App.go('main');
  },

  /* ── Master render ── */
  _render() {
    this._renderCrumbs();
    this._renderTopbarBtns();

    const body = document.getElementById('qm-body');
    if (this.view === 'subjects')  body.innerHTML = this._htmlSubjects();
    if (this.view === 'topics')    body.innerHTML = this._htmlTopics();
    if (this.view === 'questions') body.innerHTML = this._htmlQuestions();
  },

  /* ── Breadcrumbs ── */
  _renderCrumbs() {
    const { view, subjectId, topicId } = this;
    const parts = [];

    const isActive = (v) => v === view ? 'active' : '';

    parts.push(`<span class="crumb ${isActive('subjects')}" onclick="QM.go('subjects')">Question Bank</span>`);

    if (view === 'topics' || view === 'questions') {
      const s = Bank.subject(subjectId);
      parts.push(`<span class="crumb-sep">›</span>`);
      parts.push(`<span class="crumb ${isActive('topics')}" onclick="QM.go('topics','${subjectId}')">${UI.esc(s.name)}</span>`);
    }

    if (view === 'questions') {
      const t = Bank.topic(topicId);
      parts.push(`<span class="crumb-sep">›</span>`);
      parts.push(`<span class="crumb active">${UI.esc(t.name)}</span>`);
    }

    document.getElementById('qm-crumbs').innerHTML = parts.join('');
  },

  /* ── Top-bar action buttons ── */
  _renderTopbarBtns() {
    const { view, subjectId, topicId } = this;
    let html = '';

    if (view === 'subjects') {
      html = `
        <button class="btn btn-ghost btn-sm" onclick="QM.importCSV()">
          <span>📋</span><span class="btn-label"> CSV</span>
        </button>
        <button class="btn btn-ghost btn-sm" onclick="QM.importBank()">
          <span>⬆</span><span class="btn-label"> Import</span>
        </button>
        <button class="btn btn-ghost btn-sm" onclick="QM.exportAll()">
          <span>⬇</span><span class="btn-label"> Export All</span>
        </button>`;
    } else if (view === 'topics') {
      html = `<button class="btn btn-ghost btn-sm" onclick="QM.exportSubject('${subjectId}')">⬇ Export Subject</button>`;
    } else if (view === 'questions') {
      html = `<button class="btn btn-ghost btn-sm" onclick="QM.exportTopic('${topicId}')">⬇ Export Topic</button>`;
    }

    document.getElementById('qm-topbar-btns').innerHTML = html;
  },

  /* ════════════════════════════════════════════
     HTML BUILDERS
  ════════════════════════════════════════════ */

  _htmlSubjects() {
    const subjects = Bank.subjects();

    const cards = subjects.map(s => {
      const tc = Bank.subjectTCount(s.id);
      const qc = Bank.subjectQCount(s.id);
      return `
        <div class="subject-card" style="--sc:${s.color}" onclick="QM.go('topics','${s.id}')">
          <div class="sc-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" title="Edit"   onclick="QM.editSubject('${s.id}')">✏️</button>
            <button class="icon-btn del" title="Delete" onclick="QM.delSubject('${s.id}')">🗑️</button>
          </div>
          <span class="sc-icon">${s.icon}</span>
          <div class="sc-name">${UI.esc(s.name)}</div>
          <div class="sc-pills">
            <span class="pill">${tc} topic${tc !== 1 ? 's' : ''}</span>
            <span class="pill">${qc} Q</span>
          </div>
        </div>`;
    }).join('');

    const emptyMsg = subjects.length === 0 ? `
      <div class="empty-state" style="grid-column:1/-1">
        <span class="es-icon">📚</span>
        <h3>No subjects yet</h3>
        <p>Create your first subject to start building the question bank.</p>
      </div>` : '';

    return `
      <div class="section-hd">
        <div>
          <h2>Question Bank</h2>
          <div class="sub">${subjects.length} subject${subjects.length !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div class="subjects-grid">
        ${cards}
        ${emptyMsg}
        <button class="add-card" onclick="QM.addSubject()">
          <div class="add-circle">+</div>
          <span>New Subject</span>
        </button>
      </div>`;
  },

  _htmlTopics() {
    const s      = Bank.subject(this.subjectId);
    const topics = Bank.topicsOf(this.subjectId);

    const rows = topics.map(t => {
      const qc = Bank.topicQCount(t.id);
      return `
        <div class="topic-row" onclick="QM.go('questions','${this.subjectId}','${t.id}')">
          <div class="topic-dot" style="--tc:${s.color}"></div>
          <span class="topic-name">${UI.esc(t.name)}</span>
          <span class="pill">${qc} Q</span>
          <div class="topic-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" onclick="QM.editTopic('${t.id}')">✏️</button>
            <button class="icon-btn del" onclick="QM.delTopic('${t.id}')">🗑️</button>
          </div>
          <span class="topic-arrow">›</span>
        </div>`;
    }).join('');

    const emptyMsg = topics.length === 0 ? `
      <div class="empty-state">
        <span class="es-icon">📂</span>
        <h3>No topics yet</h3>
        <p>Add topics to organise questions under <strong>${UI.esc(s.name)}</strong>.</p>
      </div>` : '';

    return `
      <div class="section-hd">
        <div>
          <h2>${s.icon} ${UI.esc(s.name)}</h2>
          <div class="sub">${topics.length} topic${topics.length !== 1 ? 's' : ''}</div>
        </div>
        <button class="btn btn-primary" onclick="QM.addTopic()">+ Add Topic</button>
      </div>
      <div class="topics-list">${rows}${emptyMsg}</div>`;
  },

  _htmlQuestions() {
    const s   = Bank.subject(this.subjectId);
    const t   = Bank.topic(this.topicId);
    const qs  = Bank.questionsOf(this.topicId);

    const easy   = qs.filter(q => q.difficulty === 'easy').length;
    const medium = qs.filter(q => q.difficulty === 'medium').length;
    const hard   = qs.filter(q => q.difficulty === 'hard').length;

    const statsBar = qs.length > 0 ? `
      <div class="q-stats-bar">
        <span class="stat-chip total">${qs.length} total</span>
        <span class="stat-chip easy">Easy ${easy}</span>
        <span class="stat-chip medium">Med ${medium}</span>
        <span class="stat-chip hard">Hard ${hard}</span>
      </div>` : '';

    const rows = qs.map(q => {
      const preview = q.text.length > 70 ? q.text.slice(0, 70) + '…' : q.text;
      return `
        <div class="question-row">
          <div class="q-diff-bar ${q.difficulty}"></div>
          <div class="q-content">
            <div class="q-text" title="${UI.esc(q.text)}">${UI.esc(preview)}</div>
            <div class="q-meta">
              <span class="type-badge ${q.type}">${q.type === 'objective' ? 'MCQ' : 'Written'}</span>
              <span class="q-diff-label">${q.difficulty}</span>
              ${q.explanation ? '<span style="color:var(--ink3);font-size:11px">💬 has explanation</span>' : ''}
            </div>
          </div>
          <div class="q-actions">
            <button class="icon-btn" title="Edit"   onclick="QM.editQuestion('${q.id}')">✏️</button>
            <button class="icon-btn del" title="Delete" onclick="QM.delQuestion('${q.id}')">🗑️</button>
          </div>
        </div>`;
    }).join('');

    const emptyMsg = qs.length === 0 ? `
      <div class="empty-state">
        <span class="es-icon">❓</span>
        <h3>No questions yet</h3>
        <p>Add questions to <strong>${UI.esc(t.name)}</strong> to use them in games.</p>
      </div>` : '';

    return `
      <div class="section-hd">
        <div>
          <h2>${s.icon} ${UI.esc(t.name)}</h2>
          <div class="sub">${qs.length} question${qs.length !== 1 ? 's' : ''}</div>
        </div>
        <button class="btn btn-primary" onclick="QM.addQuestion()">+ Add Question</button>
      </div>
      <div class="questions-section">
        ${statsBar}
        <div class="questions-list">${rows}${emptyMsg}</div>
      </div>`;
  },

  /* ════════════════════════════════════════════
     SUBJECT CRUD
  ════════════════════════════════════════════ */
  addSubject()      { this._subjectModal(null); },
  editSubject(id)   { this._subjectModal(Bank.subject(id)); },

  _subjectModal(existing) {
    const isEdit = !!existing;
    const selColor = existing?.color || SUBJECT_COLORS[0];
    const selIcon  = existing?.icon  || SUBJECT_ICONS[0];

    const swatches = SUBJECT_COLORS.map(c => `
      <div class="color-swatch ${c === selColor ? 'sel' : ''}"
           style="background:${c}"
           data-c="${c}"
           onclick="QM._pickColor(this,'${c}')"></div>`).join('');

    const emojis = SUBJECT_ICONS.map(e => `
      <div class="emoji-opt ${e === selIcon ? 'sel' : ''}"
           data-e="${e}"
           onclick="QM._pickEmoji(this,'${e}')">${e}</div>`).join('');

    UI.showModal(`
      <div class="modal-title">${isEdit ? '✏️ Edit Subject' : '➕ New Subject'}</div>
      <input type="hidden" id="_sc" value="${selColor}">
      <input type="hidden" id="_si" value="${selIcon}">

      <div class="form-group">
        <label class="form-label">Subject Name</label>
        <input class="form-input" id="_sn" type="text"
               placeholder="e.g. Biology, Mathematics…"
               value="${UI.esc(existing?.name || '')}" maxlength="60">
      </div>

      <div class="form-group">
        <label class="form-label">Colour</label>
        <div class="color-palette">${swatches}</div>
      </div>

      <div class="form-group">
        <label class="form-label">Icon</label>
        <div class="emoji-grid">${emojis}</div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="QM._saveSubject(${isEdit ? `'${existing.id}'` : 'null'})">
          ${isEdit ? 'Save Changes' : 'Create Subject'}
        </button>
      </div>`);

    setTimeout(() => document.getElementById('_sn')?.focus(), 40);
  },

  _pickColor(el, c) {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('sel'));
    el.classList.add('sel');
    document.getElementById('_sc').value = c;
  },

  _pickEmoji(el, e) {
    document.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('sel'));
    el.classList.add('sel');
    document.getElementById('_si').value = e;
  },

  _saveSubject(id) {
    const name  = document.getElementById('_sn').value.trim();
    const color = document.getElementById('_sc').value;
    const icon  = document.getElementById('_si').value;
    if (!name) return UI.toast('Please enter a subject name', 'error');

    if (id) { Bank.updateSubject(id, { name, color, icon }); UI.toast('Subject updated ✓', 'success'); }
    else    { Bank.addSubject(name, color, icon);             UI.toast('Subject created ✓', 'success'); }

    UI.closeModal();
    this._render();
  },

  delSubject(id) {
    const s  = Bank.subject(id);
    const qc = Bank.subjectQCount(id);
    UI.confirm(
      'Delete Subject',
      `Delete <strong>${UI.esc(s.name)}</strong>? This removes <strong>${qc} question${qc !== 1 ? 's' : ''}</strong> and all its topics permanently.`,
      () => { Bank.deleteSubject(id); UI.toast('Subject deleted', 'info'); this._render(); }
    );
  },

  /* ════════════════════════════════════════════
     TOPIC CRUD
  ════════════════════════════════════════════ */
  addTopic()     { this._topicModal(null); },
  editTopic(id)  { this._topicModal(Bank.topic(id)); },

  _topicModal(existing) {
    const isEdit = !!existing;
    UI.showModal(`
      <div class="modal-title">${isEdit ? '✏️ Edit Topic' : '➕ New Topic'}</div>
      <div class="form-group">
        <label class="form-label">Topic Name</label>
        <input class="form-input" id="_tn" type="text"
               placeholder="e.g. Cell Division, Quadratic Equations…"
               value="${UI.esc(existing?.name || '')}" maxlength="80">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="QM._saveTopic(${isEdit ? `'${existing.id}'` : 'null'})">
          ${isEdit ? 'Save Changes' : 'Create Topic'}
        </button>
      </div>`);
    setTimeout(() => document.getElementById('_tn')?.focus(), 40);
  },

  _saveTopic(id) {
    const name = document.getElementById('_tn').value.trim();
    if (!name) return UI.toast('Please enter a topic name', 'error');

    if (id) { Bank.updateTopic(id, { name }); UI.toast('Topic updated ✓', 'success'); }
    else    { Bank.addTopic(this.subjectId, name); UI.toast('Topic created ✓', 'success'); }

    UI.closeModal();
    this._render();
  },

  delTopic(id) {
    const t  = Bank.topic(id);
    const qc = Bank.topicQCount(id);
    UI.confirm(
      'Delete Topic',
      `Delete <strong>${UI.esc(t.name)}</strong>? This removes <strong>${qc} question${qc !== 1 ? 's' : ''}</strong> permanently.`,
      () => { Bank.deleteTopic(id); UI.toast('Topic deleted', 'info'); this._render(); }
    );
  },

  /* ════════════════════════════════════════════
     QUESTION CRUD
  ════════════════════════════════════════════ */
  addQuestion()    { this._pendingImg = null; this._questionModal(null); },
  editQuestion(id) { this._pendingImg = null; this._questionModal(Bank.question(id)); },

  /* Temporary store for the base64 image being uploaded */
  _pendingImg: null,

  _questionModal(existing) {
    const isEdit = !!existing;
    const q = existing || {
      text: '', type: 'objective', difficulty: 'easy',
      options: ['', '', '', ''], correctIndex: 0,
      correctAnswer: '', explanation: '', image: null,
    };

    const optRows = ['A','B','C','D'].map((letter, i) => `
      <div class="mcq-option">
        <input type="radio" class="mcq-radio" name="_qcr" value="${i}" id="_qr${i}"
               ${q.correctIndex === i ? 'checked' : ''}>
        <label for="_qr${i}" class="mcq-letter">${letter}</label>
        <input class="form-input mcq-option-input" type="text" id="_qo${i}"
               placeholder="Option ${letter}"
               value="${UI.esc((q.options || [])[i] || '')}">
      </div>`).join('');

    const hasImg = !!(q.image);
    const imgPreview = hasImg
      ? `<img class="img-preview-thumb" id="_qimg_thumb" src="${q.image}" alt="">`
      : `<img class="img-preview-thumb" id="_qimg_thumb" src="" alt="" style="display:none">`;
    const clearBtn = hasImg
      ? `<button type="button" class="img-clear-btn" id="_qimg_clear" onclick="QM._clearImage()">✕ Remove</button>`
      : `<button type="button" class="img-clear-btn" id="_qimg_clear" onclick="QM._clearImage()" style="display:none">✕ Remove</button>`;

    UI.showModal(`
      <div class="modal-title">${isEdit ? '✏️ Edit Question' : '➕ New Question'}</div>

      <div class="form-group">
        <label class="form-label">Question Text</label>
        <textarea class="form-input" id="_qt" rows="3"
                  placeholder="Type your question here…">${UI.esc(q.text)}</textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-input" id="_qtype" onchange="QM._toggleQType()">
            <option value="objective" ${q.type === 'objective' ? 'selected' : ''}>MCQ (4 options)</option>
            <option value="written"   ${q.type === 'written'   ? 'selected' : ''}>Written Answer</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Difficulty</label>
          <select class="form-input" id="_qdiff">
            <option value="easy"   ${q.difficulty === 'easy'   ? 'selected' : ''}>Easy</option>
            <option value="medium" ${q.difficulty === 'medium' ? 'selected' : ''}>Medium</option>
            <option value="hard"   ${q.difficulty === 'hard'   ? 'selected' : ''}>Hard</option>
          </select>
        </div>
      </div>

      <div id="_mcq_sec" class="form-group" style="display:${q.type === 'objective' ? 'block' : 'none'}">
        <label class="form-label">Options <span style="color:var(--ink3);font-weight:400">— select the correct one</span></label>
        <div class="mcq-options">${optRows}</div>
      </div>

      <div id="_wr_sec" class="form-group" style="display:${q.type === 'written' ? 'block' : 'none'}">
        <label class="form-label">Correct Answer</label>
        <input class="form-input" id="_qwa" type="text"
               placeholder="Expected answer (case-insensitive)"
               value="${UI.esc(q.correctAnswer || '')}">
        <div class="form-hint">Matched case-insensitively when the player answers.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Image <span style="color:var(--ink3);font-weight:400">— optional</span></label>
        <div class="img-upload-row">
          <label class="img-upload-btn">
            📷 Add Image
            <input type="file" accept="image/*" id="_qimg_file" style="display:none"
                   onchange="QM._previewImage(this)">
          </label>
          ${clearBtn}
          ${imgPreview}
        </div>
        <div class="form-hint" style="margin-top:6px">Shown above the question during gameplay.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Explanation <span style="color:var(--ink3);font-weight:400">— optional</span></label>
        <textarea class="form-input" id="_qex" rows="2"
                  placeholder="Shown to the player after a wrong answer…">${UI.esc(q.explanation || '')}</textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="QM._saveQuestion(${isEdit ? `'${existing.id}'` : 'null'})">
          ${isEdit ? 'Save Changes' : 'Add Question'}
        </button>
      </div>`, { wide: true });

    setTimeout(() => document.getElementById('_qt')?.focus(), 40);
  },

  _toggleQType() {
    const t = document.getElementById('_qtype').value;
    document.getElementById('_mcq_sec').style.display = t === 'objective' ? 'block' : 'none';
    document.getElementById('_wr_sec').style.display  = t === 'written'   ? 'block' : 'none';
  },

  /* Read selected file as base64 and show thumbnail */
  _previewImage(input) {
    const file = input.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      this._pendingImg = e.target.result;
      const thumb = document.getElementById('_qimg_thumb');
      const clear = document.getElementById('_qimg_clear');
      if (thumb) { thumb.src = this._pendingImg; thumb.style.display = 'block'; }
      if (clear) { clear.style.display = 'inline-flex'; }
    };
    reader.readAsDataURL(file);
  },

  /* Remove the attached image */
  _clearImage() {
    this._pendingImg = '';  // empty string = explicit removal
    const thumb = document.getElementById('_qimg_thumb');
    const clear = document.getElementById('_qimg_clear');
    const file  = document.getElementById('_qimg_file');
    if (thumb) { thumb.src = ''; thumb.style.display = 'none'; }
    if (clear) { clear.style.display = 'none'; }
    if (file)  { file.value = ''; }
  },

  _saveQuestion(id) {
    const text        = document.getElementById('_qt').value.trim();
    const type        = document.getElementById('_qtype').value;
    const difficulty  = document.getElementById('_qdiff').value;
    const explanation = document.getElementById('_qex').value.trim();

    let fields = { text, type, difficulty, explanation };

    if (type === 'objective') {
      const options = [0,1,2,3].map(i => document.getElementById(`_qo${i}`).value.trim());
      const radio   = document.querySelector('input[name="_qcr"]:checked');
      const correctIndex = radio ? parseInt(radio.value) : 0;
      fields = { ...fields, options, correctIndex, correctAnswer: '' };
    } else {
      const correctAnswer = document.getElementById('_qwa').value.trim();
      fields = { ...fields, correctAnswer, options: [], correctIndex: -1 };
    }

    // Handle image: _pendingImg===null → keep existing; ''→ remove; string → new image
    const existingQ = id ? Bank.question(id) : null;
    if (this._pendingImg === null) {
      fields.image = existingQ?.image || null;  // keep existing
    } else if (this._pendingImg === '') {
      fields.image = null;  // removed
    } else {
      fields.image = this._pendingImg;  // new base64
    }
    this._pendingImg = null;  // reset

    // Run validation
    const err = validateQuestion(fields);
    if (err) return UI.toast(err, 'error');

    if (id) { Bank.updateQuestion(id, fields); UI.toast('Question updated ✓', 'success'); }
    else    { Bank.addQuestion(this.topicId, fields); UI.toast('Question added ✓', 'success'); }

    UI.closeModal();
    this._render();
  },

  delQuestion(id) {
    const q = Bank.question(id);
    const preview = q.text.length > 55 ? q.text.slice(0, 55) + '…' : q.text;
    UI.confirm(
      'Delete Question',
      `Delete: <em style="color:var(--ink2)">"${UI.esc(preview)}"</em>?`,
      () => { Bank.deleteQuestion(id); UI.toast('Question deleted', 'info'); this._render(); }
    );
  },

     EXPORT / IMPORT
  ════════════════════════════════════════════ */

    UI.download(`edusnakes-${UI.slug(t.name)}.json`, Bank.exportTopic(id));
    UI.toast(`"${t.name}" exported ✓`, 'success');
  },

  importCSV() {
    const subjects = Bank.subjects();
    const subjectOpts = subjects.map(s =>
      `<option value="${s.id}">${UI.esc(s.name)}</option>`).join('');
    UI.showModal(`
      <div class="modal-title">📋 Import Questions from CSV</div>
      <p style="color:var(--ink2);font-size:13px;margin-bottom:16px;line-height:1.6">
        CSV format (one question per row, header row required):<br>
        <code style="font-size:11px">text, type, difficulty, answer, optA, optB, optC, optD, explanation</code><br>
        <em style="font-size:11px">type: "written" or "objective" · difficulty: easy/medium/hard · answer: text for written, 0–3 index for objective</em>
      </p>
      <div class="form-group">
        <label class="form-label">Subject</label>
        <select class="form-input" id="_csv_subj">
          <option value="__new__">+ Create new subject…</option>
          ${subjectOpts}
        </select>
        <input class="form-input" id="_csv_subj_new" placeholder="New subject name" style="margin-top:6px;display:none">
      </div>
      <div class="form-group">
        <label class="form-label">Topic</label>
        <input class="form-input" id="_csv_topic" placeholder="Topic name (creates if new)">
      </div>
      <div class="form-group">
        <label class="form-label">CSV File</label>
        <input class="form-input" type="file" id="_csv_file" accept=".csv,.txt" style="padding:8px;cursor:pointer">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="QM._readCSVFile()">Import →</button>
      </div>`,
    );
    document.getElementById('_csv_subj').addEventListener('change', function() {
      document.getElementById('_csv_subj_new').style.display =
        this.value === '__new__' ? 'block' : 'none';
    });
  },

  _readCSVFile() {
    const subjSel   = document.getElementById('_csv_subj').value;
    const newSubjName = document.getElementById('_csv_subj_new')?.value.trim();
    const topicName = document.getElementById('_csv_topic')?.value.trim();
    const file      = document.getElementById('_csv_file')?.files[0];

    if (!topicName) return UI.toast('Enter a topic name', 'error');
    if (!file)      return UI.toast('Select a CSV file', 'error');
    if (subjSel === '__new__' && !newSubjName) return UI.toast('Enter a subject name', 'error');

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        let subject;
        if (subjSel === '__new__') {
          subject = Bank.addSubject(newSubjName, SUBJECT_COLORS[Math.floor(Math.random()*SUBJECT_COLORS.length)],
                                    SUBJECT_ICONS[Math.floor(Math.random()*SUBJECT_ICONS.length)]);
        } else {
          subject = Bank.subject(subjSel);
        }
        let topic = Bank.topicsOf(subject.id).find(t => t.name.toLowerCase() === topicName.toLowerCase());
        if (!topic) topic = Bank.addTopic(subject.id, topicName);

        const rows = this._parseCSV(e.target.result);
        let added = 0, skipped = 0;
        rows.forEach(r => {
          const type = (r.type || 'objective').trim().toLowerCase();
          const diff = ['easy','medium','hard'].includes(r.difficulty?.trim()) ? r.difficulty.trim() : 'medium';
          const text = r.text?.trim();
          if (!text) { skipped++; return; }

          if (type === 'written') {
            if (!r.answer?.trim()) { skipped++; return; }
            Bank.addQuestion(topic.id, { text, type:'written', difficulty:diff,
              correctAnswer: r.answer.trim(), explanation: r.explanation?.trim() || '' });
            added++;
          } else {
            const opts = [r.optA, r.optB, r.optC, r.optD].map(o => o?.trim() || '').filter(Boolean);
            const idx  = parseInt(r.answer);
            if (opts.length < 2 || isNaN(idx) || idx < 0 || idx >= opts.length) { skipped++; return; }
            Bank.addQuestion(topic.id, { text, type:'objective', difficulty:diff,
              options: opts, correctIndex: idx, explanation: r.explanation?.trim() || '' });
            added++;
          }
        });
        UI.closeModal();
        UI.toast(`✅ Imported ${added} questions${skipped ? ` (${skipped} skipped)` : ''}`, 'success');
        QM.go('questions', subject.id, topic.id);
      } catch(err) {
        UI.toast('CSV parse error: ' + err.message, 'error');
      }
    };
    reader.readAsText(file);
  },

  _parseCSV(text) {
    const lines = text.replace(/\r\n?/g, '\n').split('\n').filter(l => l.trim());
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/^"|"$/g,''));
    return lines.slice(1).map(line => {
      const vals = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      vals.push(cur.trim());
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/^"|"$/g, ''); });
      return obj;
    });
  },

  importBank() {
    UI.showModal(`
      <div class="modal-title">⬆️ Import Question Bank</div>
      <p style="color:var(--ink2);font-size:13px;margin-bottom:16px;line-height:1.6">
        Import a previously exported EduSnakes <code>.json</code> file.
        Choose how to handle subjects that already exist in your bank.
      </p>
      <div class="form-group">
        <label class="form-label">JSON File</label>
        <input class="form-input" type="file" id="_imp_file" accept=".json" style="padding:8px;cursor:pointer">
      </div>
      <div class="form-group">
        <label class="form-label">If subjects/topics already exist</label>
        <select class="form-input" id="_imp_mode">
          <option value="ask">Ask me — show merge/replace choice</option>
          <option value="merge">Merge — add new, skip existing</option>
          <option value="replace">Replace — overwrite with imported data</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="QM._readImportFile()">Next →</button>
      </div>`);
  },

  _readImportFile() {
    const file = document.getElementById('_imp_file').files[0];
    const mode = document.getElementById('_imp_mode').value;
    if (!file) return UI.toast('Please select a file', 'error');

    const reader = new FileReader();
    reader.onload = (e) => {
      this._importText = e.target.result;
      if (mode === 'ask') {
        this._showImportConflictDialog();
      } else {
        this._doImport(mode);
      }
    };
    reader.onerror = () => UI.toast('Failed to read file', 'error');
    reader.readAsText(file);
  },

  _showImportConflictDialog() {
    UI.showModal(`
      <div class="modal-title">🔀 How should we handle conflicts?</div>
      <p style="color:var(--ink2);font-size:13px;margin-bottom:20px;line-height:1.6">
        The file may contain subjects or topics that already exist in your bank.
      </p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-ghost" style="text-align:left;padding:14px 16px;height:auto;border-radius:12px"
                onclick="QM._doImport('merge')">
          <div style="font-size:15px;font-weight:800;margin-bottom:3px">🔀 Merge</div>
          <div style="font-size:12px;color:var(--ink2);font-weight:500">Add new questions and topics; leave existing ones untouched.</div>
        </button>
        <button class="btn btn-ghost" style="text-align:left;padding:14px 16px;height:auto;border-radius:12px"
                onclick="QM._doImport('replace')">
          <div style="font-size:15px;font-weight:800;margin-bottom:3px">🔄 Replace</div>
          <div style="font-size:12px;color:var(--ink2);font-weight:500">Overwrite matching subjects/topics with data from the file.</div>
        </button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
      </div>`);
  },

  _doImport(mode) {
    try {
      const imp = Bank.import(this._importText, mode);
      this._importText = null;
      UI.closeModal();
      const sc = imp.subjects?.length || 0;
      const qc = imp.questions?.length || 0;
      UI.toast(`Imported ${sc} subject${sc !== 1 ? 's' : ''}, ${qc} question${qc !== 1 ? 's' : ''} ✓`, 'success');
      this._render();
    } catch (err) {
      UI.toast('Import failed: ' + err.message, 'error');
    }
  },
};

/* ═══════════════════════════════════════════════════════════════
   GAME SETUP
═══════════════════════════════════════════════════════════════ */
const GameSetup = {
  step: 1,

  // Persistent config survives step navigation

    subjectId:    null,
    topicIds:       [],
    boardSize:      100,
    difficulty:     'medium',
    timerSecs:      30,
    qTypes:         'both',

    exactFinish:    false,

      id: `p${i+1}`, name: '', emoji: d.emoji, color: d.color

  },

  /* ── Entry point ── */
  init() {
    this.step = 1;
    // Reset player names (keep emoji/color prefs)
    this.cfg.players.forEach(p => { p.name = ''; });
    this._render();
  },

  /* ── Full re-render ── */
  _render() {
    this._renderStepBar();
    const panel = document.getElementById('gs-panel');
    panel.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'step-panel';
    div.innerHTML = this[`_step${this.step}`]();
    panel.appendChild(div);
  },

  /* ── Step indicator bar ── */
  _renderStepBar() {
    const labels = ['Content','Players','Board','Review'];
    let html = '';
    labels.forEach((lbl, i) => {
      const n    = i + 1;
      const cls  = n < this.step ? 'done' : n === this.step ? 'active' : '';
      const tick = n < this.step ? '✓' : n;
      html += `<div class="step-node ${cls}">
        <div class="step-circle">${tick}</div>
        <div class="step-label">${lbl}</div>
      </div>`;
      if (i < labels.length - 1) {
        html += `<div class="step-line ${n < this.step ? 'done' : ''}"></div>`;
      }
    });
    document.getElementById('gs-stepbar').innerHTML = html;
  },

  /* ══════════════════════════════════════
     STEP 1 — Content selection
  ══════════════════════════════════════ */
  _step1() {
    const subjects = Bank.subjects();

    if (subjects.length === 0) {
      return `
        <div class="step-title">Select Content</div>
        <div class="empty-state">
          <span class="es-icon">📚</span>
          <h3>No question bank yet</h3>
          <p>Add subjects and questions in the Question Bank before starting a game.</p>

        </div>

          <button class="btn btn-ghost" onclick="App.go('main')">← Menu</button>
        </div>`;
    }

    const subjBtns = subjects.map(s => {
      const on = this.cfg.subjectId === s.id ? 'on' : '';
      return `<button class="subj-btn ${on}" style="--sc:${s.color}"
                onclick="GS.pickSubject('${s.id}')">${s.icon} ${UI.esc(s.name)}</button>`;
    }).join('');

    let topicsHtml = '';
    let tallyHtml  = '';

    if (this.cfg.subjectId) {
      const s      = Bank.subject(this.cfg.subjectId);
      const topics = Bank.topicsOf(this.cfg.subjectId);

      if (topics.length === 0) {
        topicsHtml = `<p style="color:var(--ink3);font-size:13px;margin-top:8px">No topics in this subject yet — add some in the Question Bank.</p>`;
      } else {
        topicsHtml = `<div class="topics-pick">` + topics.map(t => {
          const on  = this.cfg.topicIds.includes(t.id) ? 'on' : '';
          const qc  = Bank.topicQCount(t.id);
          return `
            <div class="topic-pick-row ${on}" style="--tc:${s.color}" onclick="GS.toggleTopic('${t.id}')">
              <div class="topic-check">${on ? '✓' : ''}</div>
              <span style="flex:1;font-weight:600;font-size:14px">${UI.esc(t.name)}</span>
              <span class="pill">${qc} Q</span>
            </div>`;
        }).join('') + `</div>`;

        // Tally questions in selected topics
        if (this.cfg.topicIds.length > 0) {
          const qs    = this.cfg.topicIds.flatMap(id => Bank.questionsOf(id));
          const easy   = qs.filter(q => q.difficulty === 'easy').length;
          const medium = qs.filter(q => q.difficulty === 'medium').length;
          const hard   = qs.filter(q => q.difficulty === 'hard').length;
          const warn   = (d, n) => n === 0
            ? `<span class="q-tally-item warn-chip">⚠️ 0 ${d}</span>`
            : `<span class="q-tally-item ok-chip">✓ ${n} ${d}</span>`;
          tallyHtml = `<div class="q-tally">${warn('Easy',easy)}${warn('Medium',medium)}${warn('Hard',hard)}<span class="q-tally-item" style="color:var(--ink2)">${qs.length} total</span></div>`;
        }
      }
    }

    return `
      <div class="step-title">Select Content</div>
      <div class="step-sub">Choose which subject and topics to include. Questions will be drawn from your selection during the game.</div>

      <div class="form-group">
        <div class="form-label">Subject</div>
        <div class="subject-pick">${subjBtns}</div>
      </div>

      ${this.cfg.subjectId ? `
      <div class="form-group">
        <div class="form-label">Topics <span style="color:var(--ink3);font-weight:400;font-size:11px">(select one or more)</span></div>
        ${topicsHtml}

      </div>` : ''}

      <div class="step-nav">
        <button class="btn btn-ghost" onclick="App.go('main')">← Menu</button>
        <button class="btn btn-primary" onclick="GS.next()">Players →</button>
      </div>`;
  },

  /* ══════════════════════════════════════
     STEP 2 — Player setup
  ══════════════════════════════════════ */
  _step2() {
    const countBtns = [2,3,4,5,6,7,8,9,10].map(n =>
      `<button class="count-btn ${n === this.cfg.playerCount ? 'on' : ''}"
               onclick="GS.setCount(${n})">${n}</button>`

    const cards = Array.from({ length: this.cfg.playerCount }, (_, i) => {

        `<div class="emoji-chip ${p.emoji === e ? 'on' : ''}" style="--pc:${p.color}"

        `<div class="color-dot ${p.color === c ? 'on' : ''}"

      return `
        <div class="player-card" id="pc-${i}">
          <div class="pc-header">

      </div>

      <div class="step-nav">
        <button class="btn btn-ghost" onclick="GS.prev()">← Content</button>
        <button class="btn btn-primary" onclick="GS.next()">Board →</button>

  },

  /* ══════════════════════════════════════
     STEP 3 — Board configuration
  ══════════════════════════════════════ */
  _step3() {

      `<div class="board-card ${this.cfg.boardSize === b.size ? 'on' : ''}"
            onclick="GS.setBoard(${b.size})">
        <span class="bc-icon">${b.icon}</span>
        <div class="bc-label">${b.label}</div>
        <div class="bc-meta">${b.size} squares · ${b.desc}</div>
      </div>`
    ).join('');

    const diffBtns = ['easy','medium','hard'].map(d => {
      const counts = BOARD_COUNTS[this.cfg.boardSize]?.[d] ?? { l:'?', s:'?' };
      const label  = d[0].toUpperCase() + d.slice(1);
      return `<button class="tog diff-tog ${d}-tog ${this.cfg.difficulty === d ? 'on' : ''}"
                       onclick="GS.setDiff('${d}')">
                <span class="diff-label">${label}</span>
                <span class="diff-counts">${counts.l}L · ${counts.s}S</span>
              </button>`;
    }).join('');

    const timerBtns = TIMER_OPTIONS.map(t =>
      `<button class="tog ${this.cfg.timerSecs === t ? 'on' : ''}"
               onclick="GS.setTimer(${t})">${t === 0 ? 'Off' : t+'s'}</button>`

    const typeBtns = ['both','objective','written'].map(v => {
      const label = { both:'Both', objective:'MCQ only', written:'Written only' }[v];

    }).join('');

    return `
      <div class="step-title">Board Settings</div>
      <div class="step-sub">Configure the board and how questions work during play.</div>

  /* ══════════════════════════════════════
     STEP 4 — Review & Start
  ══════════════════════════════════════ */
  _step4() {

    const topics   = cfg.topicIds.map(id => Bank.topic(id));
    const qs       = cfg.topicIds.flatMap(id => Bank.questionsOf(id))
                        .filter(q => cfg.qTypes === 'both' || q.type === cfg.qTypes);

    const easy   = qs.filter(q => q.difficulty === 'easy').length;
    const medium = qs.filter(q => q.difficulty === 'medium').length;
    const hard   = qs.filter(q => q.difficulty === 'hard').length;

    const warnings = [];
    if (easy   === 0) warnings.push('No Easy questions — squares 1–33 will reuse available questions.');
    if (medium === 0) warnings.push('No Medium questions — squares 34–66 will reuse available questions.');
    if (hard   === 0) warnings.push('No Hard questions — squares 67+ will reuse available questions.');

    const warnHtml = warnings.length
      ? `<div class="q-warn">⚠️ ${warnings.join('<br>')}</div>` : '';

    const playerChips = cfg.players.slice(0, cfg.playerCount).map(p =>
      `<div class="review-player" style="border-color:${p.color}44">

    const bOpt      = BOARD_OPTIONS.find(b => b.size === cfg.boardSize);
    const timerLbl  = cfg.timerSecs === 0 ? 'Off' : cfg.timerSecs + 's';
    const qTypeLbl  = { both:'Both', objective:'MCQ only', written:'Written only' }[cfg.qTypes];
    const diffLbl   = cfg.difficulty[0].toUpperCase() + cfg.difficulty.slice(1);
    const topicLbl  = topics.map(t => t.name).join(', ');

    return `
      <div class="step-title">Ready to Play!</div>

        <div class="review-players">${playerChips}</div>

          <span class="stat-chip hard">Hard ${hard}</span>

          <div class="review-item"><div class="ri-key">Questions</div><div class="ri-val">${qTypeLbl}</div></div>
        </div>
      </div>

      <div class="step-nav">
        <button class="btn btn-ghost" onclick="GS.prev()">← Board</button>
      </div>
      <div style="margin-top:16px">
        <button class="start-btn" onclick="GS.start()">🎮 Start Game!</button>
      </div>`;
  },

  /* ══════════════════════════════════════
     NAVIGATION
  ══════════════════════════════════════ */
  next() {
    const err = this._validate();
    if (err) return UI.toast(err, 'error');
    if (this.step < 4) { this.step++; this._render(); }
  },

  prev() {
    if (this.step > 1) { this.step--; this._render(); }
  },

  _validate() {
    if (this.step === 1) {
      if (!this.cfg.subjectId) return 'Please select a subject.';
      if (this.cfg.topicIds.length === 0) return 'Please select at least one topic.';
      const qs = this.cfg.topicIds.flatMap(id => Bank.questionsOf(id));
      if (qs.length === 0) return 'Selected topics have no questions. Add some in the Question Bank first.';
    }
    if (this.step === 2) {
      const names = this.cfg.players.slice(0, this.cfg.playerCount).map(p => p.name.trim());
      if (names.some(n => !n)) return 'Please enter a name for every player.';
      const unique = new Set(names.map(n => n.toLowerCase()));
      if (unique.size < names.length) return 'Each player must have a unique name.';
    }
    return null;
  },

  start() {
    const err = this._validate();
    if (err) return UI.toast(err, 'error');
    // Build the final config and hand it to the app
    App.gameConfig = {
      ...this.cfg,
      players: this.cfg.players.slice(0, this.cfg.playerCount).map(p => ({ ...p, name: p.name.trim() })),
    };
    App.go('game-board');
  },

  /* ══════════════════════════════════════
     EVENT HANDLERS (called from inline HTML)
  ══════════════════════════════════════ */
  pickSubject(id) {
    // Reset topics when subject changes
    if (this.cfg.subjectId !== id) this.cfg.topicIds = [];
    this.cfg.subjectId = id;
    this._render();
  },

  toggleTopic(id) {
    const idx = this.cfg.topicIds.indexOf(id);
    if (idx >= 0) this.cfg.topicIds.splice(idx, 1);
    else          this.cfg.topicIds.push(id);
    this._render();
  },

  setCount(n) {
    this.cfg.playerCount = n;
    this._render();
  },

  setName(idx, val) {
    this.cfg.players[idx].name = val;
    // Update avatar header live without full re-render
    const hdr = document.querySelector(`#pc-${idx} .pc-num`);
    if (hdr) hdr.textContent = val.trim() || `Player ${idx+1}`;
  },

  pickEmoji(idx, emoji) {
    this.cfg.players[idx].emoji = emoji;
    this._render();
  },

  pickColor(idx, color) {
    this.cfg.players[idx].color = color;
    this._render();
  },

  setBoard(size)     { this.cfg.boardSize     = size;  this._render(); },
  setDiff(d)         { this.cfg.difficulty    = d;     this._render(); },
  setTimer(t)        { this.cfg.timerSecs     = t;     this._render(); },
  setQType(v)        { this.cfg.qTypes        = v;     this._render(); },
  setPowerups(v)     { this.cfg.enablePowerups = v;    this._render(); },
  setExactFinish(v)  { this.cfg.exactFinish    = v;    this._render(); },
};

/* ═══════════════════════════════════════════════════════════════
   BOARD GENERATOR — constraint-based flat-pool placement
   Picks from/to pairs freely across the whole board.
   No zones or pre-partitioning — pure constraint satisfaction.
═══════════════════════════════════════════════════════════════ */
const BoardGen = {

  generate(size, difficulty, enablePowerups = true, timerEnabled = true) {
    const counts = BOARD_COUNTS[size]?.[difficulty] ?? BOARD_COUNTS[100].medium;
    for (let attempt = 0; attempt < 250; attempt++) {
      const result = this._place(size, counts, enablePowerups, timerEnabled);
      if (result) return { ...result, size };
    }
    return this._fallback(size, counts, enablePowerups, timerEnabled);
  },

  _rand(min, max) {
    return min + Math.floor(Math.random() * (max - min + 1));
  },

  _place(size, counts, enablePowerups = true, timerEnabled = true) {
    const MIN_DIST = 8;
    const MAX_DIST = Math.floor(size * 0.38);
    const END_GAP  = 3;

    const occupied    = new Set([1, size]);
    const startPoints = new Set();

    const snakes  = [];
    const ladders = [];

    // Convert square number to 2-D grid coords (zig-zag row layout)
    const cols  = 10;
    const _grid = sq => {
      const rb = Math.floor((sq - 1) / cols);
      const ci = (sq - 1) % cols;
      return { r: rb, c: rb % 2 === 0 ? ci : cols - 1 - ci };
    };

    /* Check whether `from`/`to` are free and no two heads share adjacent grid cells */
    const canPlace = (from, to) => {
      if (occupied.has(from) || occupied.has(to)) return false;
      if (from === to) return false;
      // 2-D Chebyshev ≥ 2 prevents visual crowding of heads
      const fg = _grid(from);
      for (const sp of startPoints) {
        const sg = _grid(sp);
        if (Math.abs(fg.r - sg.r) < 2 && Math.abs(fg.c - sg.c) < 2) return false;
      }
      // End point must be END_GAP away from every occupied square
      for (const sq of occupied) {
        if (sq === 1 || sq === size) continue;
        if (Math.abs(sq - to) < END_GAP) return false;
      }
      return true;
    };

    const commit = (from, to) => {
      occupied.add(from); occupied.add(to);
      startPoints.add(from);
    };

    /* ── Place ladders ──
       First 2 ladders forced to start early (sq ≤ 30% of board)
       so beginners get a reward path from the start. */
    const earlyMax = Math.max(15, Math.floor(size * 0.30));
    let earlyCount = 0;

    for (let i = 0; i < counts.l; i++) {
      let placed = false;
      for (let a = 0; a < 500 && !placed; a++) {
        // Bias: first 2 ladders → lower 30%; rest → lower 65%
        let from;
        if (earlyCount < 2) {
          from = a < 250
            ? this._rand(2, earlyMax)
            : this._rand(2, Math.floor(size * 0.65));
        } else {
          from = Math.random() < 0.70
            ? this._rand(2, Math.floor(size * 0.65))
            : this._rand(2, size - MIN_DIST - 1);
        }

        const toMin = from + MIN_DIST;
        const toMax = Math.min(size - 1, from + MAX_DIST);
        if (toMin > toMax) continue;
        const to = this._rand(toMin, toMax);

        if (!canPlace(from, to)) continue;
        ladders.push({ from, to });
        commit(from, to);
        if (from <= earlyMax) earlyCount++;
        placed = true;
      }
      if (!placed) return null;
    }

    /* ── Place snakes ──
       60% of snakes start in the second half (sq > 50%) for late-game intensity.
       Remaining 40% can appear anywhere on the board. */
    const halfMin   = Math.floor(size * 0.50) + 1;
    const lateQuota = Math.ceil(counts.s * 0.6);
    let   lateCount = 0;

    for (let i = 0; i < counts.s; i++) {
      let placed = false;
      for (let a = 0; a < 500 && !placed; a++) {
        let from;
        if (lateCount < lateQuota) {
          from = a < 250
            ? this._rand(halfMin, size - 1)
            : this._rand(MIN_DIST + 1, size - 1);
        } else {
          from = this._rand(MIN_DIST + 1, size - 1);
        }

        const toMax = from - MIN_DIST;
        const toMin = Math.max(2, from - MAX_DIST);
        if (toMax < toMin) continue;
        const to = this._rand(toMin, toMax);

        if (!canPlace(from, to)) continue;
        snakes.push({ from, to });
        commit(from, to);
        if (from >= halfMin) lateCount++;
        placed = true;
      }
      if (!placed) return null;
    }

    const spc = this._placeSpecials(size, occupied, enablePowerups, timerEnabled);
    return { snakes, ladders, powerupSqs: spc.powerupSqs, wildcardSqs: spc.wildcardSqs };
  },

  /* Pick free squares for power-up and wildcard cells */
  _placeSpecials(size, occupied, enablePowerups = true, timerEnabled = true) {
    if (!enablePowerups) return { powerupSqs: [], wildcardSqs: [] };
    const nPu = size >= 75 ? 7 : 5;
    const nWc = size >= 75 ? 4 : 3;
    const free = [];
    for (let sq = 2; sq < size; sq++) {
      if (!occupied.has(sq)) free.push(sq);
    }
    // Fisher-Yates shuffle
    for (let i = free.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [free[i], free[j]] = [free[j], free[i]];
    }
    // Exclude Extra Time when no timer is running
    const pool = timerEnabled ? POWERUPS : POWERUPS.filter(p => p.id !== 'extratime');
    const usedPu = new Set();
    const powerupSqs = free.slice(0, nPu).map(sq => {
      let pu;
      do { pu = pool[Math.floor(Math.random() * pool.length)]; }
      while (usedPu.has(pu.id) && usedPu.size < pool.length);
      usedPu.add(pu.id);
      return { sq, puId: pu.id, emoji: pu.emoji };
    });
    const wildcardSqs = free.slice(nPu, nPu + nWc).map(sq => {
      const wc = WILDCARDS[Math.floor(Math.random() * WILDCARDS.length)];
      return { sq, wcId: wc.id, emoji: wc.emoji };
    });
    return { powerupSqs, wildcardSqs };
  },

  /* Deterministic fallback — evenly spread, never fails */
  _fallback(size, counts, enablePowerups = true, timerEnabled = true) {
    const snakes  = [];
    const ladders = [];
    const occupied = new Set([1, size]);
    const step = Math.floor(size / (counts.l + counts.s + 2));

    let cur = 4;
    for (let i = 0; i < counts.l; i++) {
      const from = Math.min(cur, Math.floor(size * 0.65));
      const to   = Math.min(from + 12 + i * 6, size - 1);
      if (from < to && !occupied.has(from) && !occupied.has(to)) {
        ladders.push({ from, to });
        occupied.add(from); occupied.add(to);
      }
      cur += step;
    }
    cur = Math.floor(size * 0.28);
    for (let i = 0; i < counts.s; i++) {
      const from = Math.min(cur + 14, size - 1);
      const to   = Math.max(from - 14 - i * 4, 2);
      if (from > to && !occupied.has(from) && !occupied.has(to)) {
        snakes.push({ from, to });
        occupied.add(from); occupied.add(to);
      }
      cur += step;
    }
    const spc = this._placeSpecials(size, occupied, enablePowerups, timerEnabled);
    return { snakes, ladders, size, powerupSqs: spc.powerupSqs, wildcardSqs: spc.wildcardSqs };
  },
};


/* ═══════════════════════════════════════════════════════════════
   BOARD RENDERER — HTML5 Canvas drawing
═══════════════════════════════════════════════════════════════ */
const BoardRenderer = {
  canvas:    null,
  ctx:       null,
  cellSize:  60,
  cols:      10,
  rows:      10,
  board:     null,
  players:   [],
  renderPos: [],   // display square positions (may differ from game pos during animation)
  tweenPos:  null, // { playerIdx, x, y } — pixel-level override during smooth curve animation
  _homeH:    46,   // height of "home strip" drawn below board for position-0 tokens

  init(canvas, board, players) {
    this.canvas    = canvas;
    this.ctx       = canvas.getContext('2d');
    this.board     = board;
    this.cols      = 10;
    this.rows      = Math.ceil(board.size / 10);
    this.players   = players;
    this.renderPos = players.map(p => p.position);
    this.tweenPos  = null;
    this._resize();
  },

  _resize() {
    const area = this.canvas.parentElement;
    if (!area) return;
    const avail = Math.min(area.offsetWidth - 32, area.offsetHeight - 32);
    // Leave room for home strip below the board
    const boardPixels = avail - this._homeH;
    this.cellSize = Math.max(28, Math.floor(boardPixels / this.cols));
    this.canvas.width  = this.cellSize * this.cols;
    this.canvas.height = this.cellSize * this.rows + this._homeH;
    this.draw();
  },

  resize() { this._resize(); },

  draw() {
    if (!this.ctx) return;
    const { ctx } = this;
    ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this._drawSquares();
    this.board.ladders.forEach(l     => this._drawLadder(l.from, l.to));
    this.board.snakes.forEach((s, i) => this._drawSnake(s.from, s.to, i));
    this._drawTokens();
  },

  /* ── Coordinate helpers ── */
  _sqGrid(sq) {
    // Returns { gridRow, gridCol } — gridRow 0 = top of canvas
    const rowFromBottom = Math.floor((sq - 1) / this.cols);
    const colInRow      = (sq - 1) % this.cols;
    const gridCol       = rowFromBottom % 2 === 0 ? colInRow : (this.cols - 1 - colInRow);
    const gridRow       = this.rows - 1 - rowFromBottom;
    return { gridRow, gridCol };
  },

  _sqCenter(sq) {
    if (sq <= 0) {
      // Home strip — just below the left end of the board (near square 1)
      const sq1 = this._sqCenter(1);
      return { x: sq1.x, y: this.rows * this.cellSize + this._homeH * 0.5 };
    }
    const { gridRow, gridCol } = this._sqGrid(sq);
    const cs = this.cellSize;
    return { x: gridCol * cs + cs / 2, y: gridRow * cs + cs / 2 };
  },

  /* ── Draw grid squares ── */
  _drawSquares() {
    const { ctx, cellSize: cs, cols, rows, board } = this;

    // ── Dark muted row palette (light / dark alternating per row) ──
    // Each pair is [lighter, darker] — checks within row alternate between them
    const ROW_PAL = [
      ['#1E2D40','#192538'],['#1A2E28','#152620'],['#2A2018','#221A12'],
      ['#1E2840','#192038'],['#281E38','#201830'],['#2A1E28','#221820'],
      ['#1E2A2A','#182424'],['#28281E','#202018'],['#281E20','#201820'],
      ['#1E2828','#182222'],
    ];

    // ── Board outer background ──
    ctx.fillStyle = '#0D1520';
    if (ctx.roundRect) {
      ctx.beginPath(); ctx.roundRect(0, 0, cols * cs, rows * cs, 14); ctx.fill();
    } else {
      ctx.fillRect(0, 0, cols * cs, rows * cs);
    }

    const _puMap = new Map((board.powerupSqs  || []).map(p => [p.sq, p.emoji || '⭐']));
    const _wcMap = new Map((board.wildcardSqs || []).map(w => [w.sq, w.emoji || '❓']));

    for (let sq = 1; sq <= board.size; sq++) {
      const { gridRow, gridCol } = this._sqGrid(sq);
      const x = gridCol * cs;
      const y = gridRow * cs;

      // Visual row (bottom of board = row 0)
      const visualRow = rows - 1 - gridRow;
      const [c1, c2]  = ROW_PAL[visualRow % ROW_PAL.length];
      const checker   = (gridRow + gridCol) % 2 === 0;
      ctx.fillStyle   = checker ? c1 : c2;

      const pad = 2;
      ctx.fillRect(x + pad, y + pad, cs - pad*2, cs - pad*2);

      // Thin cell border for grid definition
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(x + pad + 0.4, y + pad + 0.4, cs - pad*2 - 0.8, cs - pad*2 - 0.8);

      // ── Square number ──
      const numSz = Math.max(8, cs * 0.20);
      ctx.fillStyle = 'rgba(245,240,232,0.55)';
      ctx.font = `700 ${numSz}px Syne, system-ui`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(sq, x + pad + 3, y + pad + 2);

      // ── Final square: lime radial burst + trophy ──
      if (sq === board.size) {
        const grd = ctx.createRadialGradient(x+cs/2, y+cs/2, 0, x+cs/2, y+cs/2, cs*0.65);
        grd.addColorStop(0, 'rgba(168,230,61,0.85)');
        grd.addColorStop(0.5, 'rgba(168,230,61,0.35)');
        grd.addColorStop(1, 'rgba(168,230,61,0.05)');
        ctx.fillStyle = grd;
        ctx.fillRect(x + pad, y + pad, cs - pad*2, cs - pad*2);
        ctx.font = `${cs * 0.5}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🏆', x + cs/2, y + cs/2);
      }

      // ── Square 1: START star marker ──
      if (sq === 1) {
        ctx.font = `${cs * 0.4}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.globalAlpha = 0.5;
        ctx.fillText('⭐', x + cs/2, y + cs/2 + 4);
        ctx.globalAlpha = 1;
      }

      // Special square emoji icons (bottom-right corner, each type shows its own icon)
      if (_puMap.has(sq)) {
        ctx.font = `${Math.max(9, cs * 0.30)}px serif`;
        ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
        ctx.globalAlpha = 0.88;
        ctx.fillText(_puMap.get(sq), x + cs - pad - 1, y + cs - pad - 1);
        ctx.globalAlpha = 1;
      }
      if (_wcMap.has(sq)) {
        ctx.font = `${Math.max(9, cs * 0.30)}px serif`;
        ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
        ctx.globalAlpha = 0.88;
        ctx.fillText(_wcMap.get(sq), x + cs - pad - 1, y + cs - pad - 1);
        ctx.globalAlpha = 1;
      }
    }

    // ── Outer board frame ──
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 2;
    if (ctx.roundRect) {
      ctx.beginPath(); ctx.roundRect(1, 1, cols*cs - 2, rows*cs - 2, 8); ctx.stroke();
    } else {
      ctx.strokeRect(1, 1, cols*cs - 2, rows*cs - 2);
    }

    // ── Home strip (below board) ──
    const hy = rows * cs;
    ctx.fillStyle = '#1A2634';
    ctx.fillRect(0, hy, cols * cs, this._homeH);

    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, hy); ctx.lineTo(cols*cs, hy); ctx.stroke();

    // Dashed lane dividers
    ctx.setLineDash([4, 6]);
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 1;
    const numP = this.players.length || 4;
    for (let i = 1; i < numP; i++) {
      const lx = (cols * cs / numP) * i;
      ctx.beginPath(); ctx.moveTo(lx, hy); ctx.lineTo(lx, hy + this._homeH); ctx.stroke();
    }
    ctx.setLineDash([]);

    // Label
    ctx.fillStyle = 'rgba(168,230,61,0.85)';
    ctx.font = `700 ${Math.max(9, this._homeH * 0.32)}px Syne, system-ui`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('S T A R T', cols * cs / 2, hy + this._homeH / 2);
  },

  /* ── Draw snake ── */
  _drawSnake(headSq, tailSq, idx = 0) {
    // headSq = higher number (player slides down FROM here)
    // tailSq = lower number (player lands at)
    const { ctx, cellSize: cs } = this;
    const pal = SNAKE_PALETTE[idx % SNAKE_PALETTE.length];
    const H = this._sqCenter(headSq);
    const T = this._sqCenter(tailSq);

    const sqDist = headSq - tailSq;   // square-count span → selects visual tier

    // Per-tier: body stroke width, head radius, lateral wave amplitude
    let bodyW, hr, waveAmp;
    if (sqDist <= 20) {
      bodyW = cs * 0.17;  hr = cs * 0.155;  waveAmp = cs * 0.45;  // short: gentle arc
    } else if (sqDist <= 40) {
      bodyW = cs * 0.21;  hr = cs * 0.185;  waveAmp = cs * 0.78;  // medium: one S-curve
    } else {
      bodyW = cs * 0.27;  hr = cs * 0.22;   waveAmp = cs * 1.00;  // long: two S-curves
    }

    const dx = H.x - T.x, dy = H.y - T.y;
    const pixLen = Math.sqrt(dx*dx + dy*dy) || 1;
    const px = -dy/pixLen, py = dx/pixLen;   // perpendicular unit vector
    const w = waveAmp;

    // Build chain of cubic bezier segments starting from T
    let segs;      // [{c1x,c1y,c2x,c2y,ex,ey}]
    let lastC2;    // final C2 control point → tongue direction

    if (sqDist <= 20) {
      // Single gentle arc: both CPs lean the same side
      const c1x = T.x + dx*0.33 + px*w,     c1y = T.y + dy*0.33 + py*w;
      const c2x = T.x + dx*0.67 + px*w*0.5, c2y = T.y + dy*0.67 + py*w*0.5;
      segs = [{ c1x, c1y, c2x, c2y, ex: H.x, ey: H.y }];
      lastC2 = { x: c2x, y: c2y };
    } else if (sqDist <= 40) {
      // One S-curve: CPs lean opposite sides
      const c1x = T.x + dx*0.26 + px*w,  c1y = T.y + dy*0.26 + py*w;
      const c2x = T.x + dx*0.74 - px*w,  c2y = T.y + dy*0.74 - py*w;
      segs = [{ c1x, c1y, c2x, c2y, ex: H.x, ey: H.y }];
      lastC2 = { x: c2x, y: c2y };
    } else {
      // Two S-curves: three C1-continuous bezier segments
      // C1 continuity at joints: each segment's c1 mirrors the previous c2 around the joint
      const p1x = T.x + dx*0.33, p1y = T.y + dy*0.33;
      const p2x = T.x + dx*0.67, p2y = T.y + dy*0.67;
      // Seg 1 (T→P1): arcs right
      const a1x = T.x + dx*0.12 + px*w,     a1y = T.y + dy*0.12 + py*w;
      const a2x = T.x + dx*0.21 + px*w,     a2y = T.y + dy*0.21 + py*w;
      // Seg 2 (P1→P2): arcs left [c1 = 2·P1 − a2, satisfying C1 at P1]
      const b1x = T.x + dx*0.45 - px*w,     b1y = T.y + dy*0.45 - py*w;
      const b2x = T.x + dx*0.55 - px*w,     b2y = T.y + dy*0.55 - py*w;
      // Seg 3 (P2→H): tapers right [c1 = 2·P2 − b2, satisfying C1 at P2]
      const c1x = T.x + dx*0.79 + px*w,     c1y = T.y + dy*0.79 + py*w;
      const c2x = H.x - dx*0.12 + px*w*0.4, c2y = H.y - dy*0.12 + py*w*0.4;
      segs = [
        { c1x: a1x, c1y: a1y, c2x: a2x, c2y: a2y, ex: p1x, ey: p1y },
        { c1x: b1x, c1y: b1y, c2x: b2x, c2y: b2y, ex: p2x, ey: p2y },
        { c1x: c1x, c1y: c1y, c2x: c2x, c2y: c2y, ex: H.x, ey: H.y },
      ];
      lastC2 = { x: c2x, y: c2y };
    }

    // Trace the full bezier chain (ox/oy shift for shadow pass)
    const tracePath = (ox = 0, oy = 0) => {
      ctx.beginPath();
      ctx.moveTo(T.x + ox, T.y + oy);
      segs.forEach(s =>
        ctx.bezierCurveTo(s.c1x+ox, s.c1y+oy, s.c2x+ox, s.c2y+oy, s.ex+ox, s.ey+oy)
      );
    };
    const rc = 'round';

    // ── Outer glow/shadow ──
    tracePath(3, 4);
    ctx.strokeStyle = 'rgba(0,0,0,0.38)';
    ctx.lineWidth = bodyW * 1.35;  ctx.lineCap = rc;  ctx.lineJoin = rc;  ctx.stroke();

    // ── Body undercoat (dark outline) ──
    tracePath();
    ctx.strokeStyle = pal.head;
    ctx.lineWidth = bodyW * 1.17;  ctx.lineCap = rc;  ctx.lineJoin = rc;  ctx.stroke();

    // ── Gradient body (tail → head palette) ──
    const grad = ctx.createLinearGradient(T.x, T.y, H.x, H.y);
    grad.addColorStop(0,    pal.tail);
    grad.addColorStop(0.45, pal.body);
    grad.addColorStop(1,    pal.head);
    tracePath();
    ctx.strokeStyle = grad;
    ctx.lineWidth = bodyW;  ctx.lineCap = rc;  ctx.lineJoin = rc;  ctx.stroke();

    // ── Scale highlight dashes ──
    tracePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.30)';
    ctx.lineWidth = bodyW * 0.38;
    ctx.setLineDash([cs * 0.14, cs * 0.18]);  ctx.stroke();  ctx.setLineDash([]);

    // ── Tapered tail ellipse (oriented along body direction at T) ──
    const tailAng = Math.atan2(segs[0].c1y - T.y, segs[0].c1x - T.x);
    ctx.save();
    ctx.translate(T.x, T.y);
    ctx.rotate(tailAng);
    ctx.beginPath();
    ctx.ellipse(0, 0, bodyW * 0.6, bodyW * 0.28, 0, 0, Math.PI * 2);
    ctx.fillStyle = pal.tail;  ctx.fill();
    ctx.restore();

    // ── Head circle ──
    ctx.beginPath();  ctx.arc(H.x + 1.5, H.y + 2, hr + 1, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';  ctx.fill();
    ctx.beginPath();  ctx.arc(H.x, H.y, hr, 0, Math.PI*2);
    ctx.fillStyle = pal.head;  ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';  ctx.lineWidth = 2;  ctx.stroke();

    // ── Eyes ──
    const eo = hr * 0.5, er = hr * 0.3;
    [-1, 1].forEach(s => {
      const ex = H.x + s * eo * 0.75, ey = H.y - er * 0.5;
      ctx.beginPath();  ctx.arc(ex, ey, er, 0, Math.PI*2);
      ctx.fillStyle = '#fff';  ctx.fill();
      ctx.beginPath();  ctx.arc(ex + er*0.2, ey + er*0.1, er*0.55, 0, Math.PI*2);
      ctx.fillStyle = '#111';  ctx.fill();
      ctx.beginPath();  ctx.arc(ex - er*0.1, ey - er*0.25, er*0.2, 0, Math.PI*2);
      ctx.fillStyle = '#fff';  ctx.fill();
    });

    // ── Forked tongue ──
    const ta = Math.atan2(H.y - lastC2.y, H.x - lastC2.x);
    const tl = hr * 1.2;
    const tx = H.x + Math.cos(ta) * hr, ty = H.y + Math.sin(ta) * hr;
    ctx.strokeStyle = '#ff4466';  ctx.lineWidth = 1.5;  ctx.lineCap = 'round';
    ctx.beginPath();  ctx.moveTo(tx, ty);  ctx.lineTo(tx + Math.cos(ta)*tl, ty + Math.sin(ta)*tl);  ctx.stroke();
    const fX = tx + Math.cos(ta)*tl*0.6, fY = ty + Math.sin(ta)*tl*0.6;
    ctx.beginPath();  ctx.moveTo(fX, fY);  ctx.lineTo(tx + Math.cos(ta+0.5)*tl, ty + Math.sin(ta+0.5)*tl);  ctx.stroke();
    ctx.beginPath();  ctx.moveTo(fX, fY);  ctx.lineTo(tx + Math.cos(ta-0.5)*tl, ty + Math.sin(ta-0.5)*tl);  ctx.stroke();
  },

  /* ── Draw ladder ── */
  _drawLadder(baseSq, topSq) {
    // baseSq = lower number (foot of ladder)
    // topSq  = higher number (top of ladder)
    const { ctx, cellSize: cs } = this;
    const B = this._sqCenter(baseSq);
    const T = this._sqCenter(topSq);
    const dx = T.x - B.x, dy = T.y - B.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;

    const sqDist = topSq - baseSq;   // square span → selects visual tier

    // Rail width and rung count scale with ladder length
    // Rung count uses baseSq parity for a deterministic (non-flickering) variation
    let rw, nRungs;
    if (sqDist <= 20) {
      rw = cs * 0.12;  nRungs = 2;
    } else if (sqDist <= 40) {
      rw = cs * 0.14;  nRungs = 3 + (baseSq % 2);  // 3 or 4
    } else {
      rw = cs * 0.17;  nRungs = 5 + (baseSq % 2);  // 5 or 6
    }

    const px = -dy/len * rw, py = dx/len * rw;  // perpendicular offset for rail spread

    const drawRail = (offX, offY, color, lw) => {
      ctx.strokeStyle = color;  ctx.lineWidth = lw;  ctx.lineCap = 'round';
      ctx.beginPath();  ctx.moveTo(B.x - px + offX, B.y - py + offY);  ctx.lineTo(T.x - px + offX, T.y - py + offY);  ctx.stroke();
      ctx.beginPath();  ctx.moveTo(B.x + px + offX, B.y + py + offY);  ctx.lineTo(T.x + px + offX, T.y + py + offY);  ctx.stroke();
    };

    const railLW = rw * 0.88;
    drawRail(3, 4, 'rgba(0,0,0,0.30)', railLW);   // outer shadow
    drawRail(0, 0, '#8A5A18', railLW);            // dark amber base
    drawRail(0, 0, '#FFB347', rw * 0.62);          // amber lit face

    // ── Rungs (evenly spaced between base and top, not at endpoints) ──
    const rungLW = rw * 0.56;
    for (let i = 1; i <= nRungs; i++) {
      const t = i / (nRungs + 1);
      const rx = B.x + dx*t, ry = B.y + dy*t;

      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = rungLW * 1.09;  ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(rx - px*1.3 + 2, ry - py*1.3 + 2.5);
      ctx.lineTo(rx + px*1.3 + 2, ry + py*1.3 + 2.5);
      ctx.stroke();

      ctx.strokeStyle = '#CC8A20';  ctx.lineWidth = rungLW;
      ctx.beginPath();
      ctx.moveTo(rx - px*1.3, ry - py*1.3);
      ctx.lineTo(rx + px*1.3, ry + py*1.3);
      ctx.stroke();
    }

    // ── Base & top cap circles (radius scales with rail width) ──
    const capR = rw * 0.79;
    [B, T].forEach((pt, ti) => {
      ctx.beginPath();  ctx.arc(pt.x + 1.5, pt.y + 2.5, capR, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';  ctx.fill();
      ctx.beginPath();  ctx.arc(pt.x, pt.y, capR, 0, Math.PI*2);
      ctx.fillStyle = ti === 0 ? '#FFB347' : '#A8E63D';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';  ctx.lineWidth = 1.5;  ctx.stroke();
    });
  },

  /* Small floating emoji near a square */
  _drawSquareLabel(sq, emoji, _color) {
    const { ctx, cellSize: cs } = this;
    const { gridRow, gridCol } = this._sqGrid(sq);
    const x = gridCol * cs + cs * 0.72;
    const y = gridRow * cs + cs * 0.72;
    ctx.font = `${cs * 0.28}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(emoji, x, y);
  },

  /* ── Draw player tokens ── */
  _drawTokens() {
    const { cellSize: cs } = this;
    const tweenIdx = this.tweenPos ? this.tweenPos.playerIdx : -1;

    // Group static (non-tweening) tokens by position
    const byPos = {};
    this.renderPos.forEach((pos, i) => {
      if (i === tweenIdx) return;
      if (!byPos[pos]) byPos[pos] = [];
      byPos[pos].push(i);
    });

    Object.entries(byPos).forEach(([posKey, idxs]) => {
      const posNum = parseInt(posKey);
      const total  = idxs.length;

      idxs.forEach((pi, gi) => {
        const p = this.players[pi];
        let cx, cy;

        if (posNum <= 0) {
          // Home strip — spread tokens evenly across the strip
          const spacing = (this.cols * cs) / (total + 1);
          cx = spacing * (gi + 1);
          cy = this.rows * cs + this._homeH * 0.5;
        } else {
          const centre = this._sqCenter(posNum);
          const angle  = total > 1 ? (gi / total) * Math.PI*2 - Math.PI/2 : 0;
          const offset = total > 1 ? cs * 0.2 : 0;
          cx = centre.x + Math.cos(angle) * offset;
          cy = centre.y + Math.sin(angle) * offset;
        }

        const r = cs * (total > 1 ? 0.2 : 0.27);
        this._drawOneToken(p, cx, cy, r);
      });
    });

    // Draw the smoothly-animating token on top of everything
    if (this.tweenPos) {
      const { playerIdx: pi, x, y } = this.tweenPos;
      this._drawOneToken(this.players[pi], x, y, cs * 0.3);
    }
  },

  /* ── Single token at pixel coords ── */
  _drawOneToken(p, cx, cy, r) {
    const { ctx } = this;
    // Drop shadow
    ctx.beginPath();
    ctx.arc(cx + 2, cy + 3, r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fill();
    // Glow ring
    ctx.beginPath();
    ctx.arc(cx, cy, r + 5, 0, Math.PI*2);
    ctx.fillStyle = p.color + '35';
    ctx.fill();
    // Token body
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Shine cap
    const sg = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, 0, cx, cy, r);
    sg.addColorStop(0, 'rgba(255,255,255,0.38)');
    sg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = sg; ctx.fill();
    // Emoji
    ctx.font = `${r * 1.15}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, cx, cy + r * 0.07);
  },

  /* ── Smooth curve animation helpers ── */

  // Returns path points for snake slide: from head (high sq) → tail (low sq)
  _snakeSlidePoints(headSq, tailSq, nPts) {
    nPts = nPts || 55;
    const H  = this._sqCenter(headSq);
    const T  = this._sqCenter(tailSq);
    const dx = H.x - T.x, dy = H.y - T.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const px = -dy/len, py = dx/len;
    const wave = this.cellSize * 0.85;
    // c1,c2 are the control points as used in _drawSnake (T→H direction)
    const c1x = T.x + dx*0.26 + px*wave, c1y = T.y + dy*0.26 + py*wave;
    const c2x = T.x + dx*0.74 - px*wave, c2y = T.y + dy*0.74 - py*wave;
    // Reverse the Bezier: H → c2 → c1 → T  (swapped control points)
    const pts = [];
