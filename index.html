    for (let i = 0; i <= nPts; i++) {
      const t = i/nPts, mt = 1-t;
      pts.push({
        x: mt*mt*mt*H.x + 3*mt*mt*t*c2x + 3*mt*t*t*c1x + t*t*t*T.x,
        y: mt*mt*mt*H.y + 3*mt*mt*t*c2y + 3*mt*t*t*c1y + t*t*t*T.y,
      });
    }
    return pts;
  },

  // Returns path points for ladder climb: from base (low sq) → top (high sq)
  _ladderClimbPoints(baseSq, topSq, nPts) {
    nPts = nPts || 45;
    const B = this._sqCenter(baseSq);
    const T = this._sqCenter(topSq);
    const pts = [];
    for (let i = 0; i <= nPts; i++) {
      const t = i/nPts;
      pts.push({ x: B.x + (T.x - B.x)*t, y: B.y + (T.y - B.y)*t });
    }
    return pts;
  },

  // Animates a player token along a pixel-path array over `durationMs`
  _animatePath(playerIdx, points, durationMs, onDone) {
    const totalFrames = Math.max(points.length - 1, Math.round(durationMs / 16));
    let frame = 0;
    const tick = () => {
      const pct = Math.min(frame / totalFrames, 1);
      const idx = Math.floor(pct * (points.length - 1));
      this.tweenPos = { playerIdx, x: points[idx].x, y: points[idx].y };
      this.draw();
      frame++;
      if (pct < 1) { requestAnimationFrame(tick); }
      else { this.tweenPos = null; this.draw(); onDone(); }
    };
    requestAnimationFrame(tick);
  },
};


/* ═══════════════════════════════════════════════════════════════
   GAME — state management, dice, movement, turn logic
═══════════════════════════════════════════════════════════════ */
const Game = {
  cfg:        null,
  board:      null,
  players:    [],
  state:      'idle',   // 'roll' | 'moving' | 'finished'
  curIdx:     0,
  diceVal:    0,
  questionLog: [],
  _resizeOff: null,

  init(cfg) {
    if (!cfg) {
      UI.toast('No game config found — set up a game first', 'error');
      App.go('game-setup');
      return;
    }
    this.cfg   = cfg;
    this.board = App.savedBoard || BoardGen.generate(cfg.boardSize, cfg.difficulty, cfg.enablePowerups !== false, (cfg.timerSecs ?? 0) > 0);
    App.savedBoard = null;

    this.players = cfg.players.map(p => ({
      ...p,
      position:   0,    // 0 = home strip (off board); enters at first roll
      correct:    0,
      wrong:      0,
      streak:     0,
      bestStreak: 0,
      turns:      0,    // completed turns this game
      inventory:     [],
      freeRoll:      false,
      frozen:        false,
      luckyWildcards: 0,
    }));

    this.state             = 'roll';
    this.curIdx            = 0;
    this.diceVal           = 0;
    this.questionLog       = [];
    this.usedQIds          = new Set();
    this.paused            = false;
    this.pendingDoubleRoll = false;
    this.pendingShield     = false;
    this.pendingRush       = false;
    this.pendingExtraTime  = false;

    const canvas = document.getElementById('game-canvas');
    BoardRenderer.init(canvas, this.board, this.players);
    this._sidebar();

    // Responsive resize
    if (this._resizeOff) this._resizeOff();
    const handler = () => BoardRenderer.resize();
    window.addEventListener('resize', handler);
    this._resizeOff = () => window.removeEventListener('resize', handler);
  },

  /* ── Sidebar ── */
  _sidebar() {
    const cur = this.players[this.curIdx];

    const cards = this.players.map((p, i) => `
      <div class="ps-card ${i === this.curIdx ? 'active' : ''}" style="--pc:${p.color}">
        <span class="ps-emo">${p.emoji}</span>
        <div class="ps-info">
          <div class="ps-name">${UI.esc(p.name)}</div>
          <div class="ps-sq">Sq ${p.position} / ${this.cfg.boardSize}</div>
        </div>
        <div class="ps-chips">
          <span class="ps-chip ok">✓${p.correct}</span>
          <span class="ps-chip wrong">✗${p.wrong}</span>
          ${p.streak > 1 ? `<span class="ps-chip streak">🔥${p.streak}</span>` : ''}
        </div>
      </div>`).join('');

    const diceArea = this.state === 'roll' ? `
      <div class="dice-wrap">
        <span class="dice-face" id="dice-face">${this.diceVal ? DICE_FACES[this.diceVal-1] : '🎲'}</span>
        <button class="dice-btn" id="dice-btn" onclick="Game.roll()">
          🎲 Roll — ${UI.esc(cur.name)}
        </button>
      </div>` : `
      <div class="dice-wrap">
        <span class="dice-face">${this.diceVal ? DICE_FACES[this.diceVal-1] : '⏳'}</span>
        <div class="dice-moving">Moving…</div>
      </div>`;

    const invSlots = [0, 1].map(i => {
      const item = cur.inventory && cur.inventory[i];
      if (!item) return `<div class="inv-slot empty"><span class="inv-empty-txt">Empty</span></div>`;
      const canUse = this.state === 'roll';
      return `<div class="inv-slot">
        <span class="inv-emoji">${item.emoji}</span>
        <div class="inv-name">${item.name}</div>
        <button class="inv-use-btn" onclick="Game.useItem(${i})" ${canUse ? '' : 'disabled'}>USE</button>
      </div>`;
    }).join('');

    const hasItems  = cur.inventory && cur.inventory.length > 0;
    const hasUsable = hasItems && this.state === 'roll';
    const pendingTags = [
      this.pendingDoubleRoll && '🎲×2',
      this.pendingShield     && '🛡️ Shield',
      this.pendingRush       && '⚡ Rush',
      this.pendingExtraTime  && '⏰ ×2 Time',
    ].filter(Boolean).join(' · ');
    const invSection = `
      <div class="sidebar-sec">
        <div class="sidebar-label">🎒 Bag${pendingTags ? ' · ' + pendingTags : ''}</div>
        ${hasItems
          ? `<div class="inv-grid">${invSlots}</div>
             ${hasUsable ? '<div class="inv-hint">↑ Use a power-up before rolling</div>' : ''}`
          : `<div class="inv-empty-msg">No power-ups yet — land on a ⭐ square!</div>`
        }
      </div>`;

    const puGuide = `
      <div class="sidebar-sec">
        <div class="sidebar-label">Power-ups &amp; Wildcards</div>
        <div class="pu-guide">
          ${POWERUPS.map(pu => `
            <div class="pu-guide-row">
              <span class="pu-gr-emoji">${pu.emoji}</span>
              <div class="pu-gr-body">
                <div class="pu-gr-name">${pu.name}
                  <span class="pu-gr-tag active">USE</span>
                </div>
                <div class="pu-gr-desc">${pu.desc}</div>
              </div>
            </div>`).join('')}
          <div style="font-family:var(--font-body);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.10em;color:var(--text2);padding:6px 2px 2px">Wildcards</div>
          ${WILDCARDS.map(wc => `
            <div class="pu-guide-row">
              <span class="pu-gr-emoji">${wc.emoji}</span>
              <div class="pu-gr-body">
                <div class="pu-gr-name">${wc.name}
                  <span class="pu-gr-tag wc">WILD</span>
                </div>
                <div class="pu-gr-desc">${wc.desc}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;

    document.getElementById('game-sidebar').innerHTML = `
      <div class="sidebar-sec">
        <div class="turn-banner" style="border-color:${cur.color}55;background:${cur.color}0f">
          <span class="turn-emoji">${cur.emoji}</span>
          <div>
            <div class="turn-name">${UI.esc(cur.name)}'s turn</div>
            <div class="turn-sq">Square ${cur.position} of ${this.cfg.boardSize}</div>
          </div>
        </div>
        ${diceArea}
      </div>
      ${invSection}
      ${puGuide}
      <div class="sidebar-sec">
        <div class="sidebar-label">Players</div>
        <div class="player-statuses">${cards}</div>
      </div>
      <div class="sidebar-sec" style="margin-top:auto">
        <button class="btn btn-ghost btn-sm" style="width:100%"
                onclick="Game._exitAsk()">← Exit Game</button>
      </div>`;
  },

  /* ── Roll dice ── */
  roll() {
    if (this.state !== 'roll') return;
    this.state = 'moving';
    let val = Math.floor(Math.random()*6) + 1;
    if (this.pendingDoubleRoll) {
      val += Math.floor(Math.random()*6) + 1;
      this.pendingDoubleRoll = false;
      UI.toast(`🎲🎲 Double Roll: ${val}!`, 'success');
    }
    this.diceVal = val;
    this._sidebar();
    Sound.play('roll');
    this._throwDice(Math.min(val, 6), () => this._doMove(val));
  },

  /* ── Real CSS 3D dice throw (preserve-3d cube, rAF animation) ── */
  _throwDice(val, onDone) {
    const area   = document.querySelector('.game-canvas-area');
    const canvas = document.getElementById('game-canvas');
    if (!area || !canvas) { onDone(); return; }

    // Clean up any lingering dice layers
    area.querySelectorAll('.d3-layer').forEach(e => e.remove());

    const cr = canvas.getBoundingClientRect();
    const ar = area.getBoundingClientRect();

    const layer = document.createElement('div');
    layer.className = 'd3-layer';
    layer.style.cssText =
      `left:${cr.left-ar.left}px;top:${cr.top-ar.top}px;` +
      `width:${cr.width}px;height:${cr.height}px;` +
      `position:absolute;pointer-events:none;z-index:50;overflow:hidden;`;

    /* Pip positions [x%, y%] for each face value */
    const PIP = {
      1: [[50,50]],
      2: [[75,25],[25,75]],
      3: [[75,25],[50,50],[25,75]],
      4: [[25,25],[75,25],[25,75],[75,75]],
      5: [[25,25],[75,25],[50,50],[25,75],[75,75]],
      6: [[25,20],[75,20],[25,50],[75,50],[25,80],[75,80]],
    };
    const mkFace = n => (PIP[n]||[]).map(
      ([x,y]) => `<div class="d3-pip" style="left:${x}%;top:${y}%"></div>`
    ).join('');

    /* Random landing spot (centre-biased) */
    const lx = 28 + Math.random() * 44;
    const ly = 28 + Math.random() * 44;

    layer.innerHTML = `
      <div class="d3-scene" id="_d3s" style="left:${lx}%;top:${ly}%">
        <div class="d3-cube" id="_d3c">
          <div class="d3-face d3-front">${mkFace(1)}</div>
          <div class="d3-face d3-back">${mkFace(6)}</div>
          <div class="d3-face d3-right">${mkFace(3)}</div>
          <div class="d3-face d3-left">${mkFace(4)}</div>
          <div class="d3-face d3-top">${mkFace(2)}</div>
          <div class="d3-face d3-bottom">${mkFace(5)}</div>
        </div>
      </div>`;

    area.appendChild(layer);

    const scene = layer.querySelector('#_d3s');
    const cube  = layer.querySelector('#_d3c');

    /*
     * Face layout (cube side = 56px, half = 28px):
     *   1=front  translateZ(28)
     *   6=back   rotateY(180) translateZ(28)
     *   3=right  rotateY(90)  translateZ(28)
     *   4=left   rotateY(-90) translateZ(28)
     *   2=top    rotateX(90)  translateZ(28)  ← points UP
     *   5=bottom rotateX(-90) translateZ(28)  ← points DOWN
     *
     * To show face N to viewer, counter-rotate cube by the face's offset.
     * Add 720° (2 full spins) for the tumble effect.
     *
     *   Face 1: rotX=720,   rotY=720    (front, no offset needed)
     *   Face 6: rotX=720,   rotY=900    (720+180, back → front)
     *   Face 3: rotX=720,   rotY=630    (720-90,  right → front)
     *   Face 4: rotX=720,   rotY=810    (720+90,  left  → front)
     *   Face 2: rotX=630,   rotY=720    (720-90,  top   → front)
     *   Face 5: rotX=810,   rotY=720    (720+90,  bottom→ front)
     */
    const FACE_ROT = {
      1: [720, 720],
      2: [630, 720],
      3: [720, 630],
      4: [720, 810],
      5: [810, 720],
      6: [720, 900],
    };
    const [finalX, finalY] = FACE_ROT[val] || [720, 720];

    const easeOut3 = t => 1 - Math.pow(1 - t, 3);

    const DROP_MS = 300;   // scene drop-in duration
    const SPIN_MS = 1100;  // cube spin duration
    let t0 = null;

    const tick = (ts) => {
      if (!t0) t0 = ts;
      const el = ts - t0;

      /* ── Scene: drop from above ── */
      const d  = Math.min(el / DROP_MS, 1);
      const de = easeOut3(d);
      scene.style.opacity   = String(Math.min(d * 3.5, 1));
      scene.style.transform =
        `translate(-50%, calc(-50% + ${(1-de) * -220}px)) scale(${1 + (1-de) * 1.3})`;

      /* ── Cube: spin to correct face ── */
      const s  = Math.min(el / SPIN_MS, 1);
      const se = easeOut3(s);
      cube.style.transform = `rotateX(${finalX * se}deg) rotateY(${finalY * se}deg)`;

      if (s < 1) {
        requestAnimationFrame(tick);
      } else {
        /* Settled — hold briefly then shrink-fade out */
        scene.style.transform = `translate(-50%, -50%) scale(1)`;
        setTimeout(() => {
          scene.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
          scene.style.opacity    = '0';
          scene.style.transform  = 'translate(-50%, -50%) scale(0.25)';
          setTimeout(() => { layer.remove(); onDone(); }, 300);
        }, 680);
      }
    };

    requestAnimationFrame(tick);
  },

  /* ── Move token square-by-square ── */
  _doMove(dice) {
    const player    = this.players[this.curIdx];
    const from      = player.position;
    const raw       = from + dice;
    let   target;
    if (this.cfg.exactFinish && raw > this.cfg.boardSize) {
      target = 2 * this.cfg.boardSize - raw;   // bounce back by overshoot amount
      UI.toast(`🎯 Overshot! ${player.name} bounces back to sq ${target}`, 'info');
    } else {
      target = Math.min(raw, this.cfg.boardSize);
    }
    this._sidebar(); // show "Moving…"

    this._stepThrough(from, target, () => {
      player.position = target;
      BoardRenderer.renderPos[this.curIdx] = target;
      BoardRenderer.draw();
      this._resolveSquare(target);
    });
  },

  /* Walk one square at a time, 145ms apart */
  _stepThrough(from, to, onDone) {
    if (from === to) { onDone(); return; }
    const dir = from < to ? 1 : -1;
    let cur = from;
    const step = () => {
      cur += dir;
      BoardRenderer.renderPos[this.curIdx] = cur;
      BoardRenderer.draw();
      Sound.play('step');
      cur !== to ? setTimeout(step, 145) : onDone();
    };
    setTimeout(step, 145);
  },

  /* ── Resolve landing square ── */
  _resolveSquare(sq) {
    const cur = this.players[this.curIdx];

    /* ─── Final square — must answer to win ─── */
    if (sq >= this.cfg.boardSize) {
      const q = this._pickQuestion(sq);
      if (!q) { this._win(); return; }
      q._context = 'finish';
      let finSecs = this.cfg.timerSecs;
      if (this.pendingExtraTime) { this.pendingExtraTime = false; finSecs *= 2; }
      QuestionPopup.show(q, finSecs, correct => {
        if (correct) {
          this._trackAnswer(true);
          this._logQ(q, true);
          this._win();
        } else {
          this._trackAnswer(false);
          this._logQ(q, false);
          cur.position = this.cfg.boardSize - 1;
          BoardRenderer.renderPos[this.curIdx] = cur.position;
          BoardRenderer.draw();
          UI.toast(`❌ So close! ${cur.name} bounces back to ${cur.position} — try again!`, 'error');
          setTimeout(() => this._endTurn(), 380);
        }
      });
      return;
    }

    /* ─── Power-up square ─── */
    const puEntry = (this.board.powerupSqs || []).find(p => p.sq === sq);
    if (puEntry) {
      this._collectPowerup(puEntry);
      return;
    }

    /* ─── Wildcard square ─── */
    const wcEntry = (this.board.wildcardSqs || []).find(w => w.sq === sq);
    if (wcEntry) {
      this._doWildcard(wcEntry);
      return;
    }

    const ladder = this.board.ladders.find(l => l.from === sq);
    const snake  = this.board.snakes.find(s => s.from === sq);

    /* ─── Ladder square ─── */
    if (ladder) {
      if (this.pendingRush) {
        this.pendingRush = false;
        UI.toast(`⚡ RUSH! ${cur.name} blasts up the ladder — no question needed!`, 'success');
        this._doLadderClimb(sq, ladder.to, true);
        return;
      }
      const q = this._pickQuestion(sq);
      if (!q) {
        this._doLadderClimb(sq, ladder.to, true);
      } else {
        q._context = 'ladder';
        let secs = this.cfg.timerSecs;
        if (this.pendingExtraTime) {
          this.pendingExtraTime = false;
          secs = secs * 2;
          UI.toast(`⏰ Extra Time active — double timer for this question!`, 'success');
        }
        QuestionPopup.show(q, secs, correct => {
          if (correct) {
            this._trackAnswer(true);
            this._logQ(q, true);
            this._doLadderClimb(sq, ladder.to, true);
          } else {
            this._trackAnswer(false);
            this._logQ(q, false);
            UI.toast(`❌ Wrong! ${this.players[this.curIdx].name} stays at square ${sq}.`, 'error');
            setTimeout(() => this._endTurn(), 380);
          }
        });
      }
      return;
    }

    /* ─── Snake square ─── */
    if (snake) {
      if (this.pendingShield) {
        this.pendingShield = false;
        UI.toast(`🛡️ SHIELD! ${cur.name} blocks the snake — stays at ${sq}!`, 'success');
        setTimeout(() => this._endTurn(), 420);
        return;
      }
      if (this.pendingRush) {
        this.pendingRush = false;
        UI.toast(`⚡ RUSH! ${cur.name} dodges the snake!`, 'success');
        setTimeout(() => this._endTurn(), 380);
        return;
      }
      const q = this._pickQuestion(sq);
      if (!q) {
        this._doSnakeDrop(sq, snake.to);
      } else {
        q._context = 'snake';
        let secs = this.cfg.timerSecs;
        if (this.pendingExtraTime) {
          this.pendingExtraTime = false;
          secs = secs * 2;
          UI.toast(`⏰ Extra Time active — double timer for this question!`, 'success');
        }
        QuestionPopup.show(q, secs, correct => {
          if (correct) {
            this._trackAnswer(true);
            this._logQ(q, true);
            UI.toast(`✅ Correct! ${this.players[this.curIdx].name} escapes the snake! 🐍`, 'success');
            setTimeout(() => this._endTurn(), 380);
          } else {
            this._trackAnswer(false);
            this._logQ(q, false);
            this._doSnakeDrop(sq, snake.to);
          }
        });
      }
      return;
    }

    // Plain square
    setTimeout(() => this._endTurn(), 380);
  },

  /* ── End turn, advance to next player ── */
  _endTurn() {
    this.pendingShield    = false;
    this.pendingRush      = false;
    this.pendingExtraTime = false;
    const p = this.players[this.curIdx];
    p.turns++;

    // Streak bonus: free roll — current player rolls again
    if (p.freeRoll) {
      p.freeRoll = false;
      this.state   = 'roll';
      this.diceVal = 0;
      UI.toast(`🔥 ${p.name} earns a FREE ROLL! (${p.streak}-streak!)`, 'success');
      this._sidebar();
      return;
    }

    this.curIdx = (this.curIdx + 1) % this.players.length;

    // Skip frozen player (Freeze power-up)
    if (this.players[this.curIdx].frozen) {
      this.players[this.curIdx].frozen = false;
      UI.toast(`❄️ ${this.players[this.curIdx].name}'s turn was frozen — skipped!`, 'info');
      this.curIdx = (this.curIdx + 1) % this.players.length;
    }

    this.state   = 'roll';
    this.diceVal = 0;
    this._sidebar();
  },

  /* ── Ladder climb animation (smooth straight-line path) ── */
  _doLadderClimb(fromSq, toSq, correct) {
    if (correct) {
      UI.toast(`🪜 Ladder! ${this.players[this.curIdx].name} climbs to ${toSq}!`, 'success');
    }
    Sound.play('ladder');
    // Commit game position immediately; tweenPos handles visual
    const pi = this.curIdx;
    this.players[pi].position       = toSq;
    BoardRenderer.renderPos[pi]     = toSq;

    setTimeout(() => {
      const pts = BoardRenderer._ladderClimbPoints(fromSq, toSq);
      BoardRenderer._animatePath(pi, pts, 700, () => {
        if (toSq >= this.cfg.boardSize) { this._win(); return; }
        setTimeout(() => this._endTurn(), 350);
      });
    }, 200);
  },

  /* ── Snake slide animation (smooth bezier curve path) ── */
  _doSnakeDrop(fromSq, toSq) {
    UI.toast(`🐍 Snake! ${this.players[this.curIdx].name} slides to ${toSq}!`, 'error');
    Sound.play('snake');
    document.querySelector('.game-canvas-area')?.classList.add('shake');
    setTimeout(() => document.querySelector('.game-canvas-area')?.classList.remove('shake'), 580);

    const pi = this.curIdx;
    this.players[pi].position       = toSq;
    BoardRenderer.renderPos[pi]     = toSq;

    setTimeout(() => {
      const pts = BoardRenderer._snakeSlidePoints(fromSq, toSq);
      BoardRenderer._animatePath(pi, pts, 900, () => {
        setTimeout(() => this._endTurn(), 350);
      });
    }, 480);
  },

  /* ── Pick question for a given square ── */
  _pickQuestion(sq) {
    const tidSet = new Set(this.cfg.topicIds);

    // All questions from selected topics, excluding already-used ones this session
    let pool = Bank.data.questions.filter(q =>
      tidSet.has(q.topicId) && !this.usedQIds.has(q.id)
    );

    // If all questions exhausted, reset the used set and start over
    if (pool.length === 0) {
      this.usedQIds.clear();
      pool = Bank.data.questions.filter(q => tidSet.has(q.topicId));
    }

    if (pool.length === 0) return null;

    const q = pool[Math.floor(Math.random() * pool.length)];
    this.usedQIds.add(q.id);
    return { ...q };
  },

  /* ── Record correct/wrong on current player ── */
  _trackAnswer(correct) {
    const p = this.players[this.curIdx];
    if (correct) {
      p.correct++;
      p.streak++;
      if (p.streak > p.bestStreak) p.bestStreak = p.streak;
      // Streak bonus: every 3rd correct answer in a row earns a free roll
      if (p.streak % 3 === 0) p.freeRoll = true;
    } else {
      p.wrong++;
      p.streak = 0;
    }
    this._sidebar();
  },

  /* ── Append to question log (for round summary) ── */
  _logQ(q, correct) {
    this.questionLog.push({
      playerIdx:  this.curIdx,
      playerName: this.players[this.curIdx].name,
      qText:      q.text,
      difficulty: q.difficulty,
      topicId:    q.topicId,
      context:    q._context,
      correct,
      ts: Date.now(),
    });
  },

  /* ── Win ── */
  _win() {
    this.state = 'finished';
    const p = this.players[this.curIdx];
    p.turns++;                                  // count the winning turn
    App.gameResult = {
      winner: p,
      players: [...this.players],
      questionLog: this.questionLog,
      cfg: this.cfg,
      board: this.board,
    };
    Sound.play('win');
    History.save(App.gameResult);
    Leaderboard.record(p);
    this._sidebar();
    setTimeout(() => App.go('summary'), 700);   // skip modal — summary screen celebrates
  },

  _exitAsk() {
    UI.confirm('Exit Game?', 'Current game progress will be lost.', () => App.go('main'));
  },

  /* ── Collect a random power-up when landing on a ⭐ square ── */
  _collectPowerup(puEntry) {
    const p  = this.players[this.curIdx];
    if (!p.inventory) p.inventory = [];
    const pu = POWERUPS.find(x => x.id === puEntry?.puId) || POWERUPS[Math.floor(Math.random() * POWERUPS.length)];

    if (p.inventory.length >= 2) {
      UI.toast(`${pu.emoji} Bag full (max 2) — ${p.name} passes on ${pu.name}.`, 'info');
      setTimeout(() => this._endTurn(), 380);
      return;
    }

    const q = this._pickQuestion(puEntry?.sq ?? 0);
    if (!q) {
      p.inventory.push(pu);
      UI.toast(`${pu.emoji} ${p.name} snagged ${pu.name}!`, 'success');
      this._sidebar();
      setTimeout(() => this._endTurn(), 380);
      return;
    }

    q._context = 'powerup';
    let puSecs = this.cfg.timerSecs;
    if (this.pendingExtraTime) { this.pendingExtraTime = false; puSecs *= 2; }
    QuestionPopup.show(q, puSecs, correct => {
      if (correct) {
        this._trackAnswer(true);
        this._logQ(q, true);
        p.inventory.push(pu);
        UI.toast(`${pu.emoji} Correct! ${p.name} earned ${pu.name}!`, 'success');
        this._sidebar();
      } else {
        this._trackAnswer(false);
        this._logQ(q, false);
        UI.toast(`❌ Wrong! ${p.name} misses the power-up.`, 'error');
      }
      setTimeout(() => this._endTurn(), 380);
    });
  },

  /* ── Activate an active power-up from the sidebar inventory ── */
  useItem(idx) {
    if (this.state !== 'roll') return;
    const p = this.players[this.curIdx];
    if (!p.inventory) return;
    const item = p.inventory[idx];
    if (!item) return;
    p.inventory.splice(idx, 1);

    switch (item.id) {
      case 'shield':
        this.pendingShield = true;
        Sound.play('shield');
        UI.toast(`🛡️ Shield active — snake protection on for this turn!`, 'success');
        break;
      case 'doubleroll':
        this.pendingDoubleRoll = true;
        Sound.play('doubleroll');
        UI.toast(`🎲 Double Roll ready — your next roll counts double!`, 'success');
        break;
      case 'rush':
        this.pendingRush = true;
        Sound.play('rush');
        UI.toast(`⚡ Rush active — skip the question on your next snake or ladder!`, 'success');
        break;
      case 'bomb': {
        const rivals = this.players.filter((pl, i) => i !== this.curIdx && pl.position > 0);
        if (!rivals.length) {
          p.inventory.splice(idx, 0, item);
          UI.toast(`💣 No rivals on the board yet!`, 'info');
          break;
        }
        const btnHTML = rivals.map(rival => {
          const ri = this.players.indexOf(rival);
          return `<button class="btn btn-danger" style="width:100%;margin-bottom:6px"
                    onclick="Game._bombTarget(${ri});UI.closeModal()">
                    ${UI.esc(rival.emoji)} ${UI.esc(rival.name)} — Square ${rival.position}
                  </button>`;
        }).join('');
        UI.showModal(`
          <div class="modal-title">💣 Choose a Target</div>
          <div style="margin-bottom:8px">${btnHTML}</div>
          <div class="modal-footer">
            <button class="btn btn-ghost" onclick="UI.closeModal();Game._bombCancel(${idx})">Cancel</button>
          </div>`);
        break;
      }
      case 'extratime':
        this.pendingExtraTime = true;
        Sound.play('extratime');
        UI.toast(`⏰ Extra Time active — your next question gets double the timer!`, 'success');
        break;
      case 'freeze': {
        const nextIdx = (this.curIdx + 1) % this.players.length;
        this.players[nextIdx].frozen = true;
        Sound.play('freeze');
        UI.toast(`🧊 FREEZE! ${this.players[nextIdx].name} is frozen — they'll skip their next turn!`, 'info');
        break;
      }
      case 'catapult': {
        const newPos = Math.min(p.position + 5, this.cfg.boardSize - 1);
        p.position = newPos;
        BoardRenderer.renderPos[this.curIdx] = newPos;
        BoardRenderer.draw();
        Sound.play('catapult');
        UI.toast(`🚀 CATAPULT! ${p.name} leaps to square ${newPos}!`, 'success');
        if (newPos >= this.cfg.boardSize) { setTimeout(() => this._win(), 400); return; }
        this._sidebar();
        setTimeout(() => this._resolveSquare(newPos), 400);
        return;
      }
    }
    this._sidebar();
  },

  _bombTarget(rivalIdx) {
    const rival = this.players[rivalIdx];
    rival.position = Math.max(1, rival.position - 8);
    BoardRenderer.renderPos[rivalIdx] = rival.position;
    BoardRenderer.draw();
    Sound.play('bomb');
    UI.toast(`💣 BOOM! ${rival.name} blasted back to square ${rival.position}!`, 'error');
    this._sidebar();
  },

  _bombCancel(idx) {
    const p  = this.players[this.curIdx];
    const pu = POWERUPS.find(x => x.id === 'bomb');
    if (pu && p.inventory.length < 2) p.inventory.splice(idx, 0, pu);
    this._sidebar();
  },

  togglePause() {
    if (this.state === 'idle' || this.state === 'finished') return;
    this.paused = !this.paused;
    const overlay = document.getElementById('pause-overlay');
    const btn     = document.getElementById('pause-btn');
    if (overlay) overlay.style.display = this.paused ? 'flex' : 'none';
    if (btn)     btn.textContent = this.paused ? '▶' : '⏸';
    if (!this.paused) this._sidebar();
  },

  /* ── Show wildcard overlay, then execute event ── */
  _doWildcard(wcEntry) {
    const event = WILDCARDS.find(w => w.id === wcEntry?.wcId) || WILDCARDS[Math.floor(Math.random() * WILDCARDS.length)];
    Sound.play('correct');
    const overlay = document.createElement('div');
    overlay.className = 'wc-overlay';
    overlay.innerHTML = `
      <div class="wc-card">
        <div class="wc-emoji">${event.emoji}</div>
        <div class="wc-name">${event.name}</div>
        <div class="wc-desc">${event.desc}</div>
      </div>`;
    document.getElementById('screen-game-board').appendChild(overlay);
    setTimeout(() => { overlay.remove(); this._executeWildcard(event); }, 2200);
  },

  /* ── Execute the chosen wildcard event ── */
  _executeWildcard(event) {
    const p = this.players[this.curIdx];
    switch (event.id) {

      case 'rollAgain':
        p.luckyWildcards = (p.luckyWildcards || 0) + 1;
        UI.toast(`🎲 ${p.name} rolls again!`, 'success');
        this.state = 'roll'; this.diceVal = 0; this._sidebar();
        break;

      case 'allBack': {
        let moved = false;
        this.players.forEach((pl, i) => {
          if (i !== this.curIdx && pl.position > 0) {
            pl.position = Math.max(1, pl.position - 5);
            BoardRenderer.renderPos[i] = pl.position;
            moved = true;
          }
        });
        if (moved) BoardRenderer.draw();
        UI.toast(`😱 Everyone else slides back 5 squares!`, 'error');
        setTimeout(() => this._endTurn(), 420);
        break;
      }

      case 'swapLeader': {
        const rivals = this.players.filter((pl, i) => i !== this.curIdx && pl.position > 0);
        if (!rivals.length) { UI.toast(`🔀 No rivals on the board yet!`, 'info'); setTimeout(() => this._endTurn(), 380); break; }
        const leader = rivals.reduce((a, b) => a.position > b.position ? a : b);
        const li = this.players.indexOf(leader);
        [p.position, leader.position] = [leader.position, p.position];
        BoardRenderer.renderPos[this.curIdx] = p.position;
        BoardRenderer.renderPos[li] = leader.position;
        BoardRenderer.draw();
        UI.toast(`🔀 SWAP! ${p.name} trades places with ${leader.name}!`, 'success');
        setTimeout(() => this._endTurn(), 420);
        break;
      }

      case 'shortcut': {
        const newPos = Math.min(p.position + 8, this.cfg.boardSize - 1);
        p.position = newPos;
        BoardRenderer.renderPos[this.curIdx] = newPos;
        BoardRenderer.draw();
        p.luckyWildcards = (p.luckyWildcards || 0) + 1;
        UI.toast(`🚀 SHORTCUT! ${p.name} zooms to square ${newPos}!`, 'success');
        if (newPos >= this.cfg.boardSize) { setTimeout(() => this._win(), 400); break; }
        setTimeout(() => this._endTurn(), 420);
        break;
      }

      case 'chaos': {
        const pos = this.players.map(pl => pl.position);
        for (let i = pos.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [pos[i], pos[j]] = [pos[j], pos[i]];
        }
        this.players.forEach((pl, i) => { pl.position = pos[i]; BoardRenderer.renderPos[i] = pos[i]; });
        BoardRenderer.draw();
        UI.toast(`🌀 CHAOS! All positions scrambled!`, 'error');
        setTimeout(() => this._endTurn(), 420);
        break;
      }

      default:
        setTimeout(() => this._endTurn(), 380);
    }
  },
};


/* ═══════════════════════════════════════════════════════════════
   QUESTION POPUP — shows on snake/ladder/bonus encounters
═══════════════════════════════════════════════════════════════ */
const QuestionPopup = {
  _cb:       null,   // onAnswer(isCorrect) callback
  _timer:    null,   // setInterval handle
  _secs:     0,      // remaining seconds
  _maxSecs:  0,      // total time allowed
  _answered: false,  // prevent double-answer
  _q:        null,   // current question object
  _CIRC:     2 * Math.PI * 28, // SVG ring circumference (r=28)

  /* ── Public: show popup ── */
  show(question, timerSecs, onAnswer) {
    this._cb       = onAnswer;
    this._secs     = timerSecs;
    this._maxSecs  = timerSecs;
    this._answered = false;
    this._q        = question;

    const el = document.getElementById('qpop-overlay');
    el.innerHTML = this._buildHTML(question, timerSecs);
    el.classList.add('open');

    // Focus written input if applicable
    if (question.type === 'written') {
      setTimeout(() => document.getElementById('qpop-written-in')?.focus(), 120);
    }

    if (timerSecs > 0) this._startTimer();
  },

  /* ── Build popup HTML ── */
  _buildHTML(q, timerSecs) {
    const ctx    = q._context || 'bonus';
    const ctxMap = { ladder:'🪜 Ladder!', snake:'🐍 Snake!', bonus:'⭐ Bonus', powerup:'⭐ Power-up!', finish:'🏆 Finish!' };
    const ctxLabel = ctxMap[ctx] || '❓ Question';
    const diffLabel = { easy:'😊 Easy', medium:'😐 Medium', hard:'😬 Hard' }[q.difficulty] || q.difficulty;
    const topicName = q.topicId ? (Bank.topic(q.topicId)?.name || '') : '';

    const timerHTML = timerSecs > 0 ? `
      <div class="qpop-timer-wrap">
        <span class="qpop-timer-num" id="qpop-timer-num">${timerSecs}</span>
      </div>` : '';

    const timerBarHTML = timerSecs > 0 ? `
      <div class="qpop-timer-bar">
        <div class="qpop-timer-bar-fill" id="qpop-timer-bar-fill"></div>
      </div>` : '';

    const optionsHTML = q.type === 'objective' ? `
      <div class="qpop-opts-grid" id="qpop-options">
        ${q.options.map((o, i) => `
          <button class="qpop-opt" data-idx="${i}" onclick="QuestionPopup._pickOpt(${i})">
            <span class="qpop-opt-letter">${'ABCD'[i]}</span>
            <span class="qpop-opt-text">${UI.esc(o)}</span>
          </button>`).join('')}
      </div>` : `
      <div class="qpop-written" id="qpop-options">
        <input class="qpop-input" id="qpop-written-in" type="text"
               placeholder="Type your answer here…" autocomplete="off"
               onkeydown="if(event.key==='Enter')QuestionPopup._submitWritten()">
        <button class="qpop-submit-btn" onclick="QuestionPopup._submitWritten()">
          ✓ Submit Answer
        </button>
      </div>`;

    const imgHTML = q.image
      ? `<div class="qpop-img-wrap"><img src="${q.image}" alt="Question image"></div>`
      : '';

    return `
      <div class="qpop-card">
        ${timerBarHTML}
        <div class="qpop-inner">
          <div class="qpop-toprow">
            <span class="qpop-ctx-badge ${ctx}">${ctxLabel}</span>
            <span class="qpop-diff-badge ${q.difficulty}">${diffLabel}</span>
            ${topicName ? `<span class="qpop-topic-badge">${UI.esc(topicName)}</span>` : ''}
            ${timerHTML}
          </div>
          ${imgHTML}
          <p class="qpop-q-text">${UI.esc(q.text)}</p>
          ${optionsHTML}
          <div class="qpop-result" id="qpop-result" style="display:none"></div>
        </div>
      </div>`;
  },

  /* ── Timer tick ── */
  _startTimer() {
    this._timer = setInterval(() => {
      this._secs--;
      const bar   = document.getElementById('qpop-timer-bar-fill');
      const numEl = document.getElementById('qpop-timer-num');
      if (numEl) numEl.textContent = this._secs;
      if (bar) {
        const pct = Math.max(0, this._secs / this._maxSecs);
        bar.style.transform = `scaleX(${pct})`;
        if (this._secs <= 5) bar.classList.add('urgent');
        else                 bar.classList.remove('urgent');
      }
      // Urgent tick sound in the last 5 seconds
      if (this._secs > 0 && this._secs <= 5) Sound.play('tick');
      if (this._secs <= 0) { this._stopTimer(); this._timeUp(); }
    }, 1000);
  },

  _stopTimer() {
    if (this._timer) { clearInterval(this._timer); this._timer = null; }
  },

  /* ── MCQ option click ── */
  _pickOpt(idx) {
    if (this._answered || !this._q) return;
    this._answered = true;
    this._stopTimer();
    const q       = this._q;
    const correct = idx === q.correctIndex;

    document.querySelectorAll('.qpop-opt').forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correctIndex) btn.classList.add('correct');
      else if (i === idx && !correct) btn.classList.add('wrong');
    });

    Sound.play(correct ? 'correct' : 'wrong');
    this._showResult(correct, q.explanation, null);
  },

  /* ── Written answer submit ── */
  _submitWritten() {
    if (this._answered || !this._q) return;
    const input = document.getElementById('qpop-written-in');
    if (!input || !input.value.trim()) return;
    this._answered = true;
    this._stopTimer();
    const q   = this._q;
    const val = input.value.trim().toLowerCase();

    // Accept any comma/pipe-separated variant
    const accepted = q.correctAnswer.split(/[,|]/).map(s => s.trim().toLowerCase());
    const correct  = accepted.includes(val);

    input.disabled = true;
    document.getElementById('qpop-options')?.querySelectorAll('button').forEach(b => b.disabled = true);

    Sound.play(correct ? 'correct' : 'wrong');
    this._showResult(correct, q.explanation, correct ? null : q.correctAnswer);
  },

  /* ── Time expired ── */
  _timeUp() {
    if (this._answered) return;
    this._answered = true;
    document.querySelectorAll('.qpop-opt').forEach(b => b.disabled = true);
    const input = document.getElementById('qpop-written-in');
    if (input) input.disabled = true;
    Sound.play('wrong');
    this._showResult(false, "Time's up! " + (this._q?.explanation || ''), this._q?.correctAnswer || null);
  },

  /* ── Show result panel ── */
  _showResult(correct, explanation, wrongCorrectAnswer) {
    const el = document.getElementById('qpop-result');
    if (!el) { this._done(correct); return; }

    const icon    = correct ? '🎉' : '😬';
    const heading = correct ? 'Correct!' : 'Incorrect';

    const corrNote = (!correct && wrongCorrectAnswer) ? `
      <div class="qpop-correct-ans">
        Correct answer: <strong>${UI.esc(wrongCorrectAnswer)}</strong>
      </div>` : '';

    el.innerHTML = `
      <div class="qpop-result-banner ${correct ? 'correct' : 'wrong'}">
        <span>${icon}</span> <span>${heading}</span>
      </div>
      ${corrNote}
      ${explanation ? `<p class="qpop-explanation">${UI.esc(explanation)}</p>` : ''}
      <div style="display:flex;justify-content:flex-end;margin-top:12px">
        <button class="btn btn-primary btn-sm" onclick="QuestionPopup._done(${correct})">
          Continue →
        </button>
      </div>`;
    el.style.display = 'block';
  },

  /* ── Final close + callback ── */
  _done(correct) {
    this._stopTimer();
    const el = document.getElementById('qpop-overlay');
    if (el) { el.classList.remove('open'); el.innerHTML = ''; }
    if (this._cb) { const cb = this._cb; this._cb = null; cb(correct); }
  },
};


/* ═══════════════════════════════════════════════════════════════
   SOUND — Web Audio API, fully synthesized, no external files
═══════════════════════════════════════════════════════════════ */
const Sound = {
  _ctx:     null,
  _diceBuf: null,   // decoded dice MP3 buffer (loaded on first user gesture)
  enabled:  true,
  vol:      0.55,

  /* Lazy AudioContext — must be inside a user-gesture call path */
  _ac() {
    if (!this._ctx) {
      try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(_) { return null; }
    }
    if (this._ctx.state === 'suspended') this._ctx.resume().catch(() => {});
    return this._ctx;
  },

  /* Decode the embedded dice MP3 once (called on first roll) */
  _loadDice(ac) {
    if (this._diceBuf || !DICE_MP3_B64) return;
    try {
      const binStr = atob(DICE_MP3_B64);
      const bytes  = new Uint8Array(binStr.length);
      for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
      ac.decodeAudioData(bytes.buffer, buf => { this._diceBuf = buf; });
    } catch(_) {}
  },

  load() {
    try {
      const p = JSON.parse(localStorage.getItem(PREFS_KEY) || '{}');
      this.enabled = p.sound !== false;
      this.vol     = (typeof p.vol === 'number') ? p.vol : 0.55;
    } catch(_) {}
  },

  _save() {
    try {
      const prefs = JSON.parse(localStorage.getItem(PREFS_KEY) || '{}');
      prefs.sound = this.enabled;
      prefs.vol   = this.vol;
      localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
    } catch(_) {}
  },

  toggle(val) { this.enabled = (val !== undefined) ? val : !this.enabled; this._save(); },
  setVol(v)   { this.vol = parseFloat(v); this._save(); },

  play(type) {
    if (!this.enabled) return;
    const ac = this._ac();
    if (!ac) return;
    try {
      if (type === 'roll')    this._roll(ac);
      if (type === 'step')    this._step(ac);
      if (type === 'correct') this._correct(ac);
      if (type === 'wrong')   this._wrong(ac);
      if (type === 'snake')   this._snake(ac);
      if (type === 'ladder')  this._ladder(ac);
      if (type === 'win')       this._winFanfare(ac);
      if (type === 'tick')      this._tick(ac);
      if (type === 'shield')    this._shieldClang(ac);
      if (type === 'doubleroll')this._doubleRollSound(ac);
      if (type === 'rush')      this._rushWhoosh(ac);
      if (type === 'bomb')      this._bombBlast(ac);
      if (type === 'extratime') this._extraTimeBell(ac);
      if (type === 'catapult')  this._catapultLaunch(ac);
      if (type === 'freeze')    this._freezePing(ac);
    } catch(_) { /* silent fail — audio errors should never crash the game */ }
  },

  /* Dice roll — plays the embedded MP3; decoded on first call */
  _roll(ac) {
    // Decode MP3 on first use (requires user-gesture context already established)
    if (!this._diceBuf) { this._loadDice(ac); }

    if (this._diceBuf) {
      // Play the real dice sound MP3
      const src = ac.createBufferSource();
      src.buffer = this._diceBuf;
      const g = ac.createGain();
      g.gain.value = this.vol * 0.9;
      src.connect(g); g.connect(ac.destination);
      src.start();
    } else {
      // Fallback: synthetic clicks + thud (used until buffer is decoded)
      const t0 = ac.currentTime, sr = ac.sampleRate, v = this.vol;
      [0, 0.06, 0.13, 0.21, 0.30].forEach((dt, i) => {
        const len = Math.floor(sr * 0.02);
        const buf = ac.createBuffer(1, len, sr);
        const d   = buf.getChannelData(0);
        for (let k = 0; k < len; k++) d[k] = (Math.random()*2-1)*Math.pow(1-k/len,2);
        const src = ac.createBufferSource(); src.buffer = buf;
        const g = ac.createGain(); g.gain.value = v * (0.3 - i * 0.02);
        src.connect(g); g.connect(ac.destination); src.start(t0 + dt);
      });
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination); o.type = 'sine';
      o.frequency.setValueAtTime(100, t0+0.35); o.frequency.exponentialRampToValueAtTime(50, t0+0.55);
      g.gain.setValueAtTime(v*0.5, t0+0.35); g.gain.exponentialRampToValueAtTime(0.001, t0+0.55);
      o.start(t0+0.35); o.stop(t0+0.55);
    }
  },

  /* Soft click — each token step */
  _step(ac) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine';
    o.frequency.value = 360 + Math.random() * 180;
    const t = ac.currentTime;
    g.gain.setValueAtTime(this.vol * 0.06, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.055);
    o.start(t); o.stop(t + 0.055);
  },

  /* Happy ascending arpeggio C-E-G-C — correct answer */
  _correct(ac) {
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'triangle'; o.frequency.value = f;
      const t = ac.currentTime + i * 0.09;
      g.gain.setValueAtTime(this.vol * 0.28, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      o.start(t); o.stop(t + 0.22);
    });
  },

  /* Descending sawtooth groan — wrong answer or time up */
  _wrong(ac) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(290, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(140, ac.currentTime + 0.45);
    g.gain.setValueAtTime(this.vol * 0.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.45);
    o.start(ac.currentTime); o.stop(ac.currentTime + 0.45);
  },

  /* High-pass filtered noise — snake hiss */
  _snake(ac) {
    const len = Math.floor(ac.sampleRate * 0.7);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 0.38);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const hp = ac.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 2600;
    const g = ac.createGain(); g.gain.value = this.vol * 0.38;
    src.connect(hp); hp.connect(g); g.connect(ac.destination); src.start();
  },

  /* Rising square-wave beeps — ladder climb */
  _ladder(ac) {
    [330, 415, 523, 659, 784].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'square'; o.frequency.value = f;
      const t = ac.currentTime + i * 0.11;
      g.gain.setValueAtTime(this.vol * 0.09, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
      o.start(t); o.stop(t + 0.09);
    });
  },

  /* Victory fanfare — win */
  _winFanfare(ac) {
    const notes = [523, 523, 784, 784, 1047, 1047, 1047];
    const durs  = [0.13,0.13,0.13,0.13,0.17,0.17,0.46];
    let t = ac.currentTime + 0.05;
    notes.forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(this.vol * 0.32, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + durs[i]);
      o.start(t); o.stop(t + durs[i]);
      t += durs[i] + 0.025;
    });
  },

  /* Short sharp beep — timer urgent tick */
  _tick(ac) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = 1080;
    const t = ac.currentTime;
    g.gain.setValueAtTime(this.vol * 0.05, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.042);
    o.start(t); o.stop(t + 0.042);
  },

  _shieldClang(ac) {
    const t = ac.currentTime, v = this.vol;
    [740, 1480, 2220].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      o.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(v * 0.22, t + i*0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35 + i*0.05);
      o.start(t + i*0.02); o.stop(t + 0.45);
    });
  },

  _doubleRollSound(ac) {
    const t = ac.currentTime, v = this.vol;
    [0, 0.18].forEach(dt => {
      [0, 0.05, 0.11].forEach((jt, i) => {
        const len = Math.floor(ac.sampleRate * 0.02);
        const buf = ac.createBuffer(1, len, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let k = 0; k < len; k++) d[k] = (Math.random()*2-1)*Math.pow(1-k/len,2);
        const src = ac.createBufferSource(); src.buffer = buf;
        const g = ac.createGain(); g.gain.value = v * (0.22 - i*0.04);
        src.connect(g); g.connect(ac.destination); src.start(t + dt + jt);
      });
    });
  },

  _rushWhoosh(ac) {
    const t = ac.currentTime, v = this.vol;
    const o = ac.createOscillator(), g = ac.createGain();
    const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 0.5;
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(180, t);
    o.frequency.exponentialRampToValueAtTime(1400, t + 0.28);
    bp.frequency.setValueAtTime(300, t);
    bp.frequency.exponentialRampToValueAtTime(2000, t + 0.28);
    g.gain.setValueAtTime(v * 0.14, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.30);
    o.connect(bp); bp.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.30);
  },

  _bombBlast(ac) {
    const t = ac.currentTime, v = this.vol;
    const len = Math.floor(ac.sampleRate * 0.55);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 0.7);
    const src = ac.createBufferSource(); src.buffer = buf;
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(400, t);
    lp.frequency.exponentialRampToValueAtTime(60, t + 0.55);
    const g = ac.createGain(); g.gain.value = v * 0.55;
    src.connect(lp); lp.connect(g); g.connect(ac.destination); src.start(t);
  },

  _extraTimeBell(ac) {
    const t = ac.currentTime, v = this.vol;
    [880, 1100, 1320].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine'; o.frequency.value = f;
      o.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(v * 0.18, t + i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.55 + i*0.12);
      o.start(t + i*0.12); o.stop(t + 0.7);
    });
  },

  _catapultLaunch(ac) {
    const t = ac.currentTime, v = this.vol;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(90, t);
    o.frequency.exponentialRampToValueAtTime(900, t + 0.22);
    g.gain.setValueAtTime(v * 0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.25);
  },

  _freezePing(ac) {
    const t = ac.currentTime, v = this.vol;
    [1760, 2093, 2637].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      o.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(v * 0.15, t + i*0.06);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.55 + i*0.08);
      o.start(t + i*0.06); o.stop(t + 0.7);
    });
  },
};


/* ═══════════════════════════════════════════════════════════════
   BACKGROUND MUSIC — looped ambient music via Web Audio API
   Tracks: 0=None, 1=Soft Piano, 2=Meadow, 3=Chill Beats, 4=Ocean
═══════════════════════════════════════════════════════════════ */
const BGMusic = {
  _ctx:    null,
  _nodes:  [],       // active oscillators / sources to stop
  _loopId: null,     // setInterval id for pattern loops
  track:   0,        // 0 = off
  vol:     0.18,

  TRACKS: [
    { id: 0, name: 'None',       icon: '🔇' },
    { id: 1, name: 'Soft Piano', icon: '🎹' },
    { id: 2, name: 'Meadow',     icon: '🌿' },
    { id: 3, name: 'Chill Beats',icon: '🎵' },
    { id: 4, name: 'Ocean',      icon: '🌊' },
  ],

  load() {
    try {
      const prefs = JSON.parse(localStorage.getItem(PREFS_KEY) || '{}');
      if (prefs.bgTrack  !== undefined) this.track = prefs.bgTrack;
      if (prefs.bgVol    !== undefined) this.vol   = prefs.bgVol;
    } catch(_) {}
  },

  _save() {
    try {
      const prefs = JSON.parse(localStorage.getItem(PREFS_KEY) || '{}');
      prefs.bgTrack = this.track;
      prefs.bgVol   = this.vol;
      localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
    } catch(_) {}
  },

  _ac() {
    if (!this._ctx) {
      try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_) { return null; }
    }
    if (this._ctx.state === 'suspended') this._ctx.resume();
    return this._ctx;
  },

  start() {
    this.stop();
    if (this.track === 0) return;
    const ac = this._ac();
    if (!ac) return;
    try {
      if (this.track === 1) this._startPiano(ac);
      if (this.track === 2) this._startMeadow(ac);
      if (this.track === 3) this._startChillBeats(ac);
      if (this.track === 4) this._startOcean(ac);
    } catch(_) {}
  },

  stop() {
    if (this._loopId) { clearInterval(this._loopId); this._loopId = null; }
    this._nodes.forEach(n => { try { n.stop(); } catch(_) {} });
    this._nodes = [];
  },

  setTrack(id) {
    this.track = id;
    this._save();
    this.stop();
    this.start();
  },

  setVol(v) {
    this.vol = parseFloat(v);
    this._save();
    // Restart to apply new volume (simple approach)
    this.stop();
    this.start();
  },

  /* ── Track 1: Soft Piano — gentle arpeggios in C major ── */
  /* ── Track 1: Soft Piano — lookahead scheduled arpeggios ── */
  _startPiano(ac) {
    const chords = [
      [261,329,392], [293,370,440], [220,277,349],
      [246,311,392], [261,329,392], [220,277,392],
    ];
    const noteLen  = 2.2;  // note sustain duration
    const interval = 2.0;  // chord spacing (overlaps slightly with noteLen for legato)
    let ci = 0;
    let nextT = ac.currentTime + 0.05;

    const scheduleChord = () => {
      const t0    = nextT;
      const notes = chords[ci % chords.length]; ci++;
      notes.forEach((f, ni) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'triangle'; o.frequency.value = f;
        const t = t0 + ni * 0.11;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(this.vol * 0.20, t + 0.07);
        g.gain.exponentialRampToValueAtTime(0.001, t + noteLen);
        o.start(t); o.stop(t + noteLen);
        this._nodes.push(o);
      });
      nextT += interval;
    };

    // Pre-schedule first 3 chords immediately
    scheduleChord(); scheduleChord(); scheduleChord();

    // Lookahead scheduler: fires every 400ms, keeps 2s of audio pre-scheduled
    this._loopId = setInterval(() => {
      if (ac.state === 'suspended') ac.resume().catch(() => {});
      while (nextT < ac.currentTime + 2.0) scheduleChord();
    }, 400);
  },

  /* ── Track 2: Meadow — looping wind + scheduled bird chirps ── */
  _startMeadow(ac) {
    // Continuous wind layer (looping buffer)
    const windLen = Math.floor(ac.sampleRate * 8);
    const windBuf = ac.createBuffer(1, windLen, ac.sampleRate);
    const wd = windBuf.getChannelData(0);
    for (let i = 0; i < windLen; i++) wd[i] = Math.random() * 2 - 1;
    const windSrc = ac.createBufferSource();
    windSrc.buffer = windBuf; windSrc.loop = true;
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 700;
    const wg = ac.createGain(); wg.gain.value = this.vol * 0.10;
    windSrc.connect(lp); lp.connect(wg); wg.connect(ac.destination);
    windSrc.start(); this._nodes.push(windSrc);

    // Soft pad drone for ambience
    const droneFreqs = [130, 196, 261];
    droneFreqs.forEach(f => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = f;
      g.gain.value = this.vol * 0.04;
      o.start(); this._nodes.push(o);
    });

    // Scheduled bird chirps using lookahead
    let nextChirp = ac.currentTime + 0.5 + Math.random() * 0.8;
    const scheduleChirp = () => {
      const t = nextChirp;
      const freq = 1200 + Math.random() * 900;
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(freq, t);
      o.frequency.linearRampToValueAtTime(freq * 1.35, t + 0.12);
      g.gain.setValueAtTime(this.vol * 0.13, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      o.start(t); o.stop(t + 0.18);
      this._nodes.push(o);
      // double-chirp
      if (Math.random() > 0.45) {
        const o2 = ac.createOscillator(), g2 = ac.createGain();
        o2.connect(g2); g2.connect(ac.destination);
        const f2 = freq * 1.2;
        o2.type = 'sine'; o2.frequency.setValueAtTime(f2, t+0.1);
        o2.frequency.linearRampToValueAtTime(f2*1.3, t+0.22);
        g2.gain.setValueAtTime(this.vol * 0.11, t+0.1);
        g2.gain.exponentialRampToValueAtTime(0.001, t+0.25);
        o2.start(t+0.1); o2.stop(t+0.25);
        this._nodes.push(o2);
      }
      nextChirp = t + 1.0 + Math.random() * 2.5;
    };
    scheduleChirp();
    this._loopId = setInterval(() => {
      if (ac.state === 'suspended') ac.resume().catch(() => {});
      while (nextChirp < ac.currentTime + 2.5) scheduleChirp();
    }, 400);
  },

  /* ── Track 3: Chill Beats — lookahead scheduled lo-fi beats ── */
  _startChillBeats(ac) {
    const BPM = 76;
    const beatLen = 60 / BPM;
    const barLen  = beatLen * 4;
    let nextBarT  = ac.currentTime + 0.05;

    const scheduleBar = () => {
      const t0 = nextBarT;
      const v  = this.vol;
      // Kick on beats 1 and 3
      [0, 2].forEach(b => {
        const beat = t0 + b * beatLen;
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(120, beat);
        o.frequency.exponentialRampToValueAtTime(40, beat + 0.25);
        g.gain.setValueAtTime(v * 0.55, beat);
        g.gain.exponentialRampToValueAtTime(0.001, beat + 0.28);
        o.start(beat); o.stop(beat + 0.28); this._nodes.push(o);
      });
      // Hi-hat every beat
      [0,1,2,3].forEach(b => {
        const beat = t0 + b * beatLen;
        const len  = Math.floor(ac.sampleRate * 0.04);
        const buf  = ac.createBuffer(1, len, ac.sampleRate);
        const d    = buf.getChannelData(0);
        for (let k = 0; k < len; k++) d[k] = (Math.random()*2-1)*(1-k/len);
        const src = ac.createBufferSource(); src.buffer = buf;
        const hp = ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=8000;
        const hg = ac.createGain(); hg.gain.value = v * 0.10;
        src.connect(hp); hp.connect(hg); hg.connect(ac.destination);
        src.start(beat); this._nodes.push(src);
      });
      // Melodic bass
      [[0,55],[0.5,50],[1,55],[1.5,52],[2,60],[2.5,55],[3,50],[3.5,52]].forEach(([bt, midi]) => {
        const freq = 440 * Math.pow(2, (midi-69)/12);
        const t    = t0 + bt * beatLen;
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'sawtooth'; o.frequency.value = freq;
        g.gain.setValueAtTime(v * 0.08, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + beatLen * 0.8);
        o.start(t); o.stop(t + beatLen * 0.8); this._nodes.push(o);
      });
      nextBarT += barLen;
    };

    // Pre-schedule 2 bars immediately
    scheduleBar(); scheduleBar();

    // Lookahead: keep 2 bars pre-scheduled
    this._loopId = setInterval(() => {
      if (ac.state === 'suspended') ac.resume().catch(() => {});
      while (nextBarT < ac.currentTime + barLen * 2) scheduleBar();
    }, 400);
  },

  /* ── Track 4: Ocean Waves — layered filtered noise ── */
  _startOcean(ac) {
    // Two slow-sweeping filtered noise layers
    [280, 160].forEach((freq, li) => {
      const len = Math.floor(ac.sampleRate * 6);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d   = buf.getChannelData(0);
      // Pink-ish noise (crude approximation)
      let b0=0, b1=0, b2=0;
      for (let i = 0; i < len; i++) {
        const wn = Math.random() * 2 - 1;
        b0 = 0.99765*b0 + wn*0.0990460; b1 = 0.96300*b1 + wn*0.2965164; b2 = 0.57000*b2 + wn*1.0526913;
        d[i] = (b0 + b1 + b2 + wn*0.1848) / 6;
      }
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;

      // LFO modulating filter cutoff for wave rhythm
      const lfo = ac.createOscillator();
      const lfoG = ac.createGain();
      lfo.frequency.value = 0.12 + li * 0.07;
      lfoG.gain.value = freq * 0.5;
      lfo.connect(lfoG);

      const bp = ac.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = freq; bp.Q.value = 0.8;
      lfoG.connect(bp.frequency);

      const g = ac.createGain(); g.gain.value = this.vol * 0.32;
      src.connect(bp); bp.connect(g); g.connect(ac.destination);

      lfo.start(); src.start();
      this._nodes.push(src, lfo);
    });
  },
};


/* ═══════════════════════════════════════════════════════════════
   GAME HISTORY — persists last HIST_MAX results
═══════════════════════════════════════════════════════════════ */
const History = {
  _cache: null,

  load() {
    if (this._cache) return this._cache;
    try { this._cache = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
    catch(_) { this._cache = []; }
    return this._cache;
  },

  save(result) {
    const list = this.load();
    list.unshift({
      ts:       Date.now(),
      winner:   { name: result.winner.name, emoji: result.winner.emoji },
      players:  result.players.map(p => ({
                  name: p.name, emoji: p.emoji,
                  correct: p.correct, wrong: p.wrong,
                })),
      boardSize: result.cfg.boardSize,
    });
    if (list.length > HIST_MAX) list.splice(HIST_MAX);
    this._cache = list;
    localStorage.setItem(HIST_KEY, JSON.stringify(list));
  },

  clear() {
    this._cache = [];
    localStorage.removeItem(HIST_KEY);
  },
};


/* ═══════════════════════════════════════════════════════════════
   LEADERBOARD — tracks all-time wins per player name+emoji
═══════════════════════════════════════════════════════════════ */
const Leaderboard = {
  _cache: null,

  load() {
    if (this._cache) return this._cache;
    try { this._cache = JSON.parse(localStorage.getItem(LB_KEY) || '[]'); }
    catch(_) { this._cache = []; }
    return this._cache;
  },

  record(winner) {
    const list = this.load();
    const key  = winner.name.trim().toLowerCase() + '|' + winner.emoji;
    const entry = list.find(e => e.key === key);
    if (entry) {
      entry.wins++;
      entry.name  = winner.name;
      entry.emoji = winner.emoji;
    } else {
      list.push({ key, name: winner.name, emoji: winner.emoji, wins: 1 });
    }
    list.sort((a, b) => b.wins - a.wins);
    if (list.length > LB_MAX) list.length = LB_MAX;
    this._cache = list;
    localStorage.setItem(LB_KEY, JSON.stringify(list));
  },

  clear() { this._cache = []; localStorage.removeItem(LB_KEY); },
};

/* ═══════════════════════════════════════════════════════════════
   ROUND SUMMARY — Phase 5
═══════════════════════════════════════════════════════════════ */
const Summary = {

  render() {
    const r = App.gameResult;
    if (!r) { App.go('main'); return; }

    const el = document.getElementById('screen-summary');
    el.innerHTML = this._buildHTML(r);

    // Launch confetti after a short delay so the screen is visible first
    setTimeout(() => this._confetti(), 120);
  },

  _buildHTML(r) {
    const w      = r.winner;
    const medals = ['🥇','🥈','🥉'];
    const bdgMap = this._badges(r.players);

    /* Sort players: highest position first, then most correct */
    const ranked = [...r.players].sort((a, b) => {
      if (b.position !== a.position) return b.position - a.position;
      return b.correct - a.correct;
    });

    /* Helper: accuracy string for a player */
    const pctStr = p => {
      const tot = p.correct + p.wrong;
      return tot > 0 ? `${Math.round(p.correct / tot * 100)}%` : '—';
    };

    /* Winner hero stats */
    const wAcc   = pctStr(w);
    const wTurns = w.turns ?? '—';

    /* Ranking rows — include turns in info line, accuracy in stats strip */
    const rankRows = ranked.map((p, i) => {
      const medal  = medals[i] || `<span style="font-size:13px;color:var(--ink3)">${i+1}</span>`;
      const posStr = p.position >= r.cfg.boardSize
        ? `<span style="color:var(--easy);font-weight:800">🏁 Finished!</span>`
        : `Square ${p.position}`;
      const acc    = pctStr(p);
      const turns  = p.turns ?? '—';
      const pBadges = (bdgMap[p.id] || [])
        .map(b => `<span class="sum-rank-badge" title="${b.label}">${b.icon}</span>`)
        .join('');
      return `
        <div class="sum-rank-row">
          <div class="sum-rank-medal">${medal}</div>
          <div class="sum-rank-avatar">${p.emoji}</div>
          <div class="sum-rank-info">
            <div class="sum-rank-name">${UI.esc(p.name)}${pBadges}</div>
            <div class="sum-rank-pos">${posStr} · ${turns} turns</div>
          </div>
          <div class="sum-rank-stats">
            <div class="sum-rank-stat c">✓ <span>${p.correct}</span></div>
            <div class="sum-rank-stat w">✗ <span>${p.wrong}</span></div>
            <div class="sum-rank-stat" style="color:var(--blue)">◎ <span>${acc}</span></div>
          </div>
        </div>`;
    }).join('');

    /* Achievement badges section */
    const allBadges = [];
    r.players.forEach(p => (bdgMap[p.id] || []).forEach(b => allBadges.push({ player: p, ...b })));
    const badgeSection = allBadges.length ? `
      <div class="sum-panel">
