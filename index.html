<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduSnakes — Learn. Play. Win.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
  <style>
    /* ═══════════════════════════════════════════════════════
       DESIGN TOKENS — EduSnakes v2.0
    ═══════════════════════════════════════════════════════ */
    :root {
      --bg:        #0F1923;
      --surface:   #1A2634;
      --surface2:  #1F2E40;
      --lime:      #A8E63D;
      --coral:     #FF6B6B;
      --sky:       #4ECDC4;
      --amber:     #FFB347;
      --purple:    #B794F4;
      --text:      #F5F0E8;
      --text2:     #8A9BB0;
      --border:    rgba(255,255,255,0.08);
      --border-h:  rgba(255,255,255,0.16);

      /* Difficulty mapping */
      --easy:      var(--sky);
      --medium:    var(--amber);
      --hard:      var(--coral);

      /* Compat aliases for legacy JS-rendered markup */
      --ink:       var(--text);
      --ink2:      var(--text2);
      --ink3:      #5C6E83;
      --bg2:       var(--surface);
      --bg3:       var(--surface2);
      --surface-h: var(--surface2);
      --red:       var(--coral);
      --blue:      var(--sky);
      --green:     var(--lime);
      --pink:      var(--coral);
      --cyan:      var(--sky);
      --easy-bg:   rgba(78,205,196,0.10);
      --medium-bg: rgba(255,179,71,0.12);
      --hard-bg:   rgba(255,107,107,0.12);

      --radius-sm: 4px;
      --radius:    6px;
      --radius-lg: 8px;
      --radius-xl: 10px;
      --t:         all 0.18s cubic-bezier(0.4,0,0.2,1);

      --font-head: 'Syne', system-ui, sans-serif;
      --font-body: 'DM Mono', ui-monospace, monospace;
      /* Legacy aliases used in dynamic strings */
      --font-game: var(--font-body);
      --font-logo: var(--font-head);
    }

    /* ── Light mode overrides ── */
    [data-theme="light"] {
      --bg:      #eef1f6;
      --surface: #ffffff;
      --surface2:#f0f3f8;
      --text:    #12192a;
      --text2:   #4a5568;
      --border:  rgba(0,0,0,0.09);
      --border-h:rgba(0,0,0,0.17);
      --ink:     #12192a;
      --ink2:    #4a5568;
      --ink3:    #718096;
      --bg2:     #ffffff;
      --bg3:     #f0f3f8;
    }

    /* ═══════════════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5, .head { font-family: var(--font-head); font-weight: 700; letter-spacing: -0.01em; }

    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    input, select, textarea { font-family: inherit; outline: none; background: none; color: inherit; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

    /* ═══════════════════════════════════════════════════════
       SCREEN SYSTEM
    ═══════════════════════════════════════════════════════ */
    #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

    .screen {
      position: absolute; inset: 0;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      background: var(--bg);
    }
    .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); }

    /* ═══════════════════════════════════════════════════════
       BUTTONS — filled (lime) / outlined (lime border) / ghost
    ═══════════════════════════════════════════════════════ */
    .btn {
      min-height: 40px; padding: 10px 18px;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      letter-spacing: 0.02em;
      border-radius: var(--radius-sm);
      transition: transform 0.08s ease, background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer; border: 1px solid transparent;
      text-transform: none;
    }
    .btn-sm  { min-height: 32px; padding: 6px 12px; font-size: 12px; }
    .btn-lg  { min-height: 52px; padding: 14px 24px; font-size: 15px; font-family: var(--font-head); font-weight: 700; }

    .btn-primary {
      background: var(--lime); color: #0A1018;
      font-weight: 500;
    }
    .btn-primary:hover { transform: translateY(-2px); background: #B6EE52; }
    .btn-primary:active { transform: translateY(1px); transition-duration: 80ms; }

    .btn-outline {
      background: transparent; color: var(--lime);
      border: 1px solid var(--lime);
    }
    .btn-outline:hover { transform: translateY(-2px); background: rgba(168,230,61,0.08); }
    .btn-outline:active { transform: translateY(1px); transition-duration: 80ms; }

    .btn-ghost {
      background: var(--surface); color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border-h); transform: translateY(-2px); }
    .btn-ghost:active { transform: translateY(1px); transition-duration: 80ms; }

    .btn-danger {
      background: transparent; color: var(--coral);
      border: 1px solid var(--coral);
    }
    .btn-danger:hover { background: rgba(255,107,107,0.10); transform: translateY(-2px); }
    .btn-danger:active { transform: translateY(1px); transition-duration: 80ms; }

    .btn-success {
      background: transparent; color: var(--sky);
      border: 1px solid var(--sky);
    }
    .btn-success:hover { background: rgba(78,205,196,0.10); transform: translateY(-2px); }

    /* ═══════════════════════════════════════════════════════
       ── MAIN MENU ──
    ═══════════════════════════════════════════════════════ */
    #screen-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      padding: 40px 24px;
    }

    .menu-snake-deco {
      position: absolute;
      top: 32px; right: 32px;
      width: 140px; height: auto;
      opacity: 0.9;
    }

    .menu-content {
      position: relative; z-index: 1;
      text-align: center;
      width: 100%; max-width: 420px;
    }

    .menu-logo { margin-bottom: 48px; }

    .menu-logo .snake-wrap {
      width: 108px; height: 108px;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(168,230,61,0.18) 0%, rgba(78,205,196,0.14) 100%);
      border: 2px solid rgba(168,230,61,0.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      animation: snakeFloat 3.5s ease-in-out infinite;
      box-shadow:
        0 0 0 8px rgba(168,230,61,0.06),
        0 8px 0 rgba(10,20,10,0.55),
        0 16px 40px rgba(168,230,61,0.18);
    }
    .menu-logo .snake-emoji {
      font-size: 58px; line-height: 1;
      filter: drop-shadow(0 2px 10px rgba(168,230,61,0.35));
    }
    @keyframes snakeFloat {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-13px) rotate(3deg); }
    }

    .menu-logo h1 {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 52px;
      letter-spacing: -0.02em;
      color: var(--lime);
      line-height: 1;
      margin-bottom: 12px;
    }

    .menu-logo .tagline {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text2);
    }

    .menu-buttons { display: flex; flex-direction: column; gap: 12px; margin-bottom: 48px; }

    .btn-menu {
      min-height: 56px; padding: 16px 22px;
      font-family: var(--font-head);
      font-size: 16px; font-weight: 700;
      border-radius: var(--radius-sm);
      background: var(--lime); color: #0A1018;
      border: none;
      display: flex; align-items: center; gap: 14px;
      transition: transform 0.08s ease, background 0.18s ease;
      cursor: pointer;
      text-align: left;
    }
    .btn-menu .bm-icon { font-size: 22px; }
    .btn-menu .bm-label { flex: 1; }
    .btn-menu .bm-arrow { font-size: 22px; font-family: var(--font-body); opacity: 0.7; }
    .btn-menu:hover { transform: translateY(-2px); background: #B6EE52; }
    .btn-menu:hover .bm-arrow { transform: translateX(2px); opacity: 1; }
    .btn-menu:active { transform: translateY(1px); transition-duration: 80ms; }

    /* Ghost variant kept for any inline overrides */
    .btn-menu.primary { background: var(--lime); color: #0A1018; }
    .btn-menu.ghost {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-menu.ghost:hover { background: var(--surface2); border-color: var(--border-h); }

    /* Leaderboard on main menu */
    .menu-lb { width: 100%; max-width: 340px; margin: 0 auto 28px; }
    .menu-lb-title { font-family: var(--font-body); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text2); margin-bottom: 8px; text-align: center; }
    .menu-lb-list  { display: flex; flex-direction: column; gap: 4px; }
    .menu-lb-row   { display: flex; align-items: center; gap: 10px; padding: 7px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .menu-lb-rank  { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
    .menu-lb-emoji { font-size: 18px; flex-shrink: 0; }
    .menu-lb-name  { font-family: var(--font-body); font-size: 13px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .menu-lb-wins  { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--lime); flex-shrink: 0; }

    .menu-footer {
      font-family: var(--font-body); font-size: 12px;
      color: var(--text2);
      letter-spacing: 0.04em;
    }
    .menu-footer .credit-name { color: var(--lime); font-weight: 500; }
    .menu-version { font-family: var(--font-body); font-size: 12px; color: var(--text2); margin-top: 24px; }

    /* ═══════════════════════════════════════════════════════
       ── TOPBAR (Question Manager, Settings) ──
    ═══════════════════════════════════════════════════════ */
    .qm-topbar, .settings-topbar {
      position: sticky; top: 0; z-index: 20;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 14px;
      min-height: 64px;
    }
    .settings-topbar h2 {
      font-family: var(--font-head); font-weight: 700;
      font-size: 22px; color: var(--text);
      letter-spacing: -0.01em;
    }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      min-height: 36px; padding: 6px 14px; border-radius: var(--radius-sm);
      background: transparent;
      border: 1px solid var(--lime);
      color: var(--lime);
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: var(--t); flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(168,230,61,0.08); transform: translateY(-1px); }

    /* ═══════════════════════════════════════════════════════
       ── QUESTION MANAGER ──
    ═══════════════════════════════════════════════════════ */
    #screen-question-manager {
      display: flex; flex-direction: column;
      background: var(--bg);
    }

    .qm-breadcrumb {
      flex: 1; display: flex; align-items: center; gap: 6px;
      font-family: var(--font-body); font-size: 13px; min-width: 0;
    }
    .crumb {
      color: var(--text2); cursor: pointer; transition: color 0.15s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 400;
    }
    .crumb:hover { color: var(--text); }
    .crumb.active { color: var(--text); font-weight: 500; cursor: default; }
    .crumb-sep { color: var(--text2); flex-shrink: 0; opacity: 0.5; }

    .qm-topbar-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .qm-body { flex: 1; padding: 28px 20px 60px; max-width: 920px; margin: 0 auto; width: 100%; }

    /* Section header */
    .section-hd {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 24px; gap: 12px;
    }
    .section-hd h2 {
      font-family: var(--font-head); font-weight: 700;
      font-size: 28px; color: var(--text);
      display: flex; align-items: center; gap: 10px;
      letter-spacing: -0.01em;
    }
    .section-hd .sub { font-family: var(--font-body); font-size: 13px; color: var(--text2); margin-top: 4px; font-weight: 400; }

    /* ── Subjects Grid ── */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .subject-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 18px 18px;
      cursor: pointer;
      transition: var(--t);
      position: relative; overflow: hidden;
      text-align: left;
    }
    .subject-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--sc, var(--lime));
    }
    .subject-card:hover { background: var(--surface2); border-color: var(--border-h); transform: translateY(-2px); }

    .sc-icon { font-size: 32px; display: block; margin-bottom: 14px; }
    .sc-name { font-family: var(--font-head); font-size: 17px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    .sc-pills { display: flex; gap: 6px; flex-wrap: wrap; }

    .sc-actions {
      position: absolute; top: 12px; right: 12px;
      display: flex; gap: 4px;
      opacity: 0; transition: opacity 0.15s;
    }
    .subject-card:hover .sc-actions { opacity: 1; }

    /* Add card */
    .add-card {
      background: transparent;
      border: 1px dashed var(--border-h);
      border-radius: var(--radius);
      padding: 22px; cursor: pointer; transition: var(--t);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text2);
      min-height: 160px; text-align: center;
    }
    .add-card:hover { border-color: var(--lime); color: var(--lime); background: rgba(168,230,61,0.04); }
    .add-card .add-circle {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 300; color: var(--text2);
      transition: var(--t);
      border: 1px solid var(--border);
    }
    .add-card:hover .add-circle { background: rgba(168,230,61,0.10); color: var(--lime); border-color: var(--lime); }
    .add-card span { font-family: var(--font-body); font-size: 13px; font-weight: 500; }

    /* ── Topics List ── */
    .topics-list { display: flex; flex-direction: column; gap: 8px; }

    .topic-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer; transition: var(--t);
      display: flex; align-items: center; gap: 14px;
    }
    .topic-row:hover { background: var(--surface2); border-color: var(--border-h); transform: translateX(2px); }

    .topic-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
      background: var(--tc, var(--lime));
    }
    .topic-name { flex: 1; font-family: var(--font-body); font-size: 15px; font-weight: 500; color: var(--text); }
    .topic-actions { display: flex; gap: 4px; }
    .topic-arrow { color: var(--text2); font-size: 16px; }

    /* ── Questions List ── */
    .q-stats-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

    .stat-chip {
      padding: 4px 12px; border-radius: 999px;
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      border: 1px solid;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .stat-chip.easy   { color: var(--easy);   border-color: var(--easy);   background: var(--easy-bg); }
    .stat-chip.medium { color: var(--medium); border-color: var(--medium); background: var(--medium-bg); }
    .stat-chip.hard   { color: var(--hard);   border-color: var(--hard);   background: var(--hard-bg); }
    .stat-chip.total  { color: var(--text2);  border-color: var(--border-h); background: var(--surface); }

    .questions-list { display: flex; flex-direction: column; gap: 6px; }

    .question-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 14px 0;
      display: flex; align-items: center; gap: 12px;
      transition: var(--t);
      position: relative; overflow: hidden;
    }
    .question-row:hover { background: var(--surface2); border-color: var(--border-h); }

    .q-diff-bar {
      width: 3px; align-self: stretch; flex-shrink: 0;
      margin-right: 4px;
    }
    .q-diff-bar.easy   { background: var(--easy); }
    .q-diff-bar.medium { background: var(--medium); }
    .q-diff-bar.hard   { background: var(--hard); }

    .q-content { flex: 1; min-width: 0; }
    .q-text { font-family: var(--font-body); font-size: 14px; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .q-meta { display: flex; gap: 8px; margin-top: 4px; align-items: center; }
    .q-diff-label { font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }

    .q-actions { display: flex; gap: 4px; padding-right: 4px; }

    /* Type badge */
    .type-badge {
      padding: 2px 9px; border-radius: 999px;
      font-family: var(--font-body); font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em;
      border: 1px solid;
    }
    .type-badge.objective { background: rgba(183,148,244,0.12); color: var(--purple); border-color: rgba(183,148,244,0.35); }
    .type-badge.written   { background: rgba(78,205,196,0.10); color: var(--sky); border-color: rgba(78,205,196,0.35); }

    /* ── Pills ── */
    .pill {
      padding: 3px 9px; border-radius: 999px;
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      background: var(--surface2);
      color: var(--text2); border: 1px solid var(--border);
    }

    /* ── Icon buttons ── */
    .icon-btn {
      width: 30px; height: 30px; border-radius: var(--radius-sm);
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer; transition: var(--t);
      color: var(--text2);
    }
    .icon-btn:hover     { background: var(--surface); color: var(--text); border-color: var(--border-h); }
    .icon-btn.del:hover { background: rgba(255,107,107,0.12); border-color: var(--coral); color: var(--coral); }

    /* ═══════════════════════════════════════════════════════
       MODAL
    ═══════════════════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,25,35,0.85);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border-h);
      border-radius: var(--radius-lg);
      padding: 28px; width: 100%; max-width: 540px;
      transform: scale(0.94) translateY(8px);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 92vh; overflow-y: auto;
    }
    .modal-overlay.open .modal-box { transform: scale(1) translateY(0); }
    .modal-box.wide { max-width: 680px; }

    .modal-title { font-family: var(--font-head); font-size: 22px; font-weight: 700; margin-bottom: 22px; display: flex; align-items: center; gap: 10px; color: var(--text); letter-spacing: -0.01em; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 26px; padding-top: 20px; border-top: 1px solid var(--border); }

    /* ═══════════════════════════════════════════════════════
       FORMS
    ═══════════════════════════════════════════════════════ */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-family: var(--font-body);
      font-size: 11px; font-weight: 500;
      color: var(--text2); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .form-hint { font-family: var(--font-body); font-size: 11px; color: var(--text2); margin-top: 6px; }

    .form-input {
      width: 100%; padding: 11px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: var(--font-body);
      font-size: 14px; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--lime); }
    .form-input::placeholder { color: var(--text2); opacity: 0.6; }
    textarea.form-input { resize: vertical; min-height: 80px; line-height: 1.5; }
    select.form-input { cursor: pointer; }
    select.form-input option { background: var(--surface); color: var(--text); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* MCQ */
    .mcq-options { display: flex; flex-direction: column; gap: 8px; }
    .mcq-option { display: flex; align-items: center; gap: 10px; }
    .mcq-letter {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-size: 12px; font-weight: 700; color: var(--text2);
      flex-shrink: 0;
    }
    .mcq-radio { width: 16px; height: 16px; accent-color: var(--lime); cursor: pointer; flex-shrink: 0; }
    .mcq-radio:checked + .mcq-letter { background: rgba(168,230,61,0.18); border-color: var(--lime); color: var(--lime); }

    /* Color palette */
    .color-palette { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch {
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: var(--t);
    }
    .color-swatch:hover { transform: scale(1.12); }
    .color-swatch.sel { border-color: var(--text); transform: scale(1.16); }

    /* Emoji picker */
    .emoji-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .emoji-opt {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; transition: var(--t);
    }
    .emoji-opt:hover { background: var(--surface2); border-color: var(--border-h); }
    .emoji-opt.sel { background: rgba(168,230,61,0.10); border-color: var(--lime); }

    /* ═══════════════════════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════════════════════ */
    .empty-state { text-align: center; padding: 56px 20px; color: var(--text2); }
    .empty-state .es-icon { font-size: 48px; display: block; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h3 { font-family: var(--font-head); font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-state p  { font-family: var(--font-body); font-size: 13px; line-height: 1.6; margin-bottom: 22px; color: var(--text2); }

    /* ═══════════════════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════════════════ */
    #toast-root {
      position: fixed; bottom: 22px; right: 22px;
      z-index: 999; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border-h);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      color: var(--text);
      display: flex; align-items: center; gap: 10px;
      animation: toastIn 0.28s cubic-bezier(0.34,1.56,0.64,1), toastOut 0.28s ease 2.7s forwards;
      max-width: 320px; pointer-events: none;
    }
    .toast.success { border-left: 3px solid var(--lime); }
    .toast.error   { border-left: 3px solid var(--coral); }
    .toast.info    { border-left: 3px solid var(--sky); }

    @keyframes toastIn  { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastOut { to   { transform: translateX(20px); opacity: 0; } }

    /* ═══════════════════════════════════════════════════════
       PLACEHOLDER SCREENS
    ═══════════════════════════════════════════════════════ */
    .placeholder-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; gap: 16px; color: var(--text2);
    }
    .placeholder-screen .ph-icon { font-size: 56px; }
    .placeholder-screen h2 { font-family: var(--font-head); font-size: 28px; font-weight: 700; color: var(--text); }
    .placeholder-screen p  { font-family: var(--font-body); font-size: 13px; color: var(--text2); }

    /* ═══════════════════════════════════════════════════════
       ── GAME SETUP WIZARD ──
    ═══════════════════════════════════════════════════════ */
    #screen-game-setup {
      background: var(--bg);
    }

    .setup-wrap {
      max-width: 720px; margin: 0 auto;
      padding: 32px 24px 80px; min-height: 100vh;
    }

    /* Step indicator */
    .step-bar {
      display: flex; align-items: center; gap: 0;
      margin-bottom: 36px;
    }
    .step-node {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      flex: 1;
    }
    .step-circle {
      width: 36px; height: 36px; border-radius: 50%;
      background: transparent; border: 1px solid var(--border-h);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-size: 14px; font-weight: 700;
      color: var(--text2);
      transition: var(--t); position: relative; z-index: 1;
    }
    .step-label {
      font-family: var(--font-body);
      font-size: 11px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text2); transition: var(--t);
    }
    .step-node.active .step-circle  { background: var(--lime); border-color: var(--lime); color: #0A1018; }
    .step-node.active .step-label   { color: var(--text); }
    .step-node.done   .step-circle  { background: transparent; border-color: var(--sky); color: var(--sky); }
    .step-node.done   .step-label   { color: var(--sky); }
    .step-line {
      flex: 1; height: 1px; background: var(--border-h);
      margin-bottom: 22px; transition: background 0.3s;
    }
    .step-line.done { background: var(--sky); }

    /* Step content */
    .step-panel { animation: stepIn 0.22s ease; }
    @keyframes stepIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .step-title { font-family: var(--font-head); font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--text); letter-spacing: -0.01em; }
    .step-sub   { font-family: var(--font-body); font-size: 13px; color: var(--text2); margin-bottom: 28px; line-height: 1.5; }

    /* Toggle groups */
    .toggle-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .tog {
      min-height: 40px; padding: 10px 18px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text2); font-family: var(--font-body);
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: var(--t);
    }
    .tog:hover { background: var(--surface2); color: var(--text); border-color: var(--border-h); }
    .tog.on {
      background: rgba(168,230,61,0.08);
      border-color: var(--lime); color: var(--lime);
    }
    .tog.on.easy-tog   { background: rgba(78,205,196,0.10);  border-color: var(--easy);   color: var(--easy); }
    .tog.on.medium-tog { background: rgba(255,179,71,0.12);  border-color: var(--medium); color: var(--medium); }
    .tog.on.hard-tog   { background: rgba(255,107,107,0.12); border-color: var(--hard);   color: var(--hard); }

    /* Difficulty toggle with L/S count sub-label */
    .diff-tog { display: flex; flex-direction: column; align-items: center; gap: 2px; min-height: 52px; padding: 8px 18px; }
    .diff-label  { font-size: 13px; font-weight: 600; line-height: 1; }
    .diff-counts { font-size: 10px; font-weight: 500; opacity: 0.60; letter-spacing: 0.04em; line-height: 1; }
    .tog.on .diff-counts { opacity: 0.90; }

    /* Board size cards */
    .board-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .board-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 16px;
      cursor: pointer; transition: var(--t); text-align: center;
    }
    .board-card:hover { border-color: var(--border-h); background: var(--surface2); transform: translateY(-2px); }
    .board-card.on {
      border-color: var(--lime);
      background: rgba(168,230,61,0.08);
    }
    .board-card .bc-icon  { font-size: 32px; display: block; margin-bottom: 10px; }
    .board-card .bc-label { font-family: var(--font-head); font-weight: 700; font-size: 17px; margin-bottom: 4px; color: var(--text); }
    .board-card .bc-meta  { font-family: var(--font-body); font-size: 12px; color: var(--text2); }
    .board-card.on .bc-label { color: var(--lime); }

    /* Topic selector */
    .subject-pick {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;
    }
    .subj-btn {
      padding: 10px 16px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; font-family: var(--font-body); font-size: 13px; font-weight: 500;
      color: var(--text2); display: flex; align-items: center; gap: 8px;
      transition: var(--t);
    }
    .subj-btn:hover { background: var(--surface2); color: var(--text); }
    .subj-btn.on { border-color: var(--sc, var(--lime)); color: var(--text); background: var(--surface2); }

    .topics-pick { display: flex; flex-direction: column; gap: 8px; }
    .topic-pick-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px;
      cursor: pointer; transition: var(--t);
    }
    .topic-pick-row:hover { background: var(--surface2); border-color: var(--border-h); }
    .topic-pick-row.on { border-color: var(--tc, var(--lime)); background: rgba(168,230,61,0.06); }
    .topic-check {
      width: 20px; height: 20px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-h);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; transition: var(--t); flex-shrink: 0;
      color: #0A1018;
    }
    .topic-pick-row.on .topic-check { background: var(--tc, var(--lime)); border-color: var(--tc, var(--lime)); }

    .q-tally {
      margin-top: 16px; padding: 14px 18px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex; gap: 18px; flex-wrap: wrap;
    }
    .q-tally-item { font-family: var(--font-body); font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .warn-chip { color: var(--amber); }
    .ok-chip   { color: var(--lime); }

    /* Player count selector */
    .count-row { display: flex; gap: 8px; margin-bottom: 22px; }
    .count-btn {
      width: 44px; height: 44px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      font-family: var(--font-head);
      font-size: 17px; font-weight: 700; color: var(--text2);
      cursor: pointer; transition: var(--t);
    }
    .count-btn.on { background: var(--lime); border-color: var(--lime); color: #0A1018; }
    .count-btn:hover:not(.on) { background: var(--surface2); color: var(--text); }

    /* Player cards */
    .players-grid { display: flex; flex-direction: column; gap: 12px; }
    .player-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius);
      border-left: 4px solid var(--pc, var(--lime));
      overflow: hidden; transition: var(--t);
    }
    .player-card:hover { border-color: var(--border-h); border-left-color: var(--pc, var(--lime)); }
    .pc-header {
      padding: 12px 18px; display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .pc-avatar {
      width: 46px; height: 46px; border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0; transition: var(--t);
    }
    .pc-num { font-family: var(--font-body); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); flex: 1; }
    .pc-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

    .emoji-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .emoji-chip {
      width: 38px; height: 38px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; transition: var(--t);
    }
    .emoji-chip:hover { background: var(--surface2); border-color: var(--border-h); }
    .emoji-chip.on { border-color: var(--lime); background: rgba(168,230,61,0.10); }

    .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-dot {
      width: 28px; height: 28px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent; transition: var(--t);
    }
    .color-dot:hover { transform: scale(1.12); }
    .color-dot.on { border-color: var(--text); transform: scale(1.18); }

    /* Step nav */
    .step-nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 36px; padding-top: 24px; border-top: 1px solid var(--border);
    }

    /* Review screen */
    .review-section { margin-bottom: 22px; }
    .review-label { font-family: var(--font-body); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text2); margin-bottom: 12px; }
    .review-players { display: flex; gap: 10px; flex-wrap: wrap; }
    .review-player {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 16px; border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border);
      min-width: 80px;
    }
    .review-player .rp-emoji { font-size: 30px; line-height: 1; }
    .review-player .rp-name  { font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--text); text-align: center; }
    .review-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
    .review-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
    }
    .review-item .ri-key { font-family: var(--font-body); font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .review-item .ri-val { font-family: var(--font-head); font-size: 15px; font-weight: 700; color: var(--text); }
    .q-warn {
      background: rgba(255,179,71,0.08); border: 1px solid rgba(255,179,71,0.30);
      border-left: 3px solid var(--amber);
      border-radius: var(--radius); padding: 12px 16px;
      font-family: var(--font-body); font-size: 12px; color: var(--amber);
      margin-bottom: 16px; line-height: 1.5;
    }

    .start-btn {
      width: 100%; min-height: 52px; padding: 16px;
      font-family: var(--font-head); font-size: 18px; font-weight: 700;
      background: var(--lime); color: #0A1018; border: none; border-radius: var(--radius-sm);
      cursor: pointer; transition: transform 0.08s ease, background 0.18s ease;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      letter-spacing: 0.01em;
    }
    .start-btn:hover { transform: translateY(-2px); background: #B6EE52; }
    .start-btn:active { transform: translateY(1px); transition-duration: 80ms; }

    /* ═══════════════════════════════════════════════════════
       ── SETTINGS ──
    ═══════════════════════════════════════════════════════ */
    #screen-settings { background: var(--bg); }

    .settings-wrap {
      max-width: 640px; margin: 0 auto; padding: 0 0 60px;
    }
    .settings-body-pad { padding: 28px 24px 60px; }

    .settings-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
    }
    .settings-section-title {
      padding: 14px 18px; font-family: var(--font-body);
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--text2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .settings-row {
      padding: 16px 18px; display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--border); transition: var(--t);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row:hover { background: var(--surface2); }
    .settings-row .sr-icon  { font-size: 22px; flex-shrink: 0; }
    .settings-row .sr-text  { flex: 1; }
    .settings-row .sr-title { font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--text); }
    .settings-row .sr-desc  { font-family: var(--font-body); font-size: 12px; color: var(--text2); margin-top: 3px; }
    .settings-row .sr-action { flex-shrink: 0; }
    .settings-row.dimmed { opacity: 0.4; pointer-events: none; }

    /* Creator card */
    .creator-card {
      display: flex; align-items: center; gap: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--lime);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin: 4px 18px 18px;
    }
    .creator-avatar {
      width: 46px; height: 46px; border-radius: var(--radius-sm);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .creator-info { flex: 1; }
    .creator-name { font-family: var(--font-head); font-size: 18px; font-weight: 700; color: var(--lime); letter-spacing: -0.01em; }
    .creator-sub { font-family: var(--font-body); font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* Toggle switch */
    .toggle-switch { position: relative; display: inline-block; cursor: pointer; }
    .toggle-switch input { position: absolute; opacity: 0; width: 0; height: 0; }
    .toggle-track {
      display: block; width: 44px; height: 24px; border-radius: 12px;
      background: var(--border-h); transition: background 0.22s ease; position: relative;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--lime); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff;
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }
    .toggle-switch input:checked + .toggle-track .toggle-thumb { transform: translateX(20px); }

    /* Volume range slider */
    .vol-slider {
      width: 100%; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px;
      background: var(--border-h); outline: none;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: var(--lime); cursor: pointer;
      border: none;
    }
    .vol-slider::-moz-range-thumb {
      width: 16px; height: 16px; border: none;
      border-radius: 50%; background: var(--lime); cursor: pointer;
    }

    /* History clear button */
    .hist-clear-btn {
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: var(--radius-sm);
      background: transparent; border: 1px solid var(--coral);
      color: var(--coral); cursor: pointer; transition: var(--t); white-space: nowrap;
    }
    .hist-clear-btn:hover { background: rgba(255,107,107,0.10); }

    /* ═══════════════════════════════════════════════════════
       ── GAME BOARD ──
    ═══════════════════════════════════════════════════════ */
    #screen-game-board { background: var(--bg); display: flex; flex-direction: column; }

    .game-topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex; align-items: center; gap: 14px;
      height: 50px; flex-shrink: 0;
    }
    .gt-title { font-family: var(--font-head); font-size: 15px; font-weight: 700; color: var(--text); }
    .gt-spacer { flex: 1; }
    .theme-toggle-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border-h);
      color: var(--text); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: var(--t);
      flex-shrink: 0;
    }
    .theme-toggle-btn:hover { background: var(--border-h); }
    .pause-btn {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-right: 4px; transition: var(--t);
    }
    .pause-btn:hover { background: var(--surface2); color: var(--text); }

    .pause-overlay {
      position: absolute; inset: 0; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10,18,28,0.88); backdrop-filter: blur(8px);
    }
    .pause-card {
      background: var(--surface); border: 1px solid var(--border-h);
      border-radius: 18px; padding: 40px 48px;
      text-align: center; display: flex; flex-direction: column; align-items: center;
    }
    .pause-icon  { font-size: 48px; margin-bottom: 10px; }
    .pause-title { font-family: var(--font-head); font-size: 26px; font-weight: 800; color: var(--text); }
    .pause-sub   { font-family: var(--font-body); font-size: 13px; color: var(--text2); margin-top: 6px; }

    .game-layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .game-canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-width: 0;
      overflow: hidden;
      transition: transform 0.1s;
      position: relative;
      background: var(--bg);
    }

    /* ── CSS 3D Dice ── */
    .d3-layer {
      position: absolute;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }
    .d3-scene {
      position: absolute;
      width: 56px; height: 56px;
      perspective: 200px;
      will-change: transform, opacity;
    }
    .d3-cube {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .d3-face {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      background: #F5F0E8;
      border: 1px solid rgba(0,0,0,0.2);
    }
    .d3-front  { transform: translateZ(28px); }
    .d3-back   { transform: rotateY(180deg)  translateZ(28px); }
    .d3-right  { transform: rotateY( 90deg)  translateZ(28px); }
    .d3-left   { transform: rotateY(-90deg)  translateZ(28px); }
    .d3-top    { transform: rotateX( 90deg)  translateZ(28px); }
    .d3-bottom { transform: rotateX(-90deg)  translateZ(28px); }
    .d3-pip {
      position: absolute;
      width: 18%; height: 18%;
      background: #0F1923;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    #game-canvas {
      border-radius: var(--radius);
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    /* Screen shake on snake bite */
    .shake { animation: boardShake 0.35s ease; }
    @keyframes boardShake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-6px); }
      75%     { transform: translateX(6px); }
    }

    /* Sidebar */
    .game-sidebar {
      width: 280px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      background: var(--surface);
      display: flex;
      flex-direction: column;
    }

    .sidebar-sec {
      padding: 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-label {
      font-family: var(--font-body);
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text2); margin-bottom: 10px;
    }

    /* Current turn banner */
    .turn-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--lime);
      border-radius: var(--radius);
      margin-bottom: 14px;
      transition: var(--t);
    }
    .turn-emoji { font-size: 32px; line-height: 1; flex-shrink: 0; }
    .turn-name  { font-family: var(--font-head); font-weight: 700; font-size: 16px; color: var(--text); }
    .turn-sq    { font-family: var(--font-body); font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* Dice */
    .dice-wrap { text-align: center; }
    .dice-face {
      font-size: 44px; line-height: 1;
      display: block; margin-bottom: 12px;
      color: var(--text);
    }
    .dice-face.pop { animation: dicePop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes dicePop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.35)} }

    .dice-btn {
      width: 100%; min-height: 48px; padding: 12px 18px;
      background: var(--lime); color: #0A1018;
      font-family: var(--font-head);
      font-size: 14px; font-weight: 700; letter-spacing: 0.02em;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      transition: transform 0.08s ease, background 0.18s ease;
    }
    .dice-btn:hover:not(:disabled) { transform: translateY(-2px); background: #B6EE52; }
    .dice-btn:active:not(:disabled) { transform: translateY(1px); transition-duration: 80ms; }
    .dice-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .dice-moving { font-family: var(--font-body); color: var(--text2); font-size: 12px; text-align: center; padding: 10px 0; }

    /* Player status cards */
    .player-statuses { display: flex; flex-direction: column; gap: 6px; }

    .ps-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: var(--t);
    }
    .ps-card.active {
      border-color: var(--lime);
      background: rgba(168,230,61,0.06);
      border-left: 3px solid var(--lime);
      padding-left: 10px;
    }
    .ps-emo  { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .ps-info { flex: 1; min-width: 0; }
    .ps-name { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ps-sq   { font-family: var(--font-body); font-size: 11px; color: var(--text2); margin-top: 1px; }
    .ps-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .ps-chip {
      font-family: var(--font-body); font-size: 10px; font-weight: 500;
      padding: 1px 6px; border-radius: var(--radius-sm);
    }
    .ps-chip.ok     { background: rgba(168,230,61,0.12); color: var(--lime); }
    .ps-chip.wrong  { background: rgba(255,107,107,0.12); color: var(--coral); }
    .ps-chip.streak { background: rgba(255,179,71,0.14); color: var(--amber); }

    /* ── Power-up Inventory ── */
    .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .inv-slot {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 8px;
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; min-height: 84px;
      transition: var(--t);
    }
    .inv-slot.empty { border-style: dashed; opacity: 0.38; justify-content: center; }
    .inv-empty-txt  { font-family: var(--font-body); font-size: 11px; color: var(--text2); }
    .inv-emoji { font-size: 26px; line-height: 1; }
    .inv-name  { font-family: var(--font-body); font-size: 10px; font-weight: 500; color: var(--text); text-align: center; }
    .inv-use-btn {
      margin-top: auto; padding: 3px 10px;
      background: var(--lime); color: #0A1018;
      font-family: var(--font-body); font-size: 10px; font-weight: 700;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      letter-spacing: 0.06em; transition: transform 0.08s ease;
    }
    .inv-use-btn:hover:not(:disabled) { transform: scale(1.06); }
    .inv-use-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .inv-passive {
      margin-top: auto; padding: 2px 7px;
      background: rgba(255,179,71,0.14); color: var(--amber);
      font-family: var(--font-body); font-size: 9px; font-weight: 700;
      border-radius: var(--radius-sm); letter-spacing: 0.10em;
    }
    .inv-empty-msg {
      font-family: var(--font-body); font-size: 11px; color: var(--text2);
      text-align: center; padding: 8px 0;
    }
    .inv-hint {
      font-family: var(--font-body); font-size: 10px; color: var(--lime);
      text-align: center; margin-top: 6px; opacity: 0.85;
    }

    /* ── Power-up Guide ── */
    .pu-guide { display: flex; flex-direction: column; gap: 5px; max-height: 230px; overflow-y: auto; }
    .pu-guide-row {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 6px 8px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px;
    }
    .pu-gr-emoji { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
    .pu-gr-body  { flex: 1; min-width: 0; }
    .pu-gr-name  { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .pu-gr-desc  { font-family: var(--font-body); font-size: 10px; color: var(--text2); line-height: 1.3; margin-top: 2px; }
    .pu-gr-tag   { font-size: 8px; font-weight: 700; letter-spacing: 0.10em; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
    .pu-gr-tag.passive { background: rgba(255,179,71,0.14); color: var(--amber); }
    .pu-gr-tag.active  { background: rgba(168,230,61,0.12); color: var(--lime); }
    .pu-gr-tag.wc      { background: rgba(180,100,255,0.14); color: #C880FF; }

    /* ── Wildcard Event Overlay ── */
    .wc-overlay {
      position: absolute; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10,18,28,0.88);
      backdrop-filter: blur(6px);
      animation: wcFadeIn 0.22s ease;
    }
    @keyframes wcFadeIn { from { opacity:0; } to { opacity:1; } }
    .wc-card {
      background: var(--surface);
      border: 1px solid var(--border-h);
      border-radius: 18px;
      padding: 36px 44px;
      text-align: center;
      max-width: 300px;
      animation: wcPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes wcPop { from { transform:scale(0.72); opacity:0; } to { transform:scale(1); opacity:1; } }
    .wc-emoji { font-size: 54px; line-height: 1; margin-bottom: 14px; }
    .wc-name  { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--purple); margin-bottom: 8px; }
    .wc-desc  { font-family: var(--font-body); font-size: 13px; color: var(--text2); }

    /* Mobile stacking */
    @media (max-width: 680px) {
      .game-layout   { flex-direction: column; height: auto; overflow-y: auto; }
      .game-canvas-area { height: 70vw; min-height: 280px; max-height: 70vw; }
      .game-sidebar  { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    }

    /* ═══════════════════════════════════════════════════════
       ── QUESTION POPUP ──
    ═══════════════════════════════════════════════════════ */
    #qpop-overlay {
      position: fixed; inset: 0; z-index: 400;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background: rgba(15,25,35,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    #qpop-overlay.open { opacity: 1; pointer-events: all; }

    .qpop-card {
      background: var(--surface);
      border: 1px solid var(--border-h);
      border-radius: var(--radius-lg);
      padding: 0;
      width: 100%; max-width: 540px;
      transform: scale(0.94) translateY(8px);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }
    #qpop-overlay.open .qpop-card { transform: scale(1) translateY(0); }

    /* Timer bar at top of card */
    .qpop-timer-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
      z-index: 2;
    }
    .qpop-timer-bar-fill {
      height: 100%; width: 100%;
      background: var(--amber);
      transform-origin: left center;
      transition: transform 0.95s linear, background-color 0.3s ease;
    }
    .qpop-timer-bar-fill.urgent { background: var(--coral); }

    .qpop-inner { padding: 28px 26px; }

    /* Top row: context badge + diff badge + timer */
    .qpop-toprow {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }

    .qpop-ctx-badge {
      padding: 4px 12px; border-radius: 999px;
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border-h);
      flex-shrink: 0; letter-spacing: 0.04em;
    }
    .qpop-ctx-badge.snake   { background: rgba(255,107,107,0.12); color: var(--coral);  border-color: rgba(255,107,107,0.35); }
    .qpop-ctx-badge.ladder  { background: rgba(255,179,71,0.12);  color: var(--amber);  border-color: rgba(255,179,71,0.35); }
    .qpop-ctx-badge.bonus   { background: rgba(168,230,61,0.10);  color: var(--lime);   border-color: rgba(168,230,61,0.35); }
    .qpop-ctx-badge.powerup { background: rgba(168,230,61,0.10);  color: var(--lime);   border-color: rgba(168,230,61,0.35); }
    .qpop-ctx-badge.finish  { background: rgba(255,179,71,0.12);  color: var(--amber);  border-color: rgba(255,179,71,0.35); }

    .qpop-topic-badge {
      margin-left: auto;
      padding: 3px 10px; border-radius: 999px;
      font-family: var(--font-body); font-size: 10px; font-weight: 500;
      background: var(--surface2); color: var(--text2);
      border: 1px solid var(--border); letter-spacing: 0.04em;
      max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .qpop-diff-badge {
      padding: 3px 10px; border-radius: 999px;
      font-family: var(--font-body); font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em;
      border: 1px solid;
    }
    .qpop-diff-badge.easy   { color: var(--easy);   border-color: var(--easy);   background: var(--easy-bg); }
    .qpop-diff-badge.medium { color: var(--medium); border-color: var(--medium); background: var(--medium-bg); }
    .qpop-diff-badge.hard   { color: var(--hard);   border-color: var(--hard);   background: var(--hard-bg); }

    /* Optional ring timer (legacy fallback) */
    .qpop-timer-wrap {
      position: relative; margin-left: auto;
      width: 36px; height: 36px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .qpop-ring { display: none; }
    .qpop-timer-num {
      font-family: var(--font-head);
      font-size: 16px; font-weight: 700; color: var(--text);
    }

    /* Question text */
    .qpop-q-text {
      font-family: var(--font-head);
      font-size: 20px; font-weight: 700; line-height: 1.45;
      color: var(--text); margin-bottom: 22px;
      letter-spacing: -0.005em;
    }

    /* MCQ grid */
    .qpop-opts-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 18px;
    }

    .qpop-opt {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 14px; border-radius: var(--radius);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-body);
      font-size: 14px; font-weight: 400;
      cursor: pointer; text-align: left;
      transition: background 0.14s, border-color 0.14s, transform 0.08s;
    }
    .qpop-opt:hover:not(:disabled) {
      border-color: var(--lime);
      transform: translateY(-1px);
    }
    .qpop-opt:disabled { cursor: default; opacity: 0.7; }
    .qpop-opt.correct {
      background: rgba(78,205,196,0.12); border-color: var(--sky);
      color: var(--sky); opacity: 1;
      animation: correctPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .qpop-opt.wrong {
      background: rgba(255,107,107,0.10); border-color: var(--coral);
      color: var(--coral); opacity: 1;
      animation: wrongShake 0.35s ease;
    }
    @keyframes correctPop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes wrongShake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); } 40%,80% { transform: translateX(6px); } }

    .qpop-opt-letter {
      width: 30px; height: 30px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head);
      font-size: 13px; font-weight: 700;
      background: var(--surface); color: var(--text);
      flex-shrink: 0;
    }
    .qpop-opt-text { flex: 1; }

    /* Written answer input */
    .qpop-written { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }

    .qpop-input {
      width: 100%; padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font-body); font-size: 15px;
      transition: border-color 0.15s;
    }
    .qpop-input:focus { border-color: var(--lime); }
    .qpop-input::placeholder { color: var(--text2); opacity: 0.6; }
    .qpop-input:disabled { opacity: 0.6; }

    .qpop-submit-btn {
      min-height: 48px;
      padding: 12px 22px; border-radius: var(--radius-sm);
      background: var(--lime); color: #0A1018;
      font-family: var(--font-head);
      font-size: 15px; font-weight: 700;
      border: none; cursor: pointer;
      transition: transform 0.08s ease, background 0.18s ease;
    }
    .qpop-submit-btn:hover  { transform: translateY(-2px); background: #B6EE52; }
    .qpop-submit-btn:active { transform: translateY(1px); transition-duration: 80ms; }

    /* Result panel */
    .qpop-result { margin-top: 6px; }

    .qpop-result-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: var(--radius); margin-bottom: 10px;
      font-family: var(--font-head);
      font-size: 18px; font-weight: 700;
      animation: resultPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
      border: 1px solid;
    }
    .qpop-result-banner.correct { background: rgba(78,205,196,0.10); color: var(--sky); border-color: var(--sky); }
    .qpop-result-banner.wrong   { background: rgba(255,107,107,0.10); color: var(--coral); border-color: var(--coral); }
    @keyframes resultPop {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .qpop-correct-ans {
      font-family: var(--font-body); font-size: 13px; color: var(--text);
      margin-bottom: 10px; font-weight: 500;
      padding: 10px 14px; background: rgba(78,205,196,0.06); border-radius: var(--radius);
      border-left: 3px solid var(--sky);
    }
    .qpop-correct-ans strong { color: var(--sky); font-weight: 500; }

    .qpop-explanation {
      font-family: var(--font-body); font-size: 13px; color: var(--text2); line-height: 1.65;
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: var(--radius);
      border-left: 3px solid var(--lime);
    }

    /* Hard-zone bonus choice buttons */
    .qpop-bonus-row {
      display: flex; gap: 10px; margin-top: 14px;
    }
    .qpop-bonus-btn {
      flex: 1; min-height: 48px;
      padding: 13px 14px; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 14px; font-weight: 500;
      cursor: pointer; border: 1px solid; transition: var(--t);
      text-align: center;
    }
    .qpop-bonus-btn.reroll {
      background: transparent; border-color: var(--sky); color: var(--sky);
    }
    .qpop-bonus-btn.reroll:hover { background: rgba(78,205,196,0.10); transform: translateY(-2px); }
    .qpop-bonus-btn.advance {
      background: transparent; border-color: var(--lime); color: var(--lime);
    }
    .qpop-bonus-btn.advance:hover { background: rgba(168,230,61,0.08); transform: translateY(-2px); }

    @media (max-width: 520px) {
      .qpop-inner { padding: 22px 18px; }
      .qpop-opts-grid { grid-template-columns: 1fr; }
      .qpop-q-text { font-size: 17px; }
    }

    /* Question image inside popup */
    .qpop-img-wrap {
      width: 100%; max-height: 200px;
      overflow: hidden; border-radius: var(--radius);
      margin-bottom: 14px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
    }
    .qpop-img-wrap img {
      width: 100%; height: 200px; object-fit: contain;
      border-radius: var(--radius);
    }

    /* Image upload row in QM modal */
    .img-upload-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .img-upload-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      background: transparent; border: 1px solid var(--lime);
      color: var(--lime); cursor: pointer; transition: var(--t);
    }
    .img-upload-btn:hover { background: rgba(168,230,61,0.08); transform: translateY(-1px); }
    .img-clear-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 12px; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      background: transparent; border: 1px solid var(--coral);
      color: var(--coral); cursor: pointer; transition: var(--t);
    }
    .img-clear-btn:hover { background: rgba(255,107,107,0.10); }
    .img-preview-thumb {
      width: 48px; height: 48px; border-radius: var(--radius-sm);
      object-fit: cover; border: 1px solid var(--border-h);
    }

    /* ═══════════════════════════════════════════════════════
       ── ROUND SUMMARY ──
    ═══════════════════════════════════════════════════════ */
    #screen-summary {
      background: var(--bg);
      overflow-y: auto;
    }

    .sum-wrap {
      position: relative;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }

    .sum-confetti {
      position: fixed; inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .cfp {
      position: absolute;
      top: -20px;
      animation: cfFall linear forwards;
    }
    @keyframes cfFall {
      0%   { transform: translateY(0) rotate(0deg);    opacity: 1; }
      75%  { opacity: 0.9; }
      100% { transform: translateY(105vh) rotate(680deg); opacity: 0; }
    }

    .sum-inner {
      position: relative; z-index: 1;
      width: 100%; max-width: 680px;
      padding: 40px 24px 72px;
      display: flex; flex-direction: column; gap: 22px;
    }

    /* Winner hero card */
    .sum-hero {
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--lime);
      border-radius: var(--radius-lg);
      padding: 40px 28px 32px;
      position: relative;
      overflow: hidden;
    }
    .sum-hero-trophy {
      font-size: 64px;
      margin-bottom: 8px;
      display: block;
    }
    .sum-hero-badge {
      display: inline-block;
      background: var(--lime); color: #0A1018;
      font-family: var(--font-body);
      font-size: 11px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase;
      padding: 4px 14px; border-radius: 999px;
      margin-bottom: 14px;
    }
    .sum-hero-avatar {
      font-size: 56px; line-height: 1;
      margin-bottom: 10px;
    }
    .sum-hero-name {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 40px;
      color: var(--lime);
      letter-spacing: -0.02em;
    }
    .sum-hero-stats {
      display: flex; gap: 18px; justify-content: center;
      margin-top: 20px; flex-wrap: wrap;
    }
    .sum-hero-stat {
      font-family: var(--font-body);
      font-size: 13px; font-weight: 500; color: var(--text2);
      display: flex; align-items: center; gap: 6px;
    }
    .sum-hero-stat .sv { font-family: var(--font-head); font-weight: 700; font-size: 17px; }
    .sum-hero-stat.correct .sv { color: var(--lime); }
    .sum-hero-stat.wrong   .sv { color: var(--coral); }
    .sum-hero-stat.streak  .sv { color: var(--amber); }
    .sum-hero-stat.acc     .sv { color: var(--sky); }
    .sum-hero-stat.turns   .sv { color: var(--text); }

    /* Section panels */
    .sum-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .sum-panel-hd {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-body);
      font-size: 11px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text2);
      display: flex; align-items: center; gap: 8px;
    }
    .sum-panel-hd .cnt {
      margin-left: auto;
      font-family: var(--font-body); font-size: 11px; font-weight: 500; color: var(--text2);
      background: var(--surface2); padding: 3px 10px; border-radius: 999px;
    }

    /* Rankings table */
    .sum-rank-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      transition: var(--t);
    }
    .sum-rank-row:last-child { border-bottom: none; }
    .sum-rank-row:hover { background: var(--surface2); }
    .sum-rank-medal { font-size: 24px; flex-shrink: 0; width: 30px; text-align: center; }
    .sum-rank-avatar { font-size: 28px; flex-shrink: 0; }
    .sum-rank-info { flex: 1; min-width: 0; }
    .sum-rank-name { font-family: var(--font-head); font-size: 15px; font-weight: 700; color: var(--text); }
    .sum-rank-pos  { font-family: var(--font-body); font-size: 12px; color: var(--text2); margin-top: 2px; }
    .sum-rank-stats { display: flex; gap: 12px; flex-shrink: 0; }
    .sum-rank-stat {
      font-family: var(--font-body);
      font-size: 13px; font-weight: 500; color: var(--text2);
      display: flex; align-items: center; gap: 4px;
    }
    .sum-rank-stat.c { color: var(--lime); }
    .sum-rank-stat.w { color: var(--coral); }

    /* Question log */
    .sum-qlog-row {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 12px;
      transition: var(--t);
    }
    .sum-qlog-row:last-child { border-bottom: none; }
    .sum-qlog-row:hover { background: var(--surface2); }
    .sum-qlog-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .sum-qlog-body { flex: 1; min-width: 0; }
    .sum-qlog-q  { font-family: var(--font-body); font-size: 13px; color: var(--text); font-weight: 400; line-height: 1.4;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sum-qlog-meta { font-family: var(--font-body); font-size: 11px; color: var(--text2); margin-top: 4px;
                     display: flex; gap: 10px; align-items: center; }
    .sum-qlog-badge {
      font-family: var(--font-body); font-size: 10px; font-weight: 500;
      padding: 2px 7px; border-radius: var(--radius-sm);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .sum-qlog-badge.easy   { background: var(--easy-bg);   color: var(--easy); }
    .sum-qlog-badge.medium { background: var(--medium-bg); color: var(--medium); }
    .sum-qlog-badge.hard   { background: var(--hard-bg);   color: var(--hard); }
    .sum-qlog-correct { color: var(--lime); font-weight: 500; }
    .sum-qlog-wrong   { color: var(--coral); font-weight: 500; }

    /* Action buttons */
    .sum-actions {
      display: flex; gap: 12px; justify-content: center; padding: 4px 0;
    }

    @media (max-width: 520px) {
      .sum-hero-name { font-size: 30px; }
      .sum-rank-stats { display: none; }
    }

    /* ── Learning Insights topic breakdown ── */
    .sum-insight-player { padding: 12px 18px; border-bottom: 1px solid var(--border); }
    .sum-insight-player:last-child { border-bottom: none; }
    .sum-insight-hd { font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .sum-topic-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
    .sum-topic-name { font-family: var(--font-body); font-size: 11px; color: var(--text2); width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sum-topic-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 7px; overflow: hidden; }
    .sum-topic-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .sum-topic-pct { font-family: var(--font-body); font-size: 11px; font-weight: 600; width: 36px; text-align: right; flex-shrink: 0; }

    /* ── Achievement badges ── */
    .sum-badges {
      display: flex; flex-wrap: wrap; gap: 12px;
      padding: 18px 18px 18px;
    }
    .sum-badge {
      flex: 1; min-width: 130px; max-width: 180px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px 14px;
      text-align: center;
    }
    .sum-badge-icon   { font-size: 28px; line-height: 1; }
    .sum-badge-label  { font-family: var(--font-body); font-size: 11px; font-weight: 500; text-transform: uppercase;
                        letter-spacing: 0.08em; color: var(--amber); margin-top: 4px; }
    .sum-badge-player { font-family: var(--font-head); font-size: 14px; font-weight: 700; color: var(--text); }
    .sum-badge-sub    { font-family: var(--font-body); font-size: 11px; color: var(--text2); }
    .sum-rank-badge   { font-size: 14px; margin-left: 4px; vertical-align: middle; }

    /* ═══════════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════════ */
    @media (max-width: 600px) {
      .subjects-grid { grid-template-columns: 1fr 1fr; }
      .qm-body { padding: 20px 16px 50px; }
      .form-row { grid-template-columns: 1fr; }
      .menu-logo h1 { font-size: 40px; }
      .menu-snake-deco { width: 100px; top: 16px; right: 16px; }
      .qm-topbar-actions .btn-ghost .btn-label { display: none; }
      .board-cards { grid-template-columns: repeat(3,1fr); gap: 8px; }
      .board-card { padding: 14px 8px; }
      .review-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 380px) {
      .subjects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Toast container -->
  <div id="toast-root"></div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay">
    <div id="modal-box" class="modal-box"></div>
  </div>

  <!-- ════════════════════════════════════
       SCREEN: MAIN MENU
  ════════════════════════════════════ -->
  <div id="screen-main" class="screen active">
    <svg class="menu-snake-deco" viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M10,60 Q30,20 50,40 Q70,60 90,30 Q110,10 115,25" stroke="#FF6B6B" stroke-width="6" stroke-linecap="round" fill="none"/>
      <circle cx="115" cy="25" r="5" fill="#FF6B6B"/>
      <line x1="115" y1="20" x2="112" y2="15" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
      <line x1="115" y1="20" x2="119" y2="15" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="menu-content">
      <div class="menu-logo">
        <div class="snake-wrap">
          <span class="snake-emoji">🐍</span>
        </div>
        <h1>EduSnakes</h1>
        <div class="tagline">Learn. Play. Win.</div>
      </div>

      <div class="menu-buttons">
        <button class="btn-menu primary" onclick="App.go('game-setup')">
          <span class="bm-icon">🎮</span>
          <span class="bm-label">Play Game</span>
          <span class="bm-arrow">›</span>
        </button>
        <button class="btn-menu primary" onclick="App.go('question-manager')">
          <span class="bm-icon">📚</span>
          <span class="bm-label">Manage Questions</span>
          <span class="bm-arrow">›</span>
        </button>
        <button class="btn-menu primary" onclick="App.go('settings')">
          <span class="bm-icon">⚙️</span>
          <span class="bm-label">Settings</span>
          <span class="bm-arrow">›</span>
        </button>
      </div>

      <div class="menu-lb" id="menu-lb"></div>
      <div class="menu-footer">Made by <span class="credit-name">hakimi-as</span> &middot; v2.0
        <button class="btn btn-ghost btn-sm" style="margin-left:10px;font-size:11px;padding:3px 10px" onclick="App.showTutorial()">? How to Play</button>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════
       SCREEN: QUESTION MANAGER
  ════════════════════════════════════ -->
  <div id="screen-question-manager" class="screen">
    <!-- Sticky top bar -->
    <div class="qm-topbar">
      <button class="back-btn" id="qm-back-btn" onclick="QM.back()">← Back</button>
      <div class="qm-breadcrumb" id="qm-crumbs"></div>
      <div class="qm-topbar-actions" id="qm-topbar-btns"></div>
    </div>
    <!-- Dynamic body -->
    <div class="qm-body" id="qm-body"></div>
  </div>

  <!-- ════════════════════════════════════
       SCREEN: GAME SETUP (Phase 2)
  ════════════════════════════════════ -->
  <div id="screen-game-setup" class="screen">
    <div class="setup-wrap">
      <!-- Step bar -->
      <div class="step-bar" id="gs-stepbar"></div>
      <!-- Step content -->
      <div id="gs-panel"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════
       SCREEN: GAME BOARD (Phase 3)
  ════════════════════════════════════ -->
  <div id="screen-game-board" class="screen">
    <div class="game-topbar">
      <span class="gt-title">🐍 EduSnakes</span>
      <span class="gt-spacer"></span>
      <button class="pause-btn" id="pause-btn" onclick="Game.togglePause()" title="Pause game (Esc)">⏸</button>
      <button class="theme-toggle-btn" id="theme-toggle-btn" onclick="App.toggleTheme()" title="Toggle dark / light mode">☀</button>
    </div>
    <!-- Pause overlay -->
    <div class="pause-overlay" id="pause-overlay" style="display:none">
      <div class="pause-card">
        <div class="pause-icon">⏸</div>
        <div class="pause-title">Game Paused</div>
        <div class="pause-sub">Press Esc or click Resume to continue</div>
        <button class="btn btn-primary" style="margin-top:20px;min-width:160px" onclick="Game.togglePause()">▶ Resume</button>
        <button class="btn btn-ghost" style="margin-top:8px;min-width:160px" onclick="Game._exitAsk()">← Exit Game</button>
      </div>
    </div>
    <div class="game-layout">
      <div class="game-canvas-area">
        <canvas id="game-canvas"></canvas>
      </div>
      <div class="game-sidebar" id="game-sidebar"></div>
    </div>
  </div>

  <!-- Question popup (Phase 4) — sits above the game board -->
  <div id="qpop-overlay"></div>

  <!-- ════════════════════════════════════
       SCREEN: ROUND SUMMARY (Phase 5)
  ════════════════════════════════════ -->
  <div id="screen-summary" class="screen">
    <!-- Filled dynamically by Summary.render() -->
  </div>

  <!-- ════════════════════════════════════
       SCREEN: SETTINGS (Phase 2)
  ════════════════════════════════════ -->
  <div id="screen-settings" class="screen">
    <div class="settings-topbar">
      <button class="back-btn" onclick="App.go('main')">← Back</button>
      <h2>Settings</h2>
    </div>
    <div class="settings-wrap">
      <div id="settings-body" class="settings-body-pad"></div>
    </div>
  </div>

</div><!-- /#app -->
